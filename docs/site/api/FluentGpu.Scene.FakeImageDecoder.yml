  namespace: FluentGpu.Scene
  summary: >-
    Deterministic headless/offline decoder: completes on the NEXT <xref href="FluentGpu.Scene.ImageCache.Pump" data-throw-if-not-resolved="false"></xref> (the +1-frame
        latency contract), reporting the requested target size and synthesizing a stable per-id BGRA pattern so the GPU
        upload + sample path is exercisable without real codecs or network. Proves the residency/state logic.
