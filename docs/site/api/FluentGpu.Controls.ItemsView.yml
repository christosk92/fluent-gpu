  summary: >-
    The built-in selector-VISUAL preset (the user-pickable item chrome). Default <xref href="FluentGpu.Controls.SelectorVisual.Border" data-throw-if-not-resolved="false"></xref>
        = the existing <xref href="FluentGpu.Controls.ItemContainer" data-throw-if-not-resolved="false"></xref> chrome (current behavior). When <xref href="FluentGpu.Controls.ItemsView.ContainerFactory" data-throw-if-not-resolved="false"></xref> is set it
        wins (a custom skin overrides the preset); otherwise this picks one of the <xref href="FluentGpu.Controls.SelectorVisuals" data-throw-if-not-resolved="false"></xref> builders —
        AccentPill (ListView accent bar), Check (GridView corner check), FullRow, None — so any selector works with any
        layout × any selection mode (no WinUI capability cliffs). The List preset uses AccentPill, the Grid preset uses Check.
