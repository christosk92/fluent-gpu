  namespace: FluentGpu.Controls
  summary: >-
    OPTIONAL redundant hint: the resting index currently pointer-dragged. The displacement seed already
        skips the dragged node UNCONDITIONALLY via its <xref href="FluentGpu.Foundation.NodeFlags.DragGhost" data-throw-if-not-resolved="false"></xref> scene flag (its translate is
        owned by the DragController and must never be animated), so this is needed only by callers whose drag does not
        flow through that flag. NOTE: returning (0,0) from <xref href="FluentGpu.Controls.ItemsView.ItemDisplacement" data-throw-if-not-resolved="false"></xref> for the dragged item does NOT
        by itself make the seed a no-op — the seed animates the row's LIVE translate back to that 0, which is exactly
        the ownership conflict the DragGhost-flag skip prevents.
