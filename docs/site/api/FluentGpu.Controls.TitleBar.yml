  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    The WinUI 3 <code>TitleBar</code> control (WinAppSDK 1.7, microsoft-ui-xaml controls\dev\TitleBar) over a custom frame

    (<xref href="FluentGpu.Pal.WindowDesc.CustomFrame" data-throw-if-not-resolved="false"></xref>): back + pane-toggle buttons (40w, 16px glyphs), a 16×16 app-identity icon,

    12px Caption title/subtitle, a centered content column (the gallery's AutoSuggestBox), and — unlike WinUI, which

    reserves space for SHELL-drawn caption buttons — three ENGINE-drawn min/max/close <xref href="FluentGpu.Controls.CaptionButton" data-throw-if-not-resolved="false"></xref>s

    (46w, full bar height, close = shell red) so the whole bar is one GPU-rendered surface.


    Non-client plumbing: the control captures its part handles (<code>OnRealized</code>) and, in a layout effect (after

    layout, before paint — push-on-relayout only, never per frame), reports <xref href="FluentGpu.Pal.TitleBarRegion" data-throw-if-not-resolved="false"></xref>s through

    <xref href="FluentGpu.Hooks.InputHooks.SetTitleBarRegions" data-throw-if-not-resolved="false"></xref>: interactive islands (back/pane/content) FIRST as

    <xref href="FluentGpu.Pal.TitleBarHit.Client" data-throw-if-not-resolved="false"></xref>, then the three button rects (→ HTMIN/HTMAX/HTCLOSE — the Win11 snap-layouts

    flyout requires HTMAXBUTTON), then the whole bar as the catch-all <xref href="FluentGpu.Pal.TitleBarHit.Caption" data-throw-if-not-resolved="false"></xref> drag band

    (first match wins in WM_NCHITTEST). Window activation/placement changes arrive via the host-bumped

    <xref href="FluentGpu.Hooks.InputHooks.WindowChromeEpoch" data-throw-if-not-resolved="false"></xref> signal: deactivation dims title→tertiary, icon/content→50% opacity,

    caption glyphs→disabled (the WinUI Deactivated visual state); maximize re-glyphs max↔restore.
