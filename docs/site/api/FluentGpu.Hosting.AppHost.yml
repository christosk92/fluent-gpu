  type: Property
  source:
    remote:
      path: src/FluentGpu.Hosting/AppHost.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: PopupWindowsEnabled
    path: ../../src/FluentGpu.Hosting/AppHost.cs
    startLine: 211
  assemblies:
  - FluentGpu.Hosting
  namespace: FluentGpu.Hosting
  summary: >-
    Whether out-of-bounds popup WINDOWS are available (the engine's <code>CPopup::DoesPlatformSupportWindowedPopup</code>

    gate). Defaults to true only on the headless path: the headless device creates independent swapchains, so the

    COMPLETE windowed-popup pipeline (PAL window + own swapchain + subtree DrawList) runs and is verifiable.

    needs-pixels — D3D12 stays false until the per-target submit lands: <code>IGpuDevice.SubmitDrawList</code> has no

    present-target parameter and <code>D3D12Device.CreateSwapchain</code> is a one-shot device init (D3D12Device.cs:95-122),

    so a second swapchain cannot be rendered yet. When false, overlays asking for

    <code>PopupOptions.ConstrainToRootBounds = false</code> silently fall back to in-window clamped placement (exactly

    WinUI on platforms without windowed-popup support).
  example: []
  syntax:
    content: public bool PopupWindowsEnabled { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property PopupWindowsEnabled As Boolean
  overload: FluentGpu.Hosting.AppHost.PopupWindowsEnabled*
