- uid: FluentGpu.Hosting.AppHost.PopupWindowsEnabled
  commentId: P:FluentGpu.Hosting.AppHost.PopupWindowsEnabled
  id: PopupWindowsEnabled
  parent: FluentGpu.Hosting.AppHost
  langs:
  - csharp
  - vb
