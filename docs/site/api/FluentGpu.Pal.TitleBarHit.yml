  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    Non-client classification for one engine-reported titlebar rect (engine → WM_NCHITTEST). <code>Client</code>
        marks an INTERACTIVE ISLAND (search box, back/pane buttons) the engine keeps; <code>Caption</code> is the OS drag-move
        band; the three buttons get HTMIN/HTMAX/HTCLOSE so Win11 shows the snap-layouts flyout over Max.
  example: []
