  namespace: FluentGpu.Controls
  summary: >-
    The <xref href="FluentGpu.Controls.SelectorVisual" data-throw-if-not-resolved="false"></xref> presets as <xref href="FluentGpu.Controls.ItemContainerFactory" data-throw-if-not-resolved="false"></xref>-shaped builders: each returns the

    WinUI item chrome for one preset around the engine's ONE selection + keyboard substrate, signature-identical to the

    <code>ItemContainerFactory</code> delegate (ItemsView.cs:52-54) so a preset is just <code>ContainerFactory = SelectorVisuals.&lt;Name&gt;</code>.


    Each builder is PLAIN/recyclable — a keyed <xref href="FluentGpu.Dsl.BoxEl" data-throw-if-not-resolved="false"></xref> tree with NO Component / no reactive bind

    (TransformBind/OpacityBind/FillBind/WidthBind/HeightBind/OnRealized would break <code>TreeReconciler.IsRecyclable</code>,

    Reconciler.cs:748-749); <code>Animate</code> (a <xref href="FluentGpu.Foundation.LayoutTransition" data-throw-if-not-resolved="false"></xref>) is allowed because it is declarative.

    Per-item chrome SKIN goes through the ContainerFactory/SelectorVisual seam; per-item VARIATION goes through the

    <xref href="FluentGpu.Controls.PartDelta" data-throw-if-not-resolved="false"></xref> value seam (fill/fg/opacity/corner/padding/glyph as values, applied during construction —

    shape-stable, 0-alloc, CI-enforced; docs/guide/control-fidelity.md §6). WinUI chrome values are cited inline; they are

    re-verified against the live ListViewBaseItemChrome.cpp metrics (s_selectionIndicatorSize {3,16},

    s_selectionIndicatorHeightShrinkage 6, s_selectionIndicatorMargin.left 4, s_backplateMargin {4,2},

    s_multiSelectRoundedSquareInlineMargin 14, s_multiSelectRoundedContentOffset 28, s_multiSelectSquareOverlayMargin

    {0,2,2,0}) and the per-state brush ramps in {ListView,GridView,ItemContainer}_themeresources.xaml.
