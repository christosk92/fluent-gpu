    id: AsSpan
    path: ../../src/FluentGpu.Text/EditDocument.cs
    startLine: 134
  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    Contiguous view of the whole document, obtained by MOVING THE GAP TO THE END first (one memmove of the

    post-gap tail). The BCL segmentation APIs need one contiguous span, and a two-segment scanner would have to

    re-implement UAX#29 stitching across the seam — moving the gap is simpler and provably correct. Repeated

    scans after the move are free; the next interior <xref href="FluentGpu.Text.EditDocument.Insert(System.Int32%2cSystem.ReadOnlySpan%7bSystem.Char%7d)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.EditDocument.Remove(System.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref> pays the move

    back. That trade is deliberate: every caller is a cold user-gesture path (caret nav, word jump, grapheme

    snap), never the frame loop, and edit fields are short.
  example: []
  syntax:
    content: public ReadOnlySpan<char> AsSpan()
    return:
      type: System.ReadOnlySpan{System.Char}
    content.vb: Public Function AsSpan() As ReadOnlySpan(Of Char)
  overload: FluentGpu.Text.EditDocument.AsSpan*
