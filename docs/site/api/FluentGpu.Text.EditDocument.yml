  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    The text-edit document: a gap buffer of UTF-16 code units (grow by doubling, minimum capacity 64). Every public

    index is a UTF-16 code-unit offset — the unit WinUI exposes through <code>SelectionStart</code>/<code>MaxLength</code> — so the

    control layer never converts. Grapheme safety is layered ON TOP via the boundary scanners

    (<xref href="FluentGpu.Text.EditDocument.SnapToGrapheme(System.Int32)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.EditDocument.NextGrapheme(System.Int32)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.EditDocument.PrevGrapheme(System.Int32)" data-throw-if-not-resolved="false"></xref>, BCL UAX#29 segmentation —

    covers surrogate pairs, combining marks, ZWJ emoji, regional indicators): callers that move a caret must land on

    those boundaries, while the raw <xref href="FluentGpu.Text.EditDocument.Insert(System.Int32%2cSystem.ReadOnlySpan%7bSystem.Char%7d)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.EditDocument.Remove(System.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref> primitives deliberately accept any

    code-unit range so undo replay can restore exact historic states.


    Hard line breaks are a single '\r' (WinUI normalizes CRLF/LF on the way in — see

    <xref href="FluentGpu.Text.EditDocument.NormalizeNewlines(System.String)" data-throw-if-not-resolved="false"></xref>); '\n' must never be stored. The boundary scanners exploit that invariant:

    a position right after '\r' is always a grapheme boundary (UAX#29 GB4: break after a control), so they anchor

    their forward walk at the surrounding line start instead of offset 0 — O(line length), and text fields are short.
  example: []
