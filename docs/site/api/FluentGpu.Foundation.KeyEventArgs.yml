  summary: >-
    Keyboard event passed to node handlers during tunnel/bubble routing. <xref href="FluentGpu.Foundation.KeyEventArgs.Handled" data-throw-if-not-resolved="false"></xref> stops propagation.

    Carries the modifier chord and the auto-repeat flag (Win32 lParam bit 30) so editors can do Ctrl+arrow word

    navigation and Shift+arrow selection without re-querying the keyboard.
