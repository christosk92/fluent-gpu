    path: ../../src/FluentGpu.Reconciler/Reconciler.cs
    startLine: 18
  assemblies:
  - FluentGpu.Reconciler
  namespace: FluentGpu.Reconciler
  summary: >-
    Patches the retained SceneStore from an immutable Element tree. Signals-first: every component is a reactive

    render-effect (re-renders + reconciles ONLY its own subtree when its state/context changes — granular, never the

    whole app); fine-grained bindings (TransformBind/OpacityBind/…) and reactive control-flow (<xref href="FluentGpu.Hooks.ShowEl" data-throw-if-not-resolved="false"></xref>/

    <xref href="FluentGpu.Hooks.ForEl" data-throw-if-not-resolved="false"></xref>) are effects too. The keyed positional+type diff is retained as the STRUCTURAL engine (used on

    re-render and behind For/Show); a reused component on a parent re-render is a no-op (it is autonomous).
  example: []
  syntax:
    content: public sealed class TreeReconciler
    content.vb: Public NotInheritable Class TreeReconciler
