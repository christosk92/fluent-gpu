  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI AutoSuggestBox: an <xref href="FluentGpu.Controls.EditableText" data-throw-if-not-resolved="false"></xref> field whose filtered suggestions are hosted in a light-dismiss

    <b>popup</b> (an anchored overlay), not inline — so the list floats over content instead of reflowing the page and

    auto-flips above the box when there is no room below (same plumbing as <xref href="FluentGpu.Controls.ComboBox" data-throw-if-not-resolved="false"></xref>).


    <p>

    The list is opened iff the query is non-empty and there is at least one match (WinUI <code>UpdateSuggestionListVisibility</code>:

    open iff <code>maxHeight &gt; 0 ∧ count &gt; 0</code>), driven from a <code>UseEffect</code> keyed on the query so the open/close runs

    after the render commits (no side effects in render). The popup body is wrapped in its own <xref href="FluentGpu.Hooks.Embed.Comp%60%601(System.Func%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref>

    <xref href="FluentGpu.Controls.SuggestionsList" data-throw-if-not-resolved="false"></xref> Component that subscribes to the shared query/highlight <xref href="FluentGpu.Signals.Signal%601" data-throw-if-not-resolved="false"></xref>s, so it

    RE-FILTERS on every keystroke — an overlay content thunk is otherwise a one-shot snapshot (only re-evaluated when the

    OverlayHost version bumps on open/close).

    </p>

    <p>

    <b>TextChanged + reason (AutoSuggestBox_Partial.cpp OnTextBoxTextChanged :451–503).</b> EVERY text change — user

    edit, programmatic restore, suggestion preview — Stop()+Start()s the 150ms timer (<code>s_textChangedEventTimerDuration</code>

    = 1500000 ticks) carrying the change's <xref href="FluentGpu.Controls.TextChangeReason" data-throw-if-not-resolved="false"></xref> (cpp:464), so the public <xref href="FluentGpu.Controls.AutoSuggestBox.TextChanged" data-throw-if-not-resolved="false"></xref>

    fires once typing pauses, with the LAST reason. Only <code>UserInput</code> changes cache <code>m_userTypedText</code>, reset the

    keyboard cursor and update the list visibility (cpp:477–496). Set <xref href="FluentGpu.Controls.AutoSuggestBox.DebounceMs" data-throw-if-not-resolved="false"></xref>=0 to fire synchronously.

    </p>

    <p>

    <b>SuggestionChosen + arrow preview (cpp OnSuggestionSelectionChanged :2298–2411).</b> Moving the suggestion-list

    selection (arrow keys, row click) raises <code>SuggestionChosen</code> for the newly selected item; when

    <xref href="FluentGpu.Controls.AutoSuggestBox.UpdateTextOnSelect" data-throw-if-not-resolved="false"></xref> (default true, cpp:2366–2381) the item text is also previewed into the field with

    reason <xref href="FluentGpu.Controls.TextChangeReason.SuggestionChosen" data-throw-if-not-resolved="false"></xref> (cpp:2380). Stepping PAST either end restores the user-typed

    text with reason <code>ProgrammaticChange</code> and clears the selection (cpp:1101/1109). Enter submits the query

    (QueryText = the field text, ChosenSuggestion = the highlighted item) WITHOUT re-raising SuggestionChosen

    (cpp:1149–1160 + SubmitQuery :857–878). A row click runs SelectionChanged → SuggestionChosen → QuerySubmitted

    sequentially (cpp OnListViewItemClick :2413–2437). Escape restores the typed text and closes (cpp:634–643).

    </p>

    <p>

    <b>Corner-joining (WinUI <code>AutoSuggestBoxHelper::UpdateCornerRadius</code> / <code>KeepInteriorCornersSquare=true</code>).</b> While

    the list is open the field squares the corners that abut the popup so the field+list read as one piece. WinUI squares the

    field BOTTOM (open-down) or TOP (open-up) and the matching popup edge; we square the field bottom corners (open-down — the

    dominant case) here. The popup-surface corner squaring is host-owned: <xref href="FluentGpu.Controls.FlyoutSurface" data-throw-if-not-resolved="false"></xref> already receives the

    <xref href="FluentGpu.Controls.CornerJoin" data-throw-if-not-resolved="false"></xref> from <xref href="FluentGpu.Controls.FlyoutPositioner" data-throw-if-not-resolved="false"></xref> on its <xref href="FluentGpu.Controls.OverlayEntry" data-throw-if-not-resolved="false"></xref> but currently renders

    <code>Radii.OverlayAll</code> unconditionally — see the deferred note in the task report (cannot be fixed from this file).

    </p>
