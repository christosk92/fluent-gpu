    id: AxisLengthPx
    path: ../../src/FluentGpu.Foundation/Effects.cs
    startLine: 51
  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    WinUI <code>MappingMode="Absolute"</code> (StartPoint 0,0 EndPoint 0,N): the stop ramp occupies this many
        PHYSICAL px along the axis — outside the band the edge stop's color holds — instead of stretching over the
        node's full extent. The ControlElevationBorder confines its blend to a 3px band
        (Common_themeresources_any.xaml:186). 0 (default) = relative-to-bounds. Applied as a record-time stop-offset
        remap, so the POD command and the gradient shader are unchanged.
  example: []
  syntax:
    content: public float AxisLengthPx { get; init; }
    parameters: []
    return:
      type: System.Single
    content.vb: Public Property AxisLengthPx As Single
  overload: FluentGpu.Foundation.GradientSpec.AxisLengthPx*
