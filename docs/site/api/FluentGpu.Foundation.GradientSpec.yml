    path: ../../src/FluentGpu.Foundation/Effects.cs
    startLine: 57
  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    Anchor the absolute band at the END of the axis instead of the start — the engine encoding of WinUI's
        <code>RelativeTransform ScaleTransform ScaleY="-1"</code> mirror on elevation brushes (light ControlElevationBorder,
        Common_themeresources_any.xaml:382-390; AccentControlElevationBorder both themes :198-205/:397-404): the
        darker secondary edge sits at the BOTTOM. Only meaningful with <xref href="FluentGpu.Foundation.GradientSpec.AxisLengthPx" data-throw-if-not-resolved="false"></xref> &gt; 0.
  example: []
