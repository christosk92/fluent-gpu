  summary: >-
    Segoe Fluent glyph codepoints shared across LAYERS (a control and the engine recorder), so every
        consumer renders literally the same icon. Control-local glyphs stay at their call sites (or
        <code>Controls.Icons</code>); promote one here only when a layer below Controls needs it — today the scrollbar
        arrows, drawn both by the ScrollBar/AnnotatedScrollBar templates and by the engine's overlay scrollbar
        (<code>SceneRecorder.EmitScrollbar</code>).
