  summary: >-
    One laid-out line: the UTF-16 source range it covers — [StartChar, EndChar), where EndChar is the next
        line's StartChar (the text length on the last line) — its vertical band (Top/Height), its rendered advance width
        (including a trim ellipsis), and its window [FirstGlyph, FirstGlyph + GlyphCount) into
        <xref href="FluentGpu.Text.DirectWrite.TextLayoutEngine.Clusters" data-throw-if-not-resolved="false"></xref>. Chars dropped by trimming have no cluster entry; queries clamp them to the
        trimmed edge.
  example: []
