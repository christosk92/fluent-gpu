  assemblies:
  - FluentGpu.Input
  namespace: FluentGpu.Input
  summary: >-
    The drag-reorder gesture engine (E5). A left press on (or inside) a <code>CanDrag</code> node ARMS a candidate; pointer

    travel outside the drag box PROMOTES it from a click to a drag (the dispatcher then suppresses the click and routes

    every move here — capture semantics). The promoted drag draws its visual on the dragged node itself: a parent-space

    <code>LocalTransform</code> translate + 0.8 opacity + a flyout-class shadow

    (WinUI <code>ListViewItemDragThemeOpacity</code> = 0.80 — microsoft-ui-xaml controls\dev\CommonStyles\ListViewItem_themeresources.xaml:7),

    and the node stops hit-testing so drop-target queries see THROUGH the moving visual.


    Threshold: the Windows drag box is <code>SM_CXDRAG</code>/<code>SM_CYDRAG</code> (4px default), tested per-axis

    (<code>dx &gt; maxDx || dy &gt; maxDy</code> — microsoft-ui-xaml dxaml\xcp\dxaml\lib\ListViewBaseItem_Partial.cpp:1864-1878).

    WinUI's list items double it (LISTVIEWBASEITEM_MOUSE_DRAG_THRESHOLD_MULTIPLIER = 2.0, same file :54); this engine

    uses the 4px base box per plan E5, matching <xref href="FluentGpu.Input.InputDispatcher.ClickSlopPx" data-throw-if-not-resolved="false"></xref>.


    Axis-aware arena-lite (promotion-time arbitration): the item's reorder axis is its PARENT container's main axis

    (row → horizontal item-drag). A gesture whose dominant axis is PERPENDICULAR to that, with a scrollable ancestor

    that actually overflows along the gesture axis, yields to the pan (vertical pan over a scrollable beats a

    horizontal item-drag) — the WinUI manipulation-arena outcome for a tab strip inside a scrolling page.


    Drop-settle rides the existing FLIP pipeline: <code>Complete</code> restores the resting visuals and reports

    (draggedRect → restingRect) through <xref href="FluentGpu.Input.DragController.OnSettle" data-throw-if-not-resolved="false"></xref>; the host wires that to

    <code>AnimEngine.AnimateBounds</code>, so the seeded position spring is retargeted velocity-continuously by the same

    commit's <code>ApplyProjections</code> when the app's <code>OnDragCompleted</code> handler reorders the collection — displaced

    siblings and the dropped item all animate through the one layout-transition path (reorder hints come free).


    Mid-drag live reorder rides the same pipeline: when the consumer re-projects the children ORDER at the

    dwell-committed target (<code>ReorderList.ProjectOrder</code>), displaced siblings FLIP to their new slots while

    <xref href="FluentGpu.Input.DragController.Move(FluentGpu.Foundation.Point2%2cFluentGpu.Foundation.KeyModifiers%2cSystem.UInt32)" data-throw-if-not-resolved="false"></xref> RE-ANCHORS the pointer-held visual — it strips the translate it last applied to find the node's

    CURRENT resting origin, then aims at (grab origin + gesture delta), so a slot move under the pointer (or an

    ancestor scrolling) never jumps the visual (the WinUI outcome: the dragged item tracks the pointer while

    <code>MoveItemsForLiveReorder</code> shifts the rest — ListViewBase_Partial_Reorder.cpp:2254). The drag visuals are

    re-asserted on every move because a mid-drag commit's patch restores the authored opacity/shadow/hit-test

    (Reconciler ApplyBox writes them unconditionally).


    GHOST (E5-L2): while a drag is active the lifted node carries <xref href="FluentGpu.Foundation.NodeFlags.DragGhost" data-throw-if-not-resolved="false"></xref> and is published as

    <xref href="FluentGpu.Scene.SceneStore.DragGhost" data-throw-if-not-resolved="false"></xref> — the recorder excludes it from the clipped main pass and re-walks its subtree

    in an UNCLIPPED top band emitted last (mirroring the orphan pass), so the visual escapes every ancestor scissor (a

    row dragged out of a clipped list keeps drawing) and paints above overlays — the Flutter/rbd ghost layer.


    Spring-lag follow (the rbd feel): the PRESENTED translate eases toward the gesture target with a critically-damped

    spring (<xref href="FluentGpu.Input.DragController.FollowOmega" data-throw-if-not-resolved="false"></xref>) instead of pinning rigidly — 0-alloc per move/tick. It engages only when the

    platform delivers real timestamps (consecutive non-zero <code>TimestampMs</code>); 0-stamp gestures (the headless

    default) snap presented == target, keeping every position assertion deterministic. <xref href="FluentGpu.Input.DragController.SpringFollow" data-throw-if-not-resolved="false"></xref>

    false disables it outright. The host advances in-between-move easing (and the pointer-pin while an edge

    auto-scroll moves the resting origin under a still pointer) via <xref href="FluentGpu.Input.DragController.Tick(System.Single)" data-throw-if-not-resolved="false"></xref>.
