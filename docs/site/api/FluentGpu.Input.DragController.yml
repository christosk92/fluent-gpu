  assemblies:
  - FluentGpu.Input
  namespace: FluentGpu.Input
  summary: >-
    Release after an active drag: restore the resting visuals, fire <code>OnDragCompleted</code> (the app commits
        the reorder here), then hand the (dragged → resting) rects to <xref href="FluentGpu.Input.DragController.OnSettle" data-throw-if-not-resolved="false"></xref> for the FLIP glide.
        Returns true iff a drag was active — the dispatcher suppresses the click. An armed-only candidate just disarms.
        <code class="paramref">suppressSettle</code> (E5-L2): an accepted DROP on a non-reorder target skips the glide — the
        payload was deposited there, so the visual snaps home instead of springing back
        (<xref href="FluentGpu.Foundation.DropTargetSpec.SettleOnDrop" data-throw-if-not-resolved="false"></xref> opts a reorder target back into the glide).
  example: []
