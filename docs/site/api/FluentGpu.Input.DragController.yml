      type: FluentGpu.Foundation.KeyModifiers
    - id: timestampMs
      type: System.UInt32
    - id: suppressSettle
      type: System.Boolean
    return:
      type: System.Boolean
    content.vb: Public Function Complete(abs As Point2, mods As KeyModifiers, timestampMs As UInteger, suppressSettle As Boolean = False) As Boolean
