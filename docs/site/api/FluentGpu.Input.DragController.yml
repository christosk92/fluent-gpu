  summary: >-
    Pointer move while armed or active. Armed: crossing the drag box either PROMOTES (fires
        <code>OnDragStarted</code> then the first <code>OnDragDelta</code>) or YIELDS to a cross-axis pan (arena-lite) and disarms.
        Active: applies the parent-space translate and fires <code>OnDragDelta</code>. Returns true iff the gesture owns the
        pointer after this call (the dispatcher then skips hover/scroll/slider routing).
