  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    Drag-reorder lifecycle payload for <code>OnDragStarted</code>/<code>OnDragDelta</code>/<code>OnDragCompleted</code>: the pointer in

    the dragged node's CURRENT box (<xref href="FluentGpu.Foundation.DragEventArgs.Local" data-throw-if-not-resolved="false"></xref> stays ≈ the grab offset) and in window space, the accumulated

    gesture translation since the arming press, and the smoothed pointer velocity (px/s, ~50ms EMA) for flick/settle

    decisions. ONE instance is reused for the whole gesture (0 steady-state alloc per move) — handlers must copy

    fields they keep, never hold the reference.
  example: []
