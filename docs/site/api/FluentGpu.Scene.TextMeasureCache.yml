    id: TextMeasureCache
    path: ../../src/FluentGpu.Scene/Columns.cs
    startLine: 15
  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Per-text-node measure cache (layout.md §2.3): a pure-function cache of (text, style, availWidth) → size, so a
        scoped relayout skips re-shaping a text leaf whose inputs are unchanged. Self-invalidating — any input change makes
        the stored key not match. Helps the real DirectWrite shaping path; neutral for the headless fake font.
        Besides the size, the cache retains the face's DECORATION metrics from the same <code>TextMetrics</code> (top-down DIP,
        the line frame of <code>Baseline</code> — see FluentGpu.Text.TextMetrics): the recorder reads them at record time to
        place underline/strikethrough bars (NodePaint.TextDecorations) without re-touching the font seam. Filled by the
        layout engine's measure-miss path; 0 ⇒ the backend reported no face metrics (the recorder falls back to a
        size-derived approximation).
  example: []
  syntax:
    content: public struct TextMeasureCache
    content.vb: Public Structure TextMeasureCache
