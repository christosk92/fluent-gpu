  assemblies:
  - FluentGpu.Animation
  namespace: FluentGpu.Animation
  summary: >-
    The LIVE value of an in-flight track on <code class="paramref">node</code>+<code class="paramref">channel</code> — so an
        interrupting eased tween can start FROM where the animation currently is instead of a recomputed endpoint
        (WinUI AnimatedIcon queues/blends transitions, AnimatedIcon.cpp:235-267 — a mid-flight chevron reversal must
        not snap). False = no live track (caller uses its resting value).
  example: []
  syntax:
