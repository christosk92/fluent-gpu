  summary: >-
    Cancel + reset the channel's paint to its settle-time resting sentinel — symmetric with the settle
        path (StrokeTrim/PresentedW/H → NaN, Clip → Infinite). A bare <xref href="FluentGpu.Animation.AnimEngine.Cancel(FluentGpu.Foundation.NodeHandle%2cFluentGpu.Animation.AnimChannel)" data-throw-if-not-resolved="false"></xref> only drops the track,
