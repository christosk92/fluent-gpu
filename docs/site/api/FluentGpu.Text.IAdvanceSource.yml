  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    A per-glyph advance source for the shared wrap/measure math. Implemented as a <code>struct</code> so the generic wrap

    routines below monomorphize and inline the advance lookup (zero allocation, no virtual dispatch). The advance is the

    DIP advance for one UTF-16 code unit (design advance × size/em). The render side (D3D12 <code>GlyphRenderer</code>) and the

    measure side (<code>DirectWriteFontSystem</code>) each supply their own struct over the SAME DirectWrite design advances, so

    measurement and rendering break lines identically.
  example: []
  syntax:
    content: public interface IAdvanceSource
    content.vb: Public Interface IAdvanceSource
