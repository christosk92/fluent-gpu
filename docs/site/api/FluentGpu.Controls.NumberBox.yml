  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI <code>NumberBox</code>: an editable numeric <xref href="FluentGpu.Controls.EditableText" data-throw-if-not-resolved="false"></xref> field with an optional spin affix. The numeric

    model is a caller-owned <xref href="FluentGpu.Controls.NumberBox.Value" data-throw-if-not-resolved="false"></xref> signal (<code>double.NaN</code> = cleared); the visible text is derived from it

    through the <xref href="FluentGpu.Controls.NumberBox.Formatter" data-throw-if-not-resolved="false"></xref> and re-parsed on commit. Spin buttons step by <xref href="FluentGpu.Controls.NumberBox.SmallChange" data-throw-if-not-resolved="false"></xref> and are

    <xref href="FluentGpu.Controls.NumberBoxSpinButtonPlacementMode.Hidden" data-throw-if-not-resolved="false"></xref> by default. <xref href="FluentGpu.Controls.NumberBoxSpinButtonPlacementMode.Inline" data-throw-if-not-resolved="false"></xref>

    puts the two side-by-side repeat buttons (▲E70E / ▼E70D, NumberBox.xaml:174–175) at the trailing edge of the field;

    <xref href="FluentGpu.Controls.NumberBoxSpinButtonPlacementMode.Compact" data-throw-if-not-resolved="false"></xref> shows the EC8F popup-indicator chevron (NumberBox.xaml:365)

    and opens the up/down buttons in an Overlay popup while focused (the popup auto-opens on focus and closes on blur —

    NumberBox.cpp:414–438; the indicator is a non-interactive TextBlock, not a toggle). Keyboard stepping follows

    OnNumberBoxKeyDown (NumberBox.cpp:533–558): Up/Down = ±SmallChange, PageUp/PageDown = ±LargeChange, handled on key

    DOWN so OS auto-repeat repeats the step. Validation (clamp / revert) runs on Enter and on blur per

    <xref href="FluentGpu.Controls.NumberBox.ValidationMode" data-throw-if-not-resolved="false"></xref>; with <xref href="FluentGpu.Controls.NumberBox.AcceptsExpression" data-throw-if-not-resolved="false"></xref> a typed arithmetic expression is evaluated on

    commit (shunting-yard over + - * / ^ and parentheses — NumberBoxParser port). Mouse-wheel over the field while it

    is focused also steps ±SmallChange and consumes the event before any enclosing viewport scrolls (PointerWheelChanged

    → OnNumberBoxScroll, NumberBox.cpp:40 + :578–597).
