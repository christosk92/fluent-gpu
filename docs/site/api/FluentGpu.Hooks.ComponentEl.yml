  namespace: FluentGpu.Hooks
  summary: >-
    An element that embeds a child <xref href="FluentGpu.Hooks.Component" data-throw-if-not-resolved="false"></xref> (with its own hooks/state) into a parent's render output.

    The reconciler instantiates the component once (via <xref href="FluentGpu.Hooks.ComponentEl.Factory" data-throw-if-not-resolved="false"></xref>), reuses it across renders of the same

    <xref href="FluentGpu.Hooks.ComponentEl.ComponentType" data-throw-if-not-resolved="false"></xref>, and reconciles its rendered output as this node's content. This is what lets the

    framework compose many stateful components rather than one root.
