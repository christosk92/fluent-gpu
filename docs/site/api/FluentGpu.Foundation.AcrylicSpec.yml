  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    A per-node acrylic (frosted glass): the engine samples the canvas behind the node, resolves transparent backdrop

    through <xref href="FluentGpu.Foundation.AcrylicSpec.Fallback" data-throw-if-not-resolved="false"></xref>, blurs it (<xref href="FluentGpu.Foundation.AcrylicSpec.BlurSigma" data-throw-if-not-resolved="false"></xref>), then applies WinUI's luminosity/tint recipe.

    Realized by the <code>PushLayer</code>/<code>PopLayer</code> backdrop subsystem.
