  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI CommandBar (CommandBar_themeresources.xaml): a horizontal toolbar of primary commands with a trailing

    "…" MoreButton that opens the SECONDARY commands as an overflow menu and expands the bar.


    <ul><li><b>Closed</b> — chromeless: Background = CommandBarBackground = ControlFillColorTransparent (:9), no border;

    height = AppBarThemeCompactHeight 48 (:72) in Compact mode (icon-only buttons), 24 in Minimal, 0 in Hidden.</li><li><b>Open</b> — Background swaps to CommandBarBackgroundOpen = AcrylicInAppFillColorDefault (:10) with the

    ControlCornerRadius 4 + OpenBorder; primary buttons grow to the labeled 64px FullSize layout

    (ContentTransform.Y → CompactVerticalDelta) and the overflow popup opens under the … button. The WinUI

    DisplayModeStates storyboards run the open leg over ControlNormalAnimationDuration (250ms) and the close leg over

    ControlFastAnimationDuration (167ms), both on the ControlFastOutSlowInKeySpline 0,0,0,1 (:124-247

    CompactClosed↔CompactOpenUp/Down VisualTransitions) — the bar's height/label reveal rides a matching

    LayoutTransition tween; the overflow popup itself is the overlay's menu reveal.</li><li><b>Overflow</b> — CommandBarOverflowPresenter: MinWidth 160 / MaxWidth 480 (:5/:7), acrylic +

    transient-border chrome from the overlay's FlyoutSurface; secondary commands render as Overflow-state

    AppBarButtons (icons + toggle checks + right-aligned accelerator text) with AppBarSeparator Overflow rows.</li><li><b>MoreButton</b> — Width 48 (AppBarExpandButtonThemeWidth, generic.xaml:23), E712 ellipsis, subtle fills,

    inner-border margin 2,6,6,6 (AppBarEllipsisButtonInnerBorderMargin :73), FocusVisualMargin −3.</li><li><b>IsSticky</b> — a non-sticky open bar light-dismisses (click-outside/Escape closes); sticky stays open

    until the … button is clicked again (WinUI AppBar sticky semantics).</li></ul>
