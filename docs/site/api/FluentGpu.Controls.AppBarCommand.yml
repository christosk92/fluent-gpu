  summary: >-
    A single command in a <xref href="FluentGpu.Controls.CommandBarFlyout" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.CommandBar" data-throw-if-not-resolved="false"></xref> — the engine analog of
        WinUI's <code>ICommandBarElement</code> (AppBarButton / AppBarToggleButton / AppBarSeparator). A <xref href="FluentGpu.Controls.AppBarCommand.Glyph" data-throw-if-not-resolved="false"></xref> +
        <xref href="FluentGpu.Controls.AppBarCommand.Label" data-throw-if-not-resolved="false"></xref> + optional <xref href="FluentGpu.Controls.AppBarCommand.Invoke" data-throw-if-not-resolved="false"></xref> callback. Use <xref href="FluentGpu.Controls.AppBarCommand.Separator" data-throw-if-not-resolved="false"></xref> for a divider in the
        overflow menu. Optional extras: <xref href="FluentGpu.Controls.AppBarCommand.AcceleratorText" data-throw-if-not-resolved="false"></xref> (the right-aligned KeyboardAcceleratorTextOverride
        hint), <xref href="FluentGpu.Controls.AppBarCommand.Accelerator" data-throw-if-not-resolved="false"></xref> (a REAL engine chord that invokes the command from anywhere), and
        <xref href="FluentGpu.Controls.AppBarCommand.Flyout" data-throw-if-not-resolved="false"></xref> (a cascading sub-menu — the secondary row shows the E76C chevron and clicking it opens the
        sub-menu WITHOUT closing the parent flyout, CommandBarFlyout.cpp:95-108).
