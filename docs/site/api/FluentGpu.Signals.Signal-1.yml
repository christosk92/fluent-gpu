  summary: >-
    A reactive cell: reading <xref href="FluentGpu.Signals.Signal%601.Value" data-throw-if-not-resolved="false"></xref> inside a computation subscribes it; writing notifies subscribers

    (deferred — they re-run on the next <xref href="FluentGpu.Signals.ReactiveRuntime.Flush" data-throw-if-not-resolved="false"></xref>). The unit of state in the engine; a

    <code>UseState</code> is a Signal whose subscriber is the owning component's render-effect.
