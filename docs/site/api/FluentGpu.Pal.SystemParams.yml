  summary: >-
    OS user-preference parameters the engine honors (WinUI reads them through SystemParametersInfo /
        the registry). The platform writes them ONCE at startup (Win32: HKCU + SPI reads); headless keeps the
        defaults for determinism. Read anywhere (controls included) — plain statics, no per-frame cost.
