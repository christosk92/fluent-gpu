  assemblies:
  - FluentGpu.Animation
  namespace: FluentGpu.Animation
  summary: >-
    Drives WinUI RepeatButton auto-repeat: while a repeat node is held, its click handler is invoked once on press, then

    after an initial delay, then at a fixed interval. A host system armed by the dispatcher on press / released on up

    (the <xref href="FluentGpu.Animation.InteractionAnimator" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Animation.ScrollAnimator" data-throw-if-not-resolved="false"></xref> idiom), ticked once per frame in the host loop and

    reported through <xref href="FluentGpu.Animation.RepeatTicker.HasActive" data-throw-if-not-resolved="false"></xref> so frames keep flowing while held — and stop the instant it's released

    (no busy loop). Zero alloc on a steady frame (invokes the already-stored click <xref href="System.Action" data-throw-if-not-resolved="false"></xref>).

    Delay/Interval come from the node (<code>InteractionInfo.RepeatDelayMs/RepeatIntervalMs</code>; NaN/non-positive = the

    WinUI DP defaults, validated positive like RepeatButton_Partial.cpp:149-182). While the held pointer leaves the

    node the ticker PAUSES; re-entry resumes with a fresh initial delay and never an immediate re-fire

    (RepeatButton_Partial.cpp:530-548, :565-574).
  example: []
