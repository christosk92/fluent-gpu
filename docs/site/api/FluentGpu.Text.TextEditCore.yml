  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    The portable text-editing state machine: an <xref href="FluentGpu.Text.EditDocument" data-throw-if-not-resolved="false"></xref> + caret/selection + bounded undo, with

    WinUI TextBox semantics made exact. Pure C# over the BCL — no PAL/Scene/Render types — so the same core drives

    TextBox/PasswordBox/NumberBox/AutoSuggestBox/ComboBox on Windows AND headless checks.


    Contracts every mutation upholds: caret positions are grapheme boundaries (never inside a surrogate pair, ZWJ

    emoji, or combining sequence); <xref href="FluentGpu.Text.TextEditCore.Anchor" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.TextEditCore.Active" data-throw-if-not-resolved="false"></xref> stay in [0, Length]; every document

    change bumps <code>Doc.Version</code>; undo/redo restore the EXACT before/after caret+anchor pairs. Caret movement and

    selection ops allocate nothing — strings materialize only at the user-gesture edge (copy, undo capture, paste

    normalization).
  example: []
  syntax:
    content: public sealed class TextEditCore
    content.vb: Public NotInheritable Class TextEditCore
