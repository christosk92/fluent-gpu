  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    Place the caret (pointer click / programmatic). Clamps to [0, Length] and snaps DOWN to a grapheme boundary.

    <code class="paramref">extend</code> keeps <xref href="FluentGpu.Text.TextEditCore.Anchor" data-throw-if-not-resolved="false"></xref> (Shift+click); otherwise the selection collapses.

    Caret relocation seals the undo run (typing after a click is a new undo step) and resets <xref href="FluentGpu.Text.TextEditCore.StickyX" data-throw-if-not-resolved="false"></xref>.
