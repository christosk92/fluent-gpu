  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    Insert at the caret, replacing any selection as a single undo op. Respects <xref href="FluentGpu.Text.TextEditCore.IsReadOnly" data-throw-if-not-resolved="false"></xref>;

    flattens to the first line when <xref href="FluentGpu.Text.TextEditCore.AcceptsReturn" data-throw-if-not-resolved="false"></xref> is false (so pasting multi-line text into a

    single-line field keeps only line one, exactly like WinUI — note an empty flattened paste still replaces

    the selection); clamps against <xref href="FluentGpu.Text.TextEditCore.MaxLength" data-throw-if-not-resolved="false"></xref> at a grapheme boundary. Single-grapheme inserts at a

    collapsed caret push coalescable Typing ops (a typing burst undoes in one step); everything else seals.

    Returns true iff the document changed.
  example: []
  syntax:
    content: public bool InsertText(ReadOnlySpan<char> text)
    parameters:
    - id: text
      type: System.ReadOnlySpan{System.Char}
