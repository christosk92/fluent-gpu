  summary: >-
    Measure a (possibly wrapping/trimming) run: line count, widest line width, total box height. Mirrors the
        <code>GlyphRenderer.ShapeInto</code> line loop exactly. Width is clamped to <code class="paramref">maxWidth</code> when finite.
