  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    THE single source of truth for line breaking, ellipsis fitting, and wrapped-box measurement — extracted verbatim from

    the D3D12 <code>GlyphRenderer</code> shaping so the layout MEASURE path and the glyph RENDER path can never disagree on where

    lines break or how tall a wrapped block is (the GDI-measure/DWrite-render mismatch that overlapped wrapped content).

    Pure, COM-free, allocation-free over a <xref href="System.ReadOnlySpan%601" data-throw-if-not-resolved="false"></xref> + a struct <xref href="FluentGpu.Text.IAdvanceSource" data-throw-if-not-resolved="false"></xref>.

    <code>wrap</code> uses the <code>TextWrap</code> enum value (0 = NoWrap, 1 = Wrap, 2 = WrapWholeWords); <code>trim</code> uses the

    <code>TextTrim</code> enum value (0 = None). LTR design-advance positioning (matches the v1 renderer).
