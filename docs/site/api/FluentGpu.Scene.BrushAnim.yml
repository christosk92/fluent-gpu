  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    An implicit brush transition (WinUI <code>BrushTransition</code>, 83ms): when a LOGICAL state flip re-renders a node with a

    different Fill/BorderColor/TextColor and the element opted in (<code>BrushTransitionMs</code>), the reconciler captures the

    previously-DISPLAYED color here and the recorder cross-fades from it to the new resolved color as <code>T</code> advances

    (linear-light, like the hover/press cross-fade). Sparse side-table — O(transitioning nodes), 0-alloc steady frames.
  example: []
