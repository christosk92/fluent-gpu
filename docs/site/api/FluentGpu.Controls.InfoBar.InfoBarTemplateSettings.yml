  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    The TemplateSettings convention (per the audit's P3) - the per-severity computed geometry WinUI binds
        into its severity VisualState: the standard status glyph, the icon-background fill (SystemFillColor*Brush), the
        inverse glyph foreground, and the tinted content-root background (SystemFillColor*BackgroundBrush). Computed once
        per severity by the pure factory <xref href="FluentGpu.Controls.InfoBar.InfoBarTemplateSettings.For(FluentGpu.Controls.InfoBarSeverity)" data-throw-if-not-resolved="false"></xref> - no per-frame allocation.
