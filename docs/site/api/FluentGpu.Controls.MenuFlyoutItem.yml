  summary: >-
    A single row in a <xref href="FluentGpu.Controls.MenuFlyout" data-throw-if-not-resolved="false"></xref>: a label, an optional leading glyph (icon column), an enabled
        flag, the action to run when chosen, and an optional trailing keyboard-accelerator hint (e.g. "Ctrl+S"). Use
        <xref href="FluentGpu.Controls.MenuFlyoutItem.Separator" data-throw-if-not-resolved="false"></xref> for a divider, <xref href="FluentGpu.Controls.MenuFlyoutItem.Toggle(System.String%2cSystem.Boolean%2cSystem.Action%2cSystem.String%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> for a checkable item (E73E check column),
        <xref href="FluentGpu.Controls.MenuFlyoutItem.RadioItem(System.String%2cSystem.Boolean%2cSystem.Action%2cSystem.String%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> for a mutually-exclusive choice (E915 bullet), or <xref href="FluentGpu.Controls.MenuFlyoutItem.SubMenu(System.String%2cSystem.Collections.Generic.IReadOnlyList%7bFluentGpu.Controls.MenuFlyoutItem%7d%2cSystem.String%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> for a cascading
        sub-menu (E974 chevron column, hover/Right-arrow opens the nested popup). All non-Command extras are optional so
        the primary <code>(Label, Glyph, Enabled, Invoke)</code> constructor call-sites are unchanged.
