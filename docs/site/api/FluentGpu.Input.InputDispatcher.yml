  assemblies:
  - FluentGpu.Input
  namespace: FluentGpu.Input
  summary: >-
    The typed drag-drop context (E5-L2, the Flutter Draggable/DragTarget + rbd model): a promoted L1 drag
        whose chain carries a <code>BoxEl.Draggable</code> opens THE <xref href="FluentGpu.Foundation.DragSession" data-throw-if-not-resolved="false"></xref> here; per move the nearest
        accepting <code>BoxEl.DropTarget</code> under the pointer gets Enter/Over/Leave, release over it gets OnDrop, and
        the engine edge auto-scroll arms when the pointer drags near an overflowing viewport's edge (host-ticked).
  example: []
