  assemblies:
  - FluentGpu.Input
  namespace: FluentGpu.Input
  summary: >-
    Move focus. <code class="paramref">visual</code> = show the focus ring (keyboard/Tab); pointer focus passes false.
        Focus-visual transitions mark the affected nodes PaintDirty and request a frame — the ring is paint state.
        When focus actually MOVES, the old node's <code>OnFocusChanged</code> handler fires with false and the new node's with
        true (WinUI LostFocus → GotFocus order), AFTER all flag updates — so a GotFocus handler can read
        <xref href="FluentGpu.Foundation.NodeFlags.FocusVisual" data-throw-if-not-resolved="false"></xref> to distinguish keyboard focus (select-all) from pointer focus.
  example: []
  syntax:
    content: public void SetFocus(NodeHandle node, bool visual = false)
    parameters:
    - id: node
      type: FluentGpu.Foundation.NodeHandle
    - id: visual
      type: System.Boolean
    content.vb: Public Sub SetFocus(node As NodeHandle, visual As Boolean = False)
