  assemblies:
  - FluentGpu.Input
  namespace: FluentGpu.Input
  summary: >-
    The drag-reorder gesture engine (E5-L1): armed by a press on a <code>CanDrag</code> chain, promoted past the
        4px drag box, owning the pointer until release/Escape. Constructed with the dispatcher so every host gets
        item-drag without wiring; the host hooks <xref href="FluentGpu.Input.DragController.OnSettle" data-throw-if-not-resolved="false"></xref> for the FLIP drop-glide.
  example: []
