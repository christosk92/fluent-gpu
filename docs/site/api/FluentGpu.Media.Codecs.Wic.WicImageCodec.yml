  namespace: FluentGpu.Media.Codecs.Wic
  summary: >-
    Windows <xref href="FluentGpu.Media.IImageCodec" data-throw-if-not-resolved="false"></xref> leaf (media-pipeline.md §3): Windows Imaging Component constrained decode. Decodes

    straight to the target bucket size via <code>IWICBitmapScaler</code> (a 3000px cover never materializes full-res in CPU

    memory) and converts to <code>32bppPBGRA</code> (premultiplied BGRA — matches the engine's blend posture and the GPU

    texture format). All WIC COM objects are created and used ENTIRELY on the calling worker thread (per-thread cached

    factory) and never cross the scheduler seam — only POD pixels do (the FGCOM per-thread-COM rule).
  example: []
  syntax:
    content: 'public sealed class WicImageCodec : IImageCodec'
    content.vb: Public NotInheritable Class WicImageCodec Implements IImageCodec
