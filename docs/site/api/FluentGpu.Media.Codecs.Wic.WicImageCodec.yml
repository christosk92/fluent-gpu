  assemblies:
  - FluentGpu.Media.Codecs.Wic
  namespace: FluentGpu.Media.Codecs.Wic
  summary: >-
    Decode <code class="paramref">encoded</code> into <code class="paramref">dstBgra8</code> (premultiplied, row-major, stride
        = w*4) at <code class="paramref">targetW</code>×<code class="paramref">targetH</code>. <code class="paramref">dstBgra8</code> is at least
        targetW*targetH*4 bytes. Returns false (no throw) if the bytes are not a decodable image; the scheduler maps that
        to <code>ImageFailureKind.Decode</code>. Outputs the actual decoded dims (== target for the constrained path).
  example: []
  syntax:
    content: public bool DecodeConstrained(ReadOnlySpan<byte> encoded, int targetW, int targetH, Span<byte> dstBgra8, out int w, out int h)
    parameters:
    - id: encoded
      type: System.ReadOnlySpan{System.Byte}
    - id: targetW
      type: System.Int32
    - id: targetH
      type: System.Int32
    - id: dstBgra8
      type: System.Span{System.Byte}
    - id: w
      type: System.Int32
    - id: h
      type: System.Int32
    return:
      type: System.Boolean
    content.vb: Public Function DecodeConstrained(encoded As ReadOnlySpan(Of Byte), targetW As Integer, targetH As Integer, dstBgra8 As Span(Of Byte), w As Integer, h As Integer) As Boolean
