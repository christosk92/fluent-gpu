    startLine: 17
  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    The standardized, reusable engine-wide diagnostics facility. Every subsystem instruments through it the same way:

    <code>Diag.Count("text.glyph","rasterized")</code>, <code>Diag.Set("d3d12","glyphInstances", n)</code>,

    <code>Diag.Event("rhi","device-lost")</code>, <code>using (Diag.Time("frame","record")) { … }</code>.


    COST MODEL: the recording methods are <code>[Conditional("DEBUG"), Conditional("FLUENTGPU_DIAG")]</code>, so on a Release

    build (with neither symbol defined) the compiler removes the call site AND the argument evaluation entirely — a

    `Diag.Set("text.atlas","nonZero", ExpensiveScan())` costs literally nothing in production. Define

    <code>FLUENTGPU_DIAG</code> to keep diagnostics in a Release build; toggle at runtime with the AppContext switch

    <code>"FluentGpu.Diagnostics"</code> or by setting <xref href="FluentGpu.Foundation.Diag.Enabled" data-throw-if-not-resolved="false"></xref>. Route output by setting <xref href="FluentGpu.Foundation.Diag.Sink" data-throw-if-not-resolved="false"></xref>.
  example: []
