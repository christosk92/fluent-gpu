  summary: >-
    Icon "pop": scale 0.5→1 + fade 0→1 on a snappy spring (~180ms, faint overshoot). For a checkmark or the
        indeterminate dash appearing/disappearing on a CheckBox. WinUI keeps the box fill instant and animates the glyph.
  example: []
  syntax:
    content: public static readonly LayoutTransition IconPop
    return:
      type: FluentGpu.Foundation.LayoutTransition
    content.vb: Public Shared ReadOnly IconPop As LayoutTransition
