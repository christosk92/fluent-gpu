  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    How an image's pixels map into its (possibly differently-shaped) layout box — the CSS <code>object-fit</code> model,
        cleaner than WinUI's <code>Stretch</code> because box-sizing is a separate concern (see <code>AspectRatio</code>). Default
        <xref href="FluentGpu.Foundation.ImageFit.Cover" data-throw-if-not-resolved="false"></xref> (what album art / thumbnails want): never distorts, never letterboxes.
  example: []
  syntax:
    content: 'public enum ImageFit : byte'
    content.vb: Public Enum ImageFit As Byte
