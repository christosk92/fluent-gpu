  summary: >-
    A WinUI Popup: displays arbitrary content above other content, opened and closed programmatically.
        A trigger button toggles a small anchored popup; re-clicking (or invoking again) closes it. Reuses the overlay
        service, which already wraps the content thunk in an acrylic card with shadow/border/corners.
