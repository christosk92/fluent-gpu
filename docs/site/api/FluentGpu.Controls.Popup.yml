  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI <code>Popup.ShouldConstrainToRootBounds</code> (Popup_Partial.cpp:951-970: false ⇒ a WINDOWED popup
        rendered in its own top-level window, placed against the monitor work area — Popup_Partial.cpp:1019
        <code>SetIsWindowed</code>). Default true (constrained to the window, like a non-windowed XAML popup). When the
        platform/host cannot create popup windows the overlay host silently falls back to constrained placement
        (WinUI's <code>DoesPlatformSupportWindowedPopup</code> gate, FlyoutBase_Partial.cpp:3188).
  example: []
