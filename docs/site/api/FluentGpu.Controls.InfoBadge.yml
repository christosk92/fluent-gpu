  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI InfoBadge: a small accent (or severity) pill that surfaces a notification count, an icon, or a bare dot.

    Three display kinds, resolved exactly as WinUI's <code>InfoBadge::OnDisplayKindPropertiesChanged</code> does:


    <ul><li><b>Value</b> (Value &gt;= 0): an 11px count, clamped to a 16-tall pill (single digits stay circular because

    WinUI's MeasureOverride squares a badge narrower than it is tall).</li><li><b>Icon</b> (Value &lt; 0, glyph supplied): a Segoe Fluent glyph in the same 16-tall pill, scaled by the WinUI

    IconPresenter Viewbox to the content-box height (8 for the padded Attention/Informational FontIcon styles and the

    SymbolIcon severities, 14 for an unpadded FontIcon — see <xref href="FluentGpu.Controls.InfoBadgeTemplateSettings" data-throw-if-not-resolved="false"></xref>).</li><li><b>Dot</b> (neither): a bare 4x4 disc.</li></ul>


    Background = AccentFillColorDefault (Default), or a SystemFillColor* per <xref href="FluentGpu.Controls.InfoBadgeSeverity" data-throw-if-not-resolved="false"></xref>; foreground =

    TextOnAccentFillColorPrimary. The corner radius is the computed pill (height/2) from

    <xref href="FluentGpu.Controls.InfoBadgeTemplateSettings" data-throw-if-not-resolved="false"></xref>.
  example: []
