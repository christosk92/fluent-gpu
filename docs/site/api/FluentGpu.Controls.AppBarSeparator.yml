  namespace: FluentGpu.Controls
  summary: >-
    A WinUI AppBarSeparator: a thin divider between groups of commands in a CommandBar. The default
        (FullSize/Compact) orientation is a 1px-wide VERTICAL line stretching the bar height with the
        <code>AppBarSeparatorMargin</code> 2,8,2,8 inset; the <code>Overflow</code> visual state flips it HORIZONTAL — full-width,
        1px tall, margin 0,4,0,4 (AppBarSeparator_themeresources.xaml:15-18 margins/sizes; :40-47 Overflow state setters).
        Fill = AppBarSeparatorForeground = DividerStrokeColorDefault (:5); RadiusX/Y = AppBarSeparatorCornerRadius 0.5 (:19).
