  summary: >-
    A reactive side-effect: runs <code class="paramref">body</code> once now, then re-runs whenever a signal it READ changes

    (deferred to the next <xref href="FluentGpu.Signals.ReactiveRuntime.Flush" data-throw-if-not-resolved="false"></xref>). A property binding (signal → scene node) is an Effect;

    a component render is a specialized effect. Dispose to stop it (also runs registered cleanups).
