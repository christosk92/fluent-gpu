  assemblies:
  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    Launch <code class="paramref">uri</code> in the OS default handler (browser/mail) — the WinUI
        <code>Launcher::TryInvokeLauncher</code> step of HyperlinkButton.OnClick (Click raised first at :166, then the
        launch at :172 — microsoft-ui-xaml dxaml\xcp\dxaml\lib\HyperLinkButton_Partial.cpp:149-177). Fire-and-forget
        on the UI thread; failures are swallowed (WinUI's TryInvokeLauncher is equally best-effort). Headless
        implementations record the URI instead of launching.
  example: []
  syntax:
    content: void OpenUri(string uri)
    parameters:
    - id: uri
      type: System.String
    content.vb: Sub OpenUri(uri As String)
