    id: GetWorkArea
    path: ../../src/FluentGpu.Pal/Pal.cs
    startLine: 100
  assemblies:
  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    The WORK AREA (desktop minus taskbar/docked bars) of the monitor containing <code class="paramref">screenPointPx</code>,

    in physical virtual-screen px — the multi-monitor placement seam WinUI's windowed popups use

    (Popup.cpp monitor-bounds placement; <code>DXamlCore::CalculateAvailableMonitorRect</code>,

    FlyoutBase_Partial.cpp:3382-3388 <code>useMonitorBounds = IsWindowedPopup()</code>). Win32 backs this with

    <code>MonitorFromPoint(MONITOR_DEFAULTTONEAREST)</code> + <code>GetMonitorInfoW().rcWork</code>; headless returns the

    configurable <code>WorkArea</code>. Default: unbounded (no monitor information available).
  example: []
  syntax:
    content: RectF GetWorkArea(Point2 screenPointPx)
    parameters:
    - id: screenPointPx
      type: FluentGpu.Foundation.Point2
    return:
      type: FluentGpu.Foundation.RectF
    content.vb: Function GetWorkArea(screenPointPx As Point2) As RectF
  overload: FluentGpu.Pal.IPlatformApp.GetWorkArea*
- uid: FluentGpu.Pal.IPlatformApp.CreatePopupWindow(FluentGpu.Pal.PopupWindowDesc@)
  commentId: M:FluentGpu.Pal.IPlatformApp.CreatePopupWindow(FluentGpu.Pal.PopupWindowDesc@)
  id: CreatePopupWindow(FluentGpu.Pal.PopupWindowDesc@)
  parent: FluentGpu.Pal.IPlatformApp
  langs:
  - csharp
  - vb
  name: CreatePopupWindow(in PopupWindowDesc)
  nameWithType: IPlatformApp.CreatePopupWindow(in PopupWindowDesc)
  fullName: FluentGpu.Pal.IPlatformApp.CreatePopupWindow(in FluentGpu.Pal.PopupWindowDesc)
  type: Method
  source:
    remote:
      path: src/FluentGpu.Pal/Pal.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: CreatePopupWindow
    path: ../../src/FluentGpu.Pal/Pal.cs
    startLine: 111
  assemblies:
  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    Create a top-level POPUP window (out-of-bounds overlay surface) owned by <xref href="FluentGpu.Pal.PopupWindowDesc.Owner" data-throw-if-not-resolved="false"></xref> —

    the engine analogue of WinUI's windowed <code>CPopup</code> (Popup_Partial.cpp:1019 <code>SetIsWindowed</code> creates an

    HWND via PopupSiteBridge so a flyout can render OUTSIDE the XAML window). Win32: a

    <code>WS_POPUP | WS_EX_NOACTIVATE | WS_EX_TOOLWINDOW | WS_EX_NOREDIRECTIONBITMAP</code> owned window that never takes

    activation (focus stays on the main window) and forwards its mouse input to the owner; headless: a recorder.

    Returns null when the platform cannot create popup windows (callers fall back to root-bounds-constrained

    placement — exactly WinUI's <code>CPopup::DoesPlatformSupportWindowedPopup</code> gate, FlyoutBase_Partial.cpp:3188).
  example: []
  syntax:
    content: IPlatformPopupWindow? CreatePopupWindow(in PopupWindowDesc desc)
    parameters:
    - id: desc
      type: FluentGpu.Pal.PopupWindowDesc
    return:
      type: FluentGpu.Pal.IPlatformPopupWindow
    content.vb: Function CreatePopupWindow(desc As PopupWindowDesc) As IPlatformPopupWindow
  overload: FluentGpu.Pal.IPlatformApp.CreatePopupWindow*
  nameWithType.vb: IPlatformApp.CreatePopupWindow(PopupWindowDesc)
  fullName.vb: FluentGpu.Pal.IPlatformApp.CreatePopupWindow(FluentGpu.Pal.PopupWindowDesc)
  name.vb: CreatePopupWindow(PopupWindowDesc)
