  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI-style ContentDialog: a modal, page-level smoke scrim with a centered solid card. The dialog is hosted through

    <xref href="FluentGpu.Controls.OverlayHost" data-throw-if-not-resolved="false"></xref> instead of being drawn inside the sample card, so it overlays the whole page.


    <p>1:1 with <code>ContentDialog_themeresources.xaml</code>:</p>

    <ul><li>Chrome — smoke #4D000000 (SmokeFillColorDefault), background SolidBackgroundFillColorBase, 1px

    SurfaceStrokeColorDefault border, OverlayCornerRadius 8, dialog padding 24 (ContentDialogPadding), title margin

    0,0,0,12 (ContentDialogTitleMargin), button spacing 8 (ContentDialogButtonSpacing), separator

    CardStrokeColorDefault 0,0,0,1, Min/Max 320×184 / 548×756 (:12-15).</li><li>Motion — open: scale 1.05→1.0 over ControlNormal (250ms) + opacity 0→1 over ControlFaster (83ms, linear);

    close: scale 1.0→1.05 over ControlFast (167ms) + opacity 1→0 over 83ms; both scale legs on the

    ControlFastOutSlowInKeySpline (0,0,0,1) — ContentDialog_themeresources.xaml:77-117 DialogShowing/Hidden

    transitions, driven by the OverlayHost's Modal chrome.</li><li>Keyboard — Enter invokes the <xref href="FluentGpu.Controls.ContentDialog.DefaultButton" data-throw-if-not-resolved="false"></xref> (the accent-styled one); Escape closes with

    <xref href="FluentGpu.Controls.ContentDialogResult.None" data-throw-if-not-resolved="false"></xref> (the overlay's Escape preview); Tab/Shift-Tab CYCLE inside the dialog

    (DialogShowing sets BackgroundElement.TabFocusNavigation=Cycle, :123 — a REAL dispatcher focus scope via the

    host's PopupOptions.FocusTrap). Initial focus lands on the default button (TabIndex ranks it first).</li></ul>
