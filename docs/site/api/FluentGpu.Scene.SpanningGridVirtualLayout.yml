  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Uniform-row grid with ITEM SPANNING (E11-L0): each item occupies <code>SpanOf(i)</code> columns (clamped 1..Columns) and

    items pack row-major — a span that doesn't fit the current row wraps to the next (the "hero as the first full-width

    row" shape: <code>SpanOf(0) == Columns</code>). Placement depends only on the item count (not cross size), so the table

    rebuilds only on count change; windowing binary-searches the monotonic row column. STATEFUL — create once and reuse.
  example: []
  syntax:
    content: 'public sealed class SpanningGridVirtualLayout : IVirtualLayout'
    content.vb: Public NotInheritable Class SpanningGridVirtualLayout Implements IVirtualLayout
