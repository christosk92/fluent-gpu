  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    The node currently lifted by an active item-drag (E5 ghost) — set/cleared by
        <code>Input.DragController</code> at promotion/restore (the node also carries <xref href="FluentGpu.Foundation.NodeFlags.DragGhost" data-throw-if-not-resolved="false"></xref>).
        The recorder EXCLUDES it from the clipped main pass and re-walks its subtree in an UNCLIPPED top band emitted
        last, so the lifted visual escapes every ancestor scissor and paints above overlays. Null = no drag.
  example: []
  syntax:
    content: public NodeHandle DragGhost { get; set; }
    parameters: []
    return:
      type: FluentGpu.Foundation.NodeHandle
    content.vb: Public Property DragGhost As NodeHandle
  overload: FluentGpu.Scene.SceneStore.DragGhost*
