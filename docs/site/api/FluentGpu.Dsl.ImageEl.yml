    id: AspectRatio
    path: ../../src/FluentGpu.Dsl/Element.cs
    startLine: 477
  assemblies:
  - FluentGpu.Dsl
  namespace: FluentGpu.Dsl
  summary: >-
    Width÷height ratio (CSS <code>aspect-ratio</code>). When set, a fluid image (one or both of
        <xref href="FluentGpu.Dsl.ImageEl.Width" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Dsl.ImageEl.Height" data-throw-if-not-resolved="false"></xref> left <code>NaN</code>) <i>derives</i> the missing dimension — e.g. a tile that
        fills its column width and stays square (<code>1f</code>). The thing WinUI lacks (no SizeChanged/Viewbox hacks).
        <code>NaN</code> = off (use explicit <xref href="FluentGpu.Dsl.ImageEl.Width" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Dsl.ImageEl.Height" data-throw-if-not-resolved="false"></xref>).
  example: []
