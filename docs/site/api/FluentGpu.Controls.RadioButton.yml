  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI RadioButton — style values from microsoft-ui-xaml controls\dev\CommonStyles\RadioButton_themeresources.xaml

    ("the template"; ThemeDictionaries Default=dark :4-61 / Light :120-177): a 20px ring (OuterEllipse/CheckOuterEllipse,

    :371/373) + (when selected) a TextOnAccent dot (CheckGlyph, :374) that grows 12→14 on hover / shrinks →10 on press

    over ControlNormalAnimationDuration (250ms) with the ControlFastOutSlowInKeySpline (:255-260/:292-297), plus the

    unchecked-pressed 4px proto-dot (PressedCheckGlyph, :376) revealing toward 10 over ControlFastAnimationDuration

    (167ms, :298-306). Mutual exclusion comes from a shared selected index — use <xref href="FluentGpu.Controls.RadioButton.Group(System.Collections.Generic.IReadOnlyList%7bSystem.String%7d%2cSystem.Int32%2cSystem.Action%7bSystem.Int32%7d%2cSystem.Boolean%2cFluentGpu.Controls.RadioButton.Style%2cSystem.Boolean%2cFluentGpu.Dsl.TemplateParts)" data-throw-if-not-resolved="false"></xref> (an ad-hoc set) or

    the full <xref href="FluentGpu.Controls.RadioButtons" data-throw-if-not-resolved="false"></xref> container (header, columns, roving keyboard). Controlled.
