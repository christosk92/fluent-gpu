  summary: >-
    The pane surface (WinUI PaneRoot's inner Border) — mounted while the pane is open OR while a compact
        rail shows. Owned: Width (always the full OpenPaneLength — the compact rail CLIPS it), OnRealized (the
        focus-contract handle capture, chained), Children (the pane content slot).
