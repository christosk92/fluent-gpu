    - id: panePlacement
      type: FluentGpu.Controls.SplitViewPanePlacement
    - id: compactPaneLength
      type: System.Single
      description: >-
        WinUI <code>CompactPaneLength</code> — default 48 (SplitViewCompactPaneThemeLength,
            SplitView_themeresources.xaml:6).
    - id: setIsPaneOpen
      type: System.Action{System.Boolean}
      description: >-
