    parameters:
    - id: pane
      type: FluentGpu.Dsl.Element
      description: The pane content (WinUI <code>SplitView.Pane</code>).
    - id: content
      type: FluentGpu.Dsl.Element
      description: The main content (WinUI <code>SplitView.Content</code>).
    - id: paneWidth
      type: System.Single
      description: >-
        WinUI <code>OpenPaneLength</code> — default 320 (SplitViewOpenPaneThemeLength,
