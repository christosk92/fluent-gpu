  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    E5-L3 — drag-reorder for ANY one-axis item list (incl. <code>Virtual.List</code>), composed from the engine layers

    beneath it (plan Part B E5; user ruling: the Flutter Draggable/DragTarget + react-beautiful-dnd + SwiftUI model,

    deliberately NOT WinUI's OLE loop): each item is an L2 <xref href="FluentGpu.Foundation.DragSource" data-throw-if-not-resolved="false"></xref> of <xref href="FluentGpu.Controls.Reorderable.Kind" data-throw-if-not-resolved="false"></xref>, the list

    body is ONE accepting <xref href="FluentGpu.Foundation.DropTargetSpec" data-throw-if-not-resolved="false"></xref>, the slot math is <xref href="FluentGpu.Controls.ReorderList" data-throw-if-not-resolved="false"></xref> (WinUI's midpoint

    rule + live-reorder dwell — ListViewBase_Partial_Reorder.cpp:984-1063, :50-51), sibling displacement is the

    engine FLIP pipeline (each wrapped item carries a <code>LayoutTransition</code>; re-rendering the PROJECTED order moves

    them through their springs), the ghost/lift visuals and the drop-glide are L1 <code>DragController</code>, and edge

    auto-scroll is engine-level in <code>DragDropContext</code> (WinUI's 100px/150–1500px/s gradient) — this class adds none

    of those mechanics, only the list semantics.


    Usage (inside a component render):


    <pre><code class="lang-csharp">var ro = UseMemo(() =&gt; new Reorderable("track") { OnReorder = (f, t) =&gt; Move(tracks, f, t) });

    ro.Scene = Context.Scene; ro.RequestRender = Context.RequestRerender;

    ro.ItemCount = tracks.Count; ro.ItemExtent = 48f;

    return ro.List(Virtual.List(tracks.Count, 48f,
        slot =&gt; ro.Item(ro.ItemAt(slot), RowFor(tracks[ro.ItemAt(slot)]), key: tracks[ro.ItemAt(slot)].Id)));</code></pre>

    Render slots through <xref href="FluentGpu.Controls.Reorderable.ItemAt(System.Int32)" data-throw-if-not-resolved="false"></xref> with STABLE per-item keys: mid-drag the projection moves the dragged

    item to the dwell-committed slot, the keyed diff keeps node identity, and the FLIP pass animates the displaced

    siblings (the part-to-make-room motion) while <code>DragController.Move</code> re-anchors the pointer-held visual.


    CROSS-LIST: two Reorderables sharing a Kind. The target list accepts the foreign session, shows the insertion

    line while hovered, and on drop routes the ONE <xref href="FluentGpu.Controls.Reorderable.OnCrossCommit" data-throw-if-not-resolved="false"></xref> (target's, else the source's) —

    the source's gesture completion then cancels its local reorder instead of committing (no double mutation).


    KEYBOARD lift mode (the react-beautiful-dnd a11y pattern): Space on a focused item lifts it (a pointer-free

    reorder; the item dims to the L1 drag opacity with the lifted shadow), Up/Down (Left/Right when

    <xref href="FluentGpu.Controls.Reorderable.Horizontal" data-throw-if-not-resolved="false"></xref>) move the insertion slot with NO dwell, Space drops (commits), Escape cancels, and

    focus leaving the lifted item cancels. All slot moves re-render the projection → FLIP animates them.
