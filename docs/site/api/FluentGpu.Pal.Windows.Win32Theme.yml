    id: ApplyWindowMaterial
    path: ../../src/FluentGpu.Pal.Windows/Win32Theme.cs
    startLine: 74
  assemblies:
  - FluentGpu.Pal.Windows
  namespace: FluentGpu.Pal.Windows
  summary: >-
    Dark titlebar + the Mica system backdrop (Windows 11). Mica shows through transparent client pixels.
        <code class="paramref">customFrame</code> = the engine draws the titlebar (WindowDesc.CustomFrame): the frame extension is
        ZERO — the Windows Terminal Mica rule (`_useMica ? 0`). Any non-zero margin lets DWM paint caption visuals over
        the client (a -1 sheet-of-glass composites its OWN min/max/close — the "double caption buttons" bug; even a 1px
        sliver draws a DWM strip and re-anchors the Win11 snap flyout off the extended frame). The Mica backdrop fills
        the whole window from DWMWA_SYSTEMBACKDROP_TYPE alone — no frame extension needed.
  example: []
  syntax:
    content: public static void ApplyWindowMaterial(nint hwnd, bool dark, bool mica = true, bool customFrame = false)
    parameters:
    - id: hwnd
      type: System.IntPtr
    - id: dark
      type: System.Boolean
    - id: mica
      type: System.Boolean
    - id: customFrame
      type: System.Boolean
    content.vb: Public Shared Sub ApplyWindowMaterial(hwnd As IntPtr, dark As Boolean, mica As Boolean = True, customFrame As Boolean = False)
