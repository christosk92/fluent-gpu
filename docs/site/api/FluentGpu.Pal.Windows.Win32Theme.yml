  summary: >-
    The OS-derived <code>SystemAccentColorLight2</code> shade — what WinUI uses for the dark-theme accent button fill

    (lighter than the base accent). Read from the AccentPalette blob: 8×RGBA entries, index 1 = Light2 (bytes 4..6).
