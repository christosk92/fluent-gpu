    startLine: 42
  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    The non-editable ComboBox dropdown: width-matched and laid OVER the field — the popup's top-left sits
        at the (caller-shifted) anchor origin so the SELECTED item lines up over the closed field (the WinUI ComboBox
        positions its own popup via TemplateSettings.DropDownOffset, not FlyoutBase). Clamped into the container;
        no corner join (the popup keeps OverlayCornerRadius on all corners and overlaps the field).
  example: []
  syntax:
    content: OverlapStretch = 18
    return:
      type: FluentGpu.Controls.FlyoutPlacement
