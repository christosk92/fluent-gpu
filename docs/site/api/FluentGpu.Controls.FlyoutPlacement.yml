  summary: >-
    Where a flyout opens relative to its anchor — the full WinUI <code>FlyoutPlacementMode</code> matrix

    (FlyoutBase_Partial.cpp:84-110 maps each mode to a major side + an edge justification) plus the engine's

    pre-existing aliases kept for source compatibility:


    <ul><li><xref href="FluentGpu.Controls.FlyoutPlacement.BottomLeft" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.FlyoutPlacement.TopLeft" data-throw-if-not-resolved="false"></xref> ≡ WinUI <code>BottomEdgeAlignedLeft</code>/<code>TopEdgeAlignedLeft</code>.</li><li><xref href="FluentGpu.Controls.FlyoutPlacement.BottomCenter" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.FlyoutPlacement.TopCenter" data-throw-if-not-resolved="false"></xref> ≡ WinUI <code>Bottom</code>/<code>Top</code> (center-justified).</li><li><xref href="FluentGpu.Controls.FlyoutPlacement.BottomStretch" data-throw-if-not-resolved="false"></xref> = the attached ComboBox/AutoSuggest dropdown (flush, width-matched, corner-joined)
      — not a FlyoutBase mode; WinUI ComboBox places its own popup over/under the field.</li></ul>
  example: []
  syntax:
    content: 'public enum FlyoutPlacement : byte'
    content.vb: Public Enum FlyoutPlacement As Byte
