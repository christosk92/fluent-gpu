  assemblies:
  - FluentGpu.Reconciler
  namespace: FluentGpu.Reconciler
  summary: >-
    Signals-first BOUND row template (the recycler fast path): the template runs ONCE per visible slot
        with an index SIGNAL; scrolling rebinds a slot by writing its signal, so only the row's reactive binds
        (TextBind/FillBind/SourceBind/…) re-run — zero element rebuild, zero reconcile, zero keys. When set,
        <xref href="FluentGpu.Reconciler.VirtualListEl.RenderItem" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Reconciler.VirtualListEl.KeyOf" data-throw-if-not-resolved="false"></xref> are ignored.
  example: []
