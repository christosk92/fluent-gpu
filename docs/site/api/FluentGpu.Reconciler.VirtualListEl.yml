  assemblies:
  - FluentGpu.Reconciler
  namespace: FluentGpu.Reconciler
  summary: >-
    A virtualized collection viewport: ONE retained node + a window of keyed children. Each frame the visible range is

    dirty, the reconciler asks the <xref href="FluentGpu.Reconciler.VirtualListEl.Layout" data-throw-if-not-resolved="false"></xref> for <code>[first,last)</code>, calls <xref href="FluentGpu.Reconciler.VirtualListEl.RenderItem" data-throw-if-not-resolved="false"></xref> for just

    that window, keys each row, and feeds it to the existing keyed-LIS diff — so recycling IS CreateNode/FreeNode over

    the slab free-list (no second pool). Scroll is layout-free (the <code>-ScrollOffset</code> is the content's transform).


    <xref href="FluentGpu.Reconciler.VirtualListEl.Layout" data-throw-if-not-resolved="false"></xref> is a pluggable <xref href="FluentGpu.Scene.IVirtualLayout" data-throw-if-not-resolved="false"></xref> (stack / grid / custom — pure, allocation-free).

    E11-L1: the viewport consumes BOTH seam kinds — an <xref href="FluentGpu.Scene.IMeasuredVirtualLayout" data-throw-if-not-resolved="false"></xref> gets the variable-extent

    estimate-then-correct arrange (measured rows + scroll anchoring) through the SAME property; when the layout is

    null, the legacy built-in Fenwick extent-table path runs (kept source/behavior-compatible).

    The user-facing <code>Virtual.List/Grid/Custom/Measured/VariableList/…</code> factories live in FluentGpu.Controls; this

    record is the engine primitive the reconciler diffs directly (ElementTypeId 6). See <code>design/subsystems/virtualization.md</code>.
