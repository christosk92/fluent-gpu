  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A pluggable layout for <xref href="FluentGpu.Controls.Repeater.ItemsRepeater(System.Int32%2cSystem.Func%7bSystem.Int32%2cFluentGpu.Dsl.Element%7d%2cFluentGpu.Controls.RepeatLayout%40%2cSystem.Func%7bSystem.Int32%2cSystem.String%7d%2cSystem.Int32%2cSystem.Action%7bSystem.Int32%7d%2cSystem.Action%7bSystem.Int32%7d%2cSystem.Action%7bSystem.Int32%2cSystem.Int32%7d%2cSystem.Action%7bSystem.Int32%2cSystem.Int32%7d%2cSystem.Nullable%7bFluentGpu.Controls.ItemCollectionTransition%7d)" data-throw-if-not-resolved="false"></xref> — the equivalent of WinUI's <code>Layout</code> object. A

    readonly struct (no per-call allocation). Stack/Grid/Custom virtualize (only the window is realized); Wrap/Inline

    are non-virtual (build the whole child list — use for SMALL collections like a nav pane or a toolbar).

    Measured/LinedFlow/SpanGrid/HorizontalGrid ride the Custom slot (every layout object IS an

    <xref href="FluentGpu.Scene.IVirtualLayout" data-throw-if-not-resolved="false"></xref>; variable-extent ones are <xref href="FluentGpu.Scene.IMeasuredVirtualLayout" data-throw-if-not-resolved="false"></xref> — E11-L0's one seam).

    NOTE: the stateful layouts (Measured/LinedFlow/SpanGrid/Grouped) own realize tables — when the OWNING component

    re-renders, hoist the layout instance (e.g. <code>UseMemo</code>) instead of calling the factory inline each render.
