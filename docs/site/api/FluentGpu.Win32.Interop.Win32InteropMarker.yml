  summary: >-
    SCAFFOLD. Owner of the hand-vtable COM layer (see design/subsystems/com-interop.md): vendored ComputeSharp

    <code>ComPtr&lt;T&gt;</code> + ClangSharp-generated D3D12/DXGI/D2D1 bindings, and the generated DComp/DWrite/UIA vtables

    (consume = <code>lpVtbl[n]</code> calli; implement = static <code>[UnmanagedCallersOnly(CallConvMemberFunction)]</code> + GCHandle).

    Empty until the Windows leaves are implemented; the headless slice does not need it.
