  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Grouped flat list with measured rows (E11-L0 grouping hook): the items are a FLATTENED projection — group headers

    occupy indices of their own (a header is just a measured item KIND, the app-requirements "Liked Songs" shape).

    <xref href="FluentGpu.Scene.GroupedListVirtualLayout.HeaderIndices" data-throw-if-not-resolved="false"></xref> must be sorted ascending. Headers seed at <xref href="FluentGpu.Scene.GroupedListVirtualLayout.HeaderEstimate" data-throw-if-not-resolved="false"></xref>, items at

    <xref href="FluentGpu.Scene.GroupedListVirtualLayout.ItemEstimate" data-throw-if-not-resolved="false"></xref>; both correct to measured extents. <xref href="FluentGpu.Scene.GroupedListVirtualLayout.StickyHeaderIndexAt(System.Single)" data-throw-if-not-resolved="false"></xref> is the

    sticky-header support hook: the header that should pin for a given scroll offset (binary search, O(log groups)) —

    consumers (ItemsView / a custom list) translate that header's realized node by the pin delta at phase 7

    (<code>NodeFlags.StickyPinned</code>). Vertical scroll. STATEFUL — create once and reuse (see MeasuredStackVirtualLayout).
  example: []
  syntax:
