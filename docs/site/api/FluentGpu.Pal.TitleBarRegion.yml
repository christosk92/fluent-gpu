  assemblies:
  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    One reported titlebar region: a rect in CLIENT DIP (the engine's space) + its non-client classification.
        Pushed on titlebar relayout only (push-on-change — never per frame). First match wins at hit-test, so callers list
        interactive islands and buttons BEFORE the catch-all <xref href="FluentGpu.Pal.TitleBarHit.Caption" data-throw-if-not-resolved="false"></xref> band.
