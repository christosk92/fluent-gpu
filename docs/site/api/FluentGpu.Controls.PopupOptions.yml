  nameWithType: PopupOptions.ConstrainToRootBounds
  fullName: FluentGpu.Controls.PopupOptions.ConstrainToRootBounds
  type: Property
  source:
    remote:
      path: src/FluentGpu.Controls/OverlayHost.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: ConstrainToRootBounds
    path: ../../src/FluentGpu.Controls/OverlayHost.cs
    startLine: 70
  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI <code>Popup.ShouldConstrainToRootBounds</code> (Popup_Partial.cpp:951-970: read-only false for WINDOWED popups;

    FlyoutBase_Partial.cpp:3181-3205 <code>SetIsWindowedPopup</code>). Default TRUE = the popup is clamped inside the

    window (today's behavior). Set FALSE where WinUI windows its popups (menus, ComboBox tall dropdowns,

    CommandBarFlyout): the host then asks the platform for a top-level popup window, places against the MONITOR

    work area, and renders the subtree into the popup window's own swapchain. Falls back to constrained placement

    when the platform/host cannot create popup windows (WinUI's <code>DoesPlatformSupportWindowedPopup</code> gate).

    Stored inverted so <code>default(PopupOptions)</code> stays constrained.
  example: []
  syntax:
    content: public bool ConstrainToRootBounds { get; init; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property ConstrainToRootBounds As Boolean
  overload: FluentGpu.Controls.PopupOptions.ConstrainToRootBounds*
