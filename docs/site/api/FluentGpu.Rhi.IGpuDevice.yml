  type: Method
  source:
    remote:
      path: src/FluentGpu.Rhi/Rhi.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: UploadImage
    path: ../../src/FluentGpu.Rhi/Rhi.cs
    startLine: 27
  assemblies:
  - FluentGpu.Rhi
  namespace: FluentGpu.Rhi
  summary: >-
    Hand decoded PREMULTIPLIED BGRA8 pixels for <code class="paramref">imageId</code> to the backend (the
        media-pipeline §4.1 texture upload). The backend create-or-replaces a resident texture (or atlas page) keyed by
        id and samples it from the <code>DrawImage</code> opcode. <code class="paramref">pbgra8</code> is valid only for this call —
        the backend copies it into its texture-staging ring; it is never retained. Rows may not be 256-aligned; the
        backend pads. Called once per decode completion, before <xref href="FluentGpu.Rhi.IGpuDevice.SubmitDrawList(System.ReadOnlySpan%7bSystem.Byte%7d%2cSystem.ReadOnlySpan%7bSystem.UInt64%7d%2cFluentGpu.Rhi.FrameInfo%40)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: void UploadImage(int imageId, ReadOnlySpan<byte> pbgra8, int w, int h)
    parameters:
    - id: imageId
      type: System.Int32
    - id: pbgra8
      type: System.ReadOnlySpan{System.Byte}
    - id: w
      type: System.Int32
    - id: h
      type: System.Int32
    content.vb: Sub UploadImage(imageId As Integer, pbgra8 As ReadOnlySpan(Of Byte), w As Integer, h As Integer)
  overload: FluentGpu.Rhi.IGpuDevice.UploadImage*
  nameWithType.vb: IGpuDevice.UploadImage(Integer, ReadOnlySpan(Of Byte), Integer, Integer)
  fullName.vb: FluentGpu.Rhi.IGpuDevice.UploadImage(Integer, System.ReadOnlySpan(Of Byte), Integer, Integer)
  name.vb: UploadImage(Integer, ReadOnlySpan(Of Byte), Integer, Integer)
