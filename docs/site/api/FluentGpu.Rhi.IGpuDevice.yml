  summary: >-
    Graphics-first render hardware interface. Zero COM types cross this seam — generational handles + POD + spans only.

    <xref href="FluentGpu.Rhi.IGpuDevice.SubmitDrawList(System.ReadOnlySpan%7bSystem.Byte%7d%2cSystem.ReadOnlySpan%7bSystem.UInt64%7d%2cFluentGpu.Rhi.FrameInfo%40)" data-throw-if-not-resolved="false"></xref> is the PRIMARY hot path: the leaf walks the POD opcode stream with concrete devirtualized

    types. D3D12 is the reference backend; <code>Rhi.Headless</code> is the test backend; Metal slots in later behind this seam.
