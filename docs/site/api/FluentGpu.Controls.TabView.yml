  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI TabView (controls\dev\TabView): a horizontal strip of tab headers atop the selected tab's content.
        The control OWNS its live tab collection (the WinUI <code>TabItems</code> vector, TabView.idl:135), seeded once from
        <xref href="FluentGpu.Controls.TabView.Items" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.TabView.Tabs" data-throw-if-not-resolved="false"></xref> at mount: the close button / middle-click / Ctrl+F4 remove the tab (after
        raising <xref href="FluentGpu.Controls.TabView.OnTabCloseRequested" data-throw-if-not-resolved="false"></xref>) with WinUI's reselect-at-the-removed-index rule (TabView.cpp:786-812);
        the add button appends what <xref href="FluentGpu.Controls.TabView.OnAddTabButtonClick" data-throw-if-not-resolved="false"></xref> returns; pointer drag reorders tabs
        (<xref href="FluentGpu.Controls.TabView.CanReorderTabs" data-throw-if-not-resolved="false"></xref>, default true). Equal width mode clamps tabs to 100–240px of the measured strip;
        overflowing tabs scroll behind 32×24 repeat scroll buttons (±50px, disabled at the extremes) and the selected tab
        is auto-scrolled into view. The selected header uses the SolidBackgroundFillColorTertiary surface and fuses flush
        with the content area (the strip's 1px CardStroke baseline is per-tab and omitted under the selected header).
        Per-part restyling goes through <xref href="FluentGpu.Controls.TabView.Parts" data-throw-if-not-resolved="false"></xref> (see <xref href="FluentGpu.Dsl.TemplateParts" data-throw-if-not-resolved="false"></xref> for the contract).
  example: []
  syntax:
    content: 'public sealed class TabView : Component'
    content.vb: Public NotInheritable Class TabView Inherits Component
