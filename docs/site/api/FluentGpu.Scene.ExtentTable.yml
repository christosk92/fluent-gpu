  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Per-item extent table for variable-height virtualization: a Fenwick tree / Binary Indexed Tree giving O(log n)

    <xref href="FluentGpu.Scene.ExtentTable.OffsetOf(System.Int32)" data-throw-if-not-resolved="false"></xref> (prefix-sum → position a row) and <xref href="FluentGpu.Scene.ExtentTable.IndexAt(System.Single)" data-throw-if-not-resolved="false"></xref> (binary-lift → which item is at a

    scroll offset), with estimate-then-correct extents (an unmeasured item uses the estimate; on realize+measure

    <xref href="FluentGpu.Scene.ExtentTable.SetExtent(System.Int32%2cSystem.Single)" data-throw-if-not-resolved="false"></xref> corrects it, O(log n)). It persists across frames (only deltas update) and survives a

    fling because corrections are O(measured-rows). 100k items × 8B ≈ 800KB — within budget.


    (virtualization.md §6.2 / layout.md §8.4 — the table MATH. It lives here in <code>FluentGpu.Scene</code> because both

    Layout and the Reconciler depend on Scene; double-precision prefix sums keep it exact at 100k×100px.)
