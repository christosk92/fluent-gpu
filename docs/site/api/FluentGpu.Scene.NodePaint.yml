    path: ../../src/FluentGpu.Scene/Columns.cs
    startLine: 124
  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Flat opacity group opt-in (WinUI Composition LayerVisual semantics): when set and the node's resolved
        opacity &lt; 1, the recorder wraps the subtree in PushLayer{Opacity}…PopLayer — children render at FULL alpha
        offscreen and composite ONCE at the group alpha, so overlapping children don't double-blend. Default false =
        plain multiplied opacity (WinUI Visual.Opacity's per-visual behavior, the engine default).
