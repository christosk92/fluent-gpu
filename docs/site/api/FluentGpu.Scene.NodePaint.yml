    path: ../../src/FluentGpu.Scene/Columns.cs
    startLine: 119
  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Text decoration flags for a <xref href="FluentGpu.Scene.VisualKind.Text" data-throw-if-not-resolved="false"></xref> leaf (<xref href="FluentGpu.Scene.NodePaint.UnderlineBit" data-throw-if-not-resolved="false"></xref> |
        <xref href="FluentGpu.Scene.NodePaint.StrikethroughBit" data-throw-if-not-resolved="false"></xref>; 0 = none). The recorder emits the bars itself — FillRoundRect quads placed by
        the face metrics cached on <xref href="FluentGpu.Scene.TextMeasureCache" data-throw-if-not-resolved="false"></xref> (no new opcode), colored with the SAME resolved
        foreground (hover/press ramps + BrushTransition) as the glyph run — matching DWrite, which draws decorations
        from the face's underline position/thickness rather than glyph geometry. Written by the reconciler from
        <code>TextEl.Underline</code>/<code>Strikethrough</code> (WinUI <code>TextDecorations</code>; HyperlinkButton underlines only when
        the HyperlinkUnderlineVisible directive is set or under HighContrast — HyperLinkButton_Partial.cpp:207-212).
