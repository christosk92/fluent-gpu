  summary: >-
    Source mapping for one laid glyph — the hit-test companion to <xref href="FluentGpu.Text.DirectWrite.LaidGlyph" data-throw-if-not-resolved="false"></xref> (parallel to
        <xref href="FluentGpu.Text.DirectWrite.TextLayoutEngine.Glyphs" data-throw-if-not-resolved="false"></xref> minus the synthetic trim ellipsis): the UTF-16 index of the cluster's first
        source char (taken from the shaper's cluster map, never re-derived from char counts), the glyph's leading pen X and
        advance on its line, and its line index. Entries are stored in the VISUAL order glyphs were placed (after BiDi L2
        reordering), so an in-order scan walks the line left→right.
  example: []
