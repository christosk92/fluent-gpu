  namespace: FluentGpu.Foundation
  summary: >-
    Which vertical band a text line reports as its box (mirrors WinUI TextLineBounds, minimum set —
        TrimToCapHeight/TrimToBaseline individually are not modeled). Full — the WinUI BaseTextBlockStyle default
        (TextBlock_themeresources.xaml:17) — is the font-natural ascent..descent box; Tight trims the box to
        cap-height..baseline so vertical centering is optical (e.g. PersonPicture initials, PersonPicture.xaml:66).
  example: []
  syntax:
    content: 'public enum TextLineBounds : byte'
    content.vb: Public Enum TextLineBounds As Byte
