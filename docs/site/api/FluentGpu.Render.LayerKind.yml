  name: Opacity
  nameWithType: LayerKind.Opacity
  fullName: FluentGpu.Render.LayerKind.Opacity
  type: Field
  source:
    remote:
      path: src/FluentGpu.Render/DrawList.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: Opacity
    path: ../../src/FluentGpu.Render/DrawList.cs
    startLine: 45
  assemblies:
  - FluentGpu.Render
  namespace: FluentGpu.Render
  summary: >-
    Flat opacity group (WinUI Composition LayerVisual semantics): the subtree between Push/Pop renders at
        FULL alpha into a pooled offscreen RT, then composites ONCE over the canvas at <xref href="FluentGpu.Render.PushLayerCmd.GroupAlpha" data-throw-if-not-resolved="false"></xref>
        — overlapping children do not double-blend (unlike the default per-node multiplied opacity, which matches
        WinUI's plain Visual.Opacity). Tint/blur fields are unused for this kind.
  example: []
  syntax:
    content: Opacity = 1
    return:
      type: FluentGpu.Render.LayerKind
