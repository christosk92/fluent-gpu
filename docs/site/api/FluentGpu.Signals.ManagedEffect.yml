  summary: >-
    A subclassable reactive computation for callers that own the run body (e.g. a component render-effect that re-runs

    <code>Render()</code> + reconciles its subtree). The host calls Schedule behaviour via the runtime; subclasses

    implement <xref href="FluentGpu.Signals.ManagedEffect.Execute" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: 'public abstract class ManagedEffect : Computation, IDisposable'
    content.vb: Public MustInherit Class ManagedEffect Inherits Computation Implements IDisposable
