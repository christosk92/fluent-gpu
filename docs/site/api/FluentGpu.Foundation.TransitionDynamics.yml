  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    The dynamics of a transition. Springs are the default (interruptible, jump-free retarget): <code>Response</code> ≈ the

    settle time in seconds, <code>DampingRatio</code> 1 = critical (no overshoot), &lt;1 = bouncy. A tween is opt-in:

    fixed <code>DurationMs</code> + <code>Easing</code> (an <xref href="FluentGpu.Foundation.EasingSpec" data-throw-if-not-resolved="false"></xref>, so authored WinUI KeySplines are expressible;

    a default spec is normalized by the engine to <xref href="FluentGpu.Foundation.Easing.FluentDecelerate" data-throw-if-not-resolved="false"></xref>). Stored as scalars

    (not the AnimEngine's <code>SpringParams</code>) so the spec can live in Foundation; the engine converts at seed time.

    A <code>default</code> value (all zero) is normalized by the engine to the spring defaults.
