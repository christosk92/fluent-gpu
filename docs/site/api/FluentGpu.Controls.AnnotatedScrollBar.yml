  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    The interactive control. <code class="paramref">position01</code> is the normalized scroll position signal (0..1) —

    writes move the thumb compositor-instantly; <code class="paramref">onScroll</code> receives every user scroll

    (new position, kind); <code class="paramref">onScrolling</code> (optional) may return false to CANCEL a scroll (the WinUI

    Scrolling.Cancel seam); <code class="paramref">smallChange01</code> is the button step (default 0.05 — the SmallChange

    auto-value stands in for viewport/ratio, cpp:484-489); <code class="paramref">detailLabel</code> resolves the hover chip

    text from a position; <code class="paramref">parts</code> = per-part styling keyed by the <code>PartXxx</code> consts (see

    <xref href="FluentGpu.Dsl.TemplateParts" data-throw-if-not-resolved="false"></xref> for the contract).
