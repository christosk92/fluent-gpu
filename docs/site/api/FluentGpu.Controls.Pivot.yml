  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI Pivot: a row of large (24px SemiLight, −25/1000em tracking) text headers above a content region.
        Selection is shown by a 3px accent pipe bottom-pinned under the selected header (NOT bold weight): the selected
        header is <xref href="FluentGpu.Dsl.Tok.TextPrimary" data-throw-if-not-resolved="false"></xref>, the rest <xref href="FluentGpu.Dsl.Tok.TextSecondary" data-throw-if-not-resolved="false"></xref>; hover/press move BOTH legs to
        SystemControlHighlightAltBaseMediumHigh (Pivot_themeresources.xaml:48-52). Clicking a header — or Left/Right/Home/
        End on the focused header strip (ONE tab stop, Pivot_Partial.cpp:2939-2982) and Ctrl+PageUp/PageDown from anywhere
        inside (:950-966) — swaps the content below with the WinUI directional fly-in. Uncontrolled by default (owns its
        selection); pass <code>selectedIndex</code> to control it and observe changes through <code>onSelectionChanged</code> (WinUI
        SelectedIndex + SelectionChanged, Pivot_Partial.h:375/:384). Per-tab content comes from the optional <code>content</code>
        factory (WinUI PivotItem). Per-part restyling goes through <xref href="FluentGpu.Dsl.TemplateParts" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: 'public sealed class Pivot : Component'
    content.vb: Public NotInheritable Class Pivot Inherits Component
