  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    The Fenwick variable-extent list behind the <xref href="FluentGpu.Scene.IMeasuredVirtualLayout" data-throw-if-not-resolved="false"></xref> seam (E11-L0): every row starts at

    <xref href="FluentGpu.Scene.MeasuredStackVirtualLayout.Estimate" data-throw-if-not-resolved="false"></xref>, gets corrected to its measured extent on realize, and the layout engine re-pins the scroll

    anchor across corrections. Functionally the engine's legacy <code>Layout = null</code> variable path (kept for

    compatibility), but USER-REACHABLE: compose it, subclass the idea, or build your own measured layout on the same

    contract. STATEFUL (owns an <xref href="FluentGpu.Scene.ExtentTable" data-throw-if-not-resolved="false"></xref>) — create ONCE and reuse across renders (hoist in a

    <code>UseMemo</code>); the table self-rebuilds only on item-count change.
  example: []
  syntax:
    content: 'public sealed class MeasuredStackVirtualLayout : IMeasuredVirtualLayout, IVirtualLayout'
    content.vb: Public NotInheritable Class MeasuredStackVirtualLayout Implements IMeasuredVirtualLayout, IVirtualLayout
