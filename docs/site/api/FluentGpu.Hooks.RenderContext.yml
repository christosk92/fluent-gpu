  assemblies:
  - FluentGpu.Hooks
  namespace: FluentGpu.Hooks
  summary: >-
    Per-component hook storage (ordered; rules-of-hooks = stable call order). In the signals-first model a component

    is a reactive computation (its render-effect); <xref href="FluentGpu.Hooks.RenderContext.UseState%60%601(%60%600)" data-throw-if-not-resolved="false"></xref> is a <xref href="FluentGpu.Signals.Signal%601" data-throw-if-not-resolved="false"></xref> whose only

    subscriber is that render-effect, so a setState re-renders ONLY this component's subtree (granular), and

    <xref href="FluentGpu.Hooks.RenderContext.UseContext%60%601(FluentGpu.Hooks.Context%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref> subscribes the render-effect to the provider's signal so a context change propagates to

    exactly the consumers that read it. High-frequency scalars get <xref href="FluentGpu.Hooks.RenderContext.UseSignal%60%601(%60%600)" data-throw-if-not-resolved="false"></xref> bound straight to a node

    channel — no re-render at all.
  example: []
  syntax:
    content: public sealed class RenderContext
    content.vb: Public NotInheritable Class RenderContext
