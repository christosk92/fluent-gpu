  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    One inline run of a rich-text paragraph (the WinUI <code>TextBlock.Inlines</code> Run/Bold/Hyperlink model, rtb-01).

    A <code>SpanTextEl</code> paragraph is an array of these; the WHOLE paragraph shapes as ONE flow (spans concatenated,

    wrapped together — exactly how WinUI lays a paragraph's inline collection, RichTextBlock.g.h:63 get_Blocks).


    <p><xref href="FluentGpu.Foundation.TextSpan.Weight" data-throw-if-not-resolved="false"></xref> 0 / <xref href="FluentGpu.Foundation.TextSpan.Size" data-throw-if-not-resolved="false"></xref> null / <xref href="FluentGpu.Foundation.TextSpan.FontFamily" data-throw-if-not-resolved="false"></xref> null / <xref href="FluentGpu.Foundation.TextSpan.Color" data-throw-if-not-resolved="false"></xref> A==0

    all mean "inherit the paragraph base". <xref href="FluentGpu.Foundation.TextSpan.OnClick" data-throw-if-not-resolved="false"></xref> non-null makes this a HYPERLINK span: the engine

    resolves the Hand cursor over the span's laid-out rects and fires the action on click/tap — WinUI's inline

    Hyperlink (SetCursor(MouseCursorHand) on hyperlink hover, RichTextBlock.cpp:2995 / TextBlock.cpp:3488). Accent

    foreground + underline styling is the CALLER's job (HyperlinkForeground theming, generic.xaml:1120-1122).</p>

    <p>No italic axis: the shaper resolves faces by (family, weight) only — DWRITE_FONT_STYLE_NORMAL is fixed

    (TextLayoutEngine face resolution); FontStyle arrives with the italics workstream (plan §Text display).</p>
