  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    The Button control: barebone behavior (clickable, hover/pressed, focusable) + a default Fluent style. Overrideable

    globally (<xref href="FluentGpu.Controls.Button.AccentStyleOverride" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.Button.StandardStyleOverride" data-throw-if-not-resolved="false"></xref>), per-instance (pass a

    <xref href="FluentGpu.Controls.Button.Style" data-throw-if-not-resolved="false"></xref>), or ad-hoc (chain modifiers). Defaults are sourced from WinUI 3 DefaultButtonStyle /

    AccentButtonStyle (microsoft-ui-xaml controls\dev\CommonStyles\Button_themeresources.xaml): ButtonPadding 11,5,11,6

    (line 152); ControlCornerRadius 4 (line 168); ControlContentThemeFontSize 14; ButtonBorderThemeThickness 1

    (lines 29/90/127); FocusVisualMargin −3 (line 167); BackgroundTransition 83ms (lines 173-175).

    WinUI Button has NO scale animation — its state storyboards swap Background/BorderBrush/Foreground only

    (Button_themeresources.xaml:176-229), so no Hover/PressScale here (removed at the Wave-1 parity pass).

    Keyboard: the engine arms a pressed visual on Space/Enter key-DOWN and clicks on key-UP — held keys never repeat,

    any other key cancels without firing (WinUI ButtonBaseKeyProcess.h; E2) — and draws the keyboard focus

    ring itself (E1) — nothing control-side. The pointer cursor stays the WinUI arrow (only HyperlinkButton shows a

    hand — dxaml\xcp\dxaml\lib\HyperLinkButton_Partial.cpp:32). <code>partial</code> so apps/framework can add variants.
