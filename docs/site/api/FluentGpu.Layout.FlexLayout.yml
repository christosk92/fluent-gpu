  assemblies:
  - FluentGpu.Layout
  namespace: FluentGpu.Layout
  summary: >-
    Re-solve ONLY the subtree rooted at <code class="paramref">node</code> against its current Bounds (or its
        LayoutInput size if set — a SizeMode.Relayout animation writes the interpolated width there each tick). The parent
        already placed this node, so this cannot propagate upward — a scoped, per-frame-affordable relayout for live reflow.
