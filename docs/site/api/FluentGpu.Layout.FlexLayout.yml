  assemblies:
  - FluentGpu.Layout
  namespace: FluentGpu.Layout
  summary: >-
    Lay out the root to FILL the window (the conventional top-level behavior) — an auto-sized root takes
        the full client area; an explicitly-sized root keeps its size. The slice's direct <xref href="FluentGpu.Layout.FlexLayout.Run(FluentGpu.Foundation.NodeHandle)" data-throw-if-not-resolved="false"></xref>
        keeps content-sizing for golden flexbox checks.
