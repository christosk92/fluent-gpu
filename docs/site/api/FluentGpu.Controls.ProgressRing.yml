  summary: >-
    The accent ring arc (the Lottie ellipse — determinate sweep / indeterminate spinner). The ArcSpec
        (color, stroke weight, sweep) is stock per-render computed styling a modifier sees and may override
        (<code>b =&gt; b with { Arc = … }</code>). Owned: OnRealized (the indeterminate trim-loop ref, chained with any
        modifier-supplied handler; the determinate arc owns nothing).
