  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A determinate ring: the accent arc's sweep is <code>value·360°</code> from 12 o'clock clockwise, over a track
        ring. WinUI's default Background is <code>ControlFillColorTransparentBrush</code>, so the track is invisible unless a
        <code class="paramref">track</code> color is supplied. <code class="paramref">foreground</code> defaults to AccentFillColorDefault.
        <code class="paramref">parts</code> = per-part styling keyed by <xref href="FluentGpu.Controls.ProgressRing.PartRing" data-throw-if-not-resolved="false"></xref> (the accent arc).
  example: []
