  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI ProgressRing brought to 1:1 with <code>controls/dev/ProgressRing</code>. WinUI renders the ring via a Lottie

    <code>AnimatedVisualPlayer</code> (a continuous accent ring, NOT dots): a determinate variant whose accent arc's TrimEnd

    sweeps 0→1 over a (default-transparent) track ring, and an indeterminate variant whose accent arc rotates while its

    trim breathes. We reproduce both on the engine's SDF arc primitive (<xref href="FluentGpu.Foundation.ArcSpec" data-throw-if-not-resolved="false"></xref>) — the determinate via a

    <xref href="FluentGpu.Controls.ProgressRing.ProgressRingTemplateSettings" data-throw-if-not-resolved="false"></xref>-computed sweep, the indeterminate via a rotation <code>Keyframes</code> loop at

    the exact WinUI cadence (900° per 2.0s, two cubic-bezier 0.167,0.167→0.833,0.833 half-segments).


    Dimensional canon (ProgressRing.xaml / AnimatedVisuals/ProgressRingIndeterminate.cpp): Width=Height=32 default,

    MinWidth=MinHeight=16. Stroke is the Lottie weight, NOT the unused <code>ProgressRingStrokeThickness=4</code> themeresource:

    the indeterminate ellipse uses <code>StrokeThickness(1.5F)</code> inside an 80px viewbox at <code>Scale:5,5</code> (effective

    1.5·5 = 7.5 in the viewbox), which maps to the 32px control as 7.5·32/80 = <b>3.0px</b> (= size·0.09375). We scale

    it proportionally so larger rings keep the same visual weight. Foreground=AccentFillColorDefaultBrush

    (Tok.AccentDefault), Background=ControlFillColorTransparentBrush (transparent — the default track is invisible,

    exactly like WinUI). IsActive=false → the LayoutRoot fades to Opacity 0 (the Inactive visual state).
