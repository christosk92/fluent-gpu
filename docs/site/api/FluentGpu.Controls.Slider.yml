    value tooltip. <code class="paramref">value</code> is in range units; <code class="paramref">length</code> is the track length (px) and

    <code class="paramref">thickness</code> the cross size (WinUI SliderHorizontalHeight/SliderVerticalWidth = 32,

    Slider_themeresources.xaml:167-168). Controlled: the caller owns the value.

