  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI 3 Slider. Geometry (Slider_themeresources.xaml): a 4px rail (SliderTrackFill = ControlStrongFillColorDefault,

    radius 2) with an accent value-fill, and the Fluent thumb — a STATIC 22px ring (the 18px Thumb part + its Border's

    −2 margin, lines 169-172 + 198) of ControlSolidFillColorDefault with a 1px ControlElevationBorder, holding the only

    animated part: the 12px accent inner dot whose storyboards scale it 0.86 at rest / 1.167 on hover / 0.71 on press /

    1.167 disabled (lines 204-254). Value-fill and inner dot recolor with the CONTROL-wide PointerOver/Pressed states

    (AccentFillColorDefault → Secondary → Tertiary; lines 14-17, 24-27).


    <ul><li><xref href="FluentGpu.Controls.Slider.Create(System.Single%2cSystem.Action%7bSystem.Single%7d%2cSystem.Single%2cSystem.Single%2cFluentGpu.Controls.Slider.Style%2cSystem.Boolean%2cSystem.String%2cFluentGpu.Dsl.TemplateParts)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.Slider.Bind(FluentGpu.Signals.FloatSignal%2cSystem.Action%7bSystem.Single%7d%2cSystem.Single%2cSystem.Single%2cFluentGpu.Controls.Slider.Style%2cSystem.Boolean%2cSystem.String%2cFluentGpu.Dsl.TemplateParts)" data-throw-if-not-resolved="false"></xref> — the lightweight 0..1 scrub primitives (media seek/volume). Keyboard,
      focus visuals and the optional header are included; the value tooltip is not (see <xref href="FluentGpu.Controls.Slider.Ranged(System.Single%2cSystem.Action%7bSystem.Single%7d%2cFluentGpu.Controls.Slider.Options%2cSystem.Single%2cSystem.Single%2cFluentGpu.Controls.Slider.Style%2cSystem.Boolean%2cFluentGpu.Dsl.TemplateParts)" data-throw-if-not-resolved="false"></xref>).</li><li><xref href="FluentGpu.Controls.Slider.Ranged(System.Single%2cSystem.Action%7bSystem.Single%7d%2cFluentGpu.Controls.Slider.Options%2cSystem.Single%2cSystem.Single%2cFluentGpu.Controls.Slider.Style%2cSystem.Boolean%2cFluentGpu.Dsl.TemplateParts)" data-throw-if-not-resolved="false"></xref> — the full WinUI-parity control over <xref href="FluentGpu.Controls.Slider.Options" data-throw-if-not-resolved="false"></xref>: arbitrary range, step
      snapping, ticks (incl. inline), Header, SmallChange/LargeChange keyboard, and the IsThumbToolTipEnabled
      "disambiguation UI" value tooltip with a ThumbToolTipValueConverter-equivalent formatter.</li></ul>

    Keyboard (KeyPress::Slider::KeyDown, SliderKeyProcess.h:28-71): Left/Down decrease and Right/Up increase by

    SmallChange, Home/End jump to Minimum/Maximum; PageUp/PageDown move by LargeChange (not in XAML's KeyPress::Slider —

    kept per the parity contract, riding the same Slider::Step math, Slider_Partial.cpp:1713-1783). RTL note: WinUI

    inverts Left/Right by (FlowDirection==RightToLeft) ^ IsDirectionReversed (SliderKeyProcess.h:26); the engine has no

    FlowDirection yet — the LTR mapping ships now, the inversion lands with the Wave-6 RTL sweep.
