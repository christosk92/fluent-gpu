  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Signals-native slider (the "even better than React" path): the value is a <xref href="FluentGpu.Signals.FloatSignal" data-throw-if-not-resolved="false"></xref> bound straight

    to the value-fill's composited ScaleX and the thumb's composited OffsetX. A drag writes the signal, which updates

    exactly those two node transforms on the compositor fast path — <b>zero render, zero reconcile, zero relayout</b>

    per pointer-move (the slider-tank fix). <code class="paramref">onChange</code> is invoked for side effects (e.g. a value

    readout that takes its own scoped re-render); pass null for a purely-visual scrub. Keyboard steps write the

    signal the same compositor-only way. No value tooltip: opening/observing one requires a re-render path, which

    would break this overload's zero-re-render contract — use <xref href="FluentGpu.Controls.Slider.Ranged(System.Single%2cSystem.Action%7bSystem.Single%7d%2cFluentGpu.Controls.Slider.Options%2cSystem.Single%2cSystem.Single%2cFluentGpu.Controls.Slider.Style%2cSystem.Boolean%2cFluentGpu.Dsl.TemplateParts)" data-throw-if-not-resolved="false"></xref> for the WinUI-parity surface.
