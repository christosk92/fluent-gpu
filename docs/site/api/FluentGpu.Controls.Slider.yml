    A slider over an arbitrary <xref href="FluentGpu.Controls.Slider.Options.Min" data-throw-if-not-resolved="false"></xref>..<xref href="FluentGpu.Controls.Slider.Options.Max" data-throw-if-not-resolved="false"></xref> range, with step snapping, tick

