  summary: >-
    A single top-level entry in a <xref href="FluentGpu.Controls.MenuBar" data-throw-if-not-resolved="false"></xref>: a clickable title (e.g. "File") whose
        <code class="paramref">Items</code> populate the <xref href="FluentGpu.Controls.MenuFlyout" data-throw-if-not-resolved="false"></xref> that opens beneath it. <xref href="FluentGpu.Controls.MenuBarItem.AccessKey" data-throw-if-not-resolved="false"></xref> is
        the Alt-mnemonic letter (WinUI MenuBarItem AccessKey — MenuBarItem.cpp:249 OnMenuBarItemAccessKeyInvoked →
        ShowMenuFlyout); '\0' derives it from the first letter of <code class="paramref">Title</code>.
