  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI-faithful Viewbox: computes the scale from the child's natural size and a target box, applying
        <code class="paramref">stretch</code> and <code class="paramref">stretchDirection</code>. (Sizes are caller-supplied because the
        engine exposes no measure-override seam — see the design note in the type summary.)
  example: []
  syntax:
