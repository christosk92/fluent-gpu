  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI Viewbox: scales its single child by a composited transform (no relayout). WinUI computes the
        scale from a layout measure pass; this engine has no measure-override seam on <xref href="FluentGpu.Dsl.BoxEl" data-throw-if-not-resolved="false"></xref>, so the scale
        is supplied either as an explicit factor (the <code>scale</code> overload) or computed from a known content size and
        target box via <xref href="FluentGpu.Controls.ViewboxStretch" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.ViewboxStretchDirection" data-throw-if-not-resolved="false"></xref> logic (the sized overload). The
        child is wrapped in a centered <xref href="FluentGpu.Dsl.BoxEl" data-throw-if-not-resolved="false"></xref> carrying a uniform <xref href="FluentGpu.Dsl.BoxEl.ScaleX" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Dsl.BoxEl.ScaleY" data-throw-if-not-resolved="false"></xref>.
  example: []
