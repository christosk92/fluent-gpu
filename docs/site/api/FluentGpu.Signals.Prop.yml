  summary: >-
    A unified reactive channel property: ONE field that is EITHER a static value (re-asserted by the reconciler on

    every reconcile of the element, iff not bound) OR a reactive bind — a <xref href="System.Func%601" data-throw-if-not-resolved="false"></xref> thunk or a concrete

    signal the reconciler wires into a mount-time effect that writes exactly one scene column and marks its dirty

    axis. Constructed implicitly: <code>Opacity = 0.5f</code> (static), <code>Opacity = () =&gt; f(sig.Value)</code> (derived

    thunk), <code>Opacity = sig</code> (signal-direct — no user closure). <code>default(Prop&lt;T&gt;)</code> is the static

    <code>default(T)</code> — never use it to mean "unset"; element property initializers (<code>= 1f</code>, <code>= NaN</code>) run

    the T conversion and survive <code>with</code> clones (a bound clone stays bound).

    Kind discrimination is a runtime type test on the single payload ref — no tag byte; the static reconcile path

    reads only IsBound (one null test). Conversions from the <xref href="FluentGpu.Signals.IReadSignal%601" data-throw-if-not-resolved="false"></xref> INTERFACE are

    illegal in C# (CS0552) — through an interface-typed variable use the thunk form <code>chan = () =&gt; s.Value</code>.
