  namespace: FluentGpu.Text
  summary: >-
    Itemize <code class="paramref">text</code> into <code class="paramref">runs</code> (BiDi × script segmentation, logical order)
        and <code class="paramref">breaks</code> (one entry per UTF-16 unit). Both lists are cleared and refilled.
