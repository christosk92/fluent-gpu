  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    Text itemization seam (text.md §4.4): segment a string into BiDi × script runs and compute per-position line-break

    opportunities (UAX #14). The DirectWrite leaf implements it over <code>IDWriteTextAnalyzer</code> + the callee

    <code>IDWriteTextAnalysisSource/Sink</code> CCWs; a portable Unicode itemizer is the cross-platform follow-up. The shaper

    (and, later, the layout engine's wrap) consume this output so measure and render segment identically.
  example: []
  syntax:
    content: public interface ITextItemizer
    content.vb: Public Interface ITextItemizer
  derivedClasses:
  - FluentGpu.Text.DirectWrite.DWriteItemizer
