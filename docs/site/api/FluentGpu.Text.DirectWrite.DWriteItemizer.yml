  assemblies:
  - FluentGpu.Text.DirectWrite
  namespace: FluentGpu.Text.DirectWrite
  summary: >-
    DirectWrite itemizer (text.md §4.4): segments text into BiDi × script runs and computes UAX #14 line-break

    opportunities via <code>IDWriteTextAnalyzer</code>. DirectWrite calls back into the hand-authored callee CCWs

    <xref href="FluentGpu.Text.DirectWrite.TextAnalysisSourceCcw" data-throw-if-not-resolved="false"></xref> (supplies the text) and <xref href="FluentGpu.Text.DirectWrite.TextAnalysisSinkCcw" data-throw-if-not-resolved="false"></xref> (collects the runs).

    COM bound via TerraFX raw pointers; the CCW vtables mirror the ComputeSharp PixelShaderEffect pattern.

    Single-thread-confined: <xref href="FluentGpu.Text.DirectWrite.DWriteItemizer.Itemize(System.ReadOnlySpan%7bSystem.Char%7d%2cSystem.Collections.Generic.List%7bFluentGpu.Text.ItemRun%7d%2cSystem.Collections.Generic.List%7bFluentGpu.Text.BreakOpp%7d)" data-throw-if-not-resolved="false"></xref> calls AnalyzeBidi/Script/LineBreakpoints serially on the caller thread.
  example: []
  syntax:
    content: 'public sealed class DWriteItemizer : ITextItemizer, IDisposable'
    content.vb: Public NotInheritable Class DWriteItemizer Implements ITextItemizer, IDisposable
