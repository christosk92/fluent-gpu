  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI <code>ToolTip</code> (framework <code>ToolTip</code> + <code>ToolTipService</code>): wraps a target element and surfaces a small

    text bubble anchored above it (or at the pointer in <xref href="FluentGpu.Controls.ToolTipPlacementMode.Mouse" data-throw-if-not-resolved="false"></xref>). 1:1 with the

    framework's automatic-tooltip behavior:


    <ul><li>Hover trigger — pointer-over the target opens the bubble after the initial show delay
      (<code>SPI_GETMOUSEHOVERTIME</code> 400ms × 2 = 800ms; a re-show within <xref href="FluentGpu.Controls.ToolTip.BetweenShowDelayMs" data-throw-if-not-resolved="false"></xref> = 200ms uses the
      reshow delay — see <xref href="FluentGpu.Controls.ToolTip.MouseReshowDelayMs" data-throw-if-not-resolved="false"></xref> for why that is 400ms, not the spec'd 600ms). Pointer-leave
      cancels a PENDING open immediately (ToolTipService_Partial.cpp:1435-1442); an OPEN bubble is kept and closed by
      the safe-zone monitor instead — see the safe-zone item below.</li><li>Safe zone — an open bubble does NOT close the instant the pointer leaves the target: WinUI keeps it while the
      pointer is inside owner ∪ tooltip (∪ their convex hull) and a 1s check timer closes it once outside
      (ToolTipService_Partial.cpp:1433-1453 owner-exit only records the owner; cpp:349-381 OnSafeZoneCheck;
      cpp:1060-1098 IsToolTipInSafeZone; .h:22 <code>s_safeZoneCheckTimerDuration</code> = 1s). The engine surfaces no global
      pointer position, so the hull is approximated by the same 1s cadence: leaving owner ∪ bubble arms a
      <xref href="FluentGpu.Controls.ToolTip.SafeZoneCheckMs" data-throw-if-not-resolved="false"></xref> grace; re-entering either cancels it; the grace elapsing closes the bubble.</li><li>Keyboard trigger — KEYBOARD focus landing inside the target opens the bubble after 800ms (×2, normal AND
      reshow: ToolTipService_Partial.cpp:1777-1779), exactly WinUI's OnOwnerGotFocus gate
      (ToolTipService_Partial.cpp:1648-1664: only <code>FocusState::Keyboard</code> shows the tooltip — pointer focus does
      not). Focus leaving closes it (cpp:1696-1706 OnOwnerLostFocus → OnOwnerLeaveInternal).</li><li>Press dismiss — a pointer press over the target closes an open (or pending) bubble, and it stays closed
      until the pointer LEAVES and re-enters (classic tooltip behavior; WinUI 3's ToolTipService itself registers no
      PointerPressed handler — it closes via safe-zone exit monitoring, ToolTipService_Partial.cpp:1437-1453 — but
      cannot re-open a dismissed owner until a real leave + re-enter either, cpp:725-737 CancelAutomaticToolTip).</li><li>Auto-dismiss — an open bubble closes itself after <xref href="FluentGpu.Controls.ToolTip.ShowDurationMs" data-throw-if-not-resolved="false"></xref> (<code>SPI_GETMESSAGEDURATION</code>
      default 5s), and the dismissal LATCHES like press dismiss: WinUI's only show trigger is PointerEntered
      (ToolTipService_Partial.cpp:1395-1418), so in-place hover moves can never re-open a timed-out tooltip — it takes
      a real leave + re-enter.</li><li>No click trigger — the wrapper adds NO OnClick (ToolTipService registers none,
      ToolTipService_Partial.cpp:176-220), so a tooltipped element is never a tab stop by itself.</li></ul>

    Chrome matches <code>ToolTip_themeresources.xaml</code>: AcrylicInAppFillColorDefault fill, 1px SurfaceStrokeColorFlyout

    stroke, ControlCornerRadius (4px) corners, the light tooltip elevation (<xref href="FluentGpu.Dsl.Elevation.Tooltip" data-throw-if-not-resolved="false"></xref>), 9,6,9,8

    padding, 12px TextFillColorPrimary text, MaxWidth 320, TextWrapping=Wrap. Open/close are the WinUI

    FadeIn/FadeOutThemeAnimation fades (167ms — <xref href="FluentGpu.Controls.PopupChrome.Raw" data-throw-if-not-resolved="false"></xref> in the overlay host). The bubble does NOT

    trap focus and does NOT light-dismiss on outside click (<xref href="FluentGpu.Controls.DismissBehavior.None" data-throw-if-not-resolved="false"></xref>) — dismissal is owned by

    hover-leave/focus-leave/press + the auto-dismiss timer, exactly like <code>ToolTipService</code>.
