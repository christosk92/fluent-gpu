  summary: >-
    WinUI <code>SplitViewDisplayMode</code> (XCPTypesAutoGen Modules/Controls/SplitView/SplitView.cs:19-25).
        Overlay/CompactOverlay float the open pane ABOVE the content (no reflow) and are light-dismissible;
        Inline/CompactInline reserve layout width for it. Compact modes keep a <code>CompactPaneLength</code> rail visible
        while closed (the pane is CLIPPED to the rail, never resized — core SplitView.cpp:343-377 template settings).
