  assemblies:
  - FluentGpu.Hooks
  namespace: FluentGpu.Hooks
  summary: >-
    A host-owned registration surface a tree-level concern can hook into without the host depending on it. The host

    bridges <xref href="FluentGpu.Hooks.InputHooks.KeyPreview" data-throw-if-not-resolved="false"></xref> into the input dispatcher's pre-focus key hook, and runs

    AfterAnimations after the animation engine ticks but before recording. Read the host instance via

    <code>UseContext(InputHooks.Current)</code>.
