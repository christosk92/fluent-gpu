  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    The resolved style a text run is measured/shaped under. <xref href="FluentGpu.Text.TextStyle.Weight" data-throw-if-not-resolved="false"></xref> is the NUMERIC font weight
        (WinUI FontWeight — the int IS the DWRITE_FONT_WEIGHT, 1..999; callers resolve sugar like Bold→700 before
        constructing; 0 is treated as 400). <xref href="FluentGpu.Text.TextStyle.CharSpacing" data-throw-if-not-resolved="false"></xref> is WinUI TextElement.CharacterSpacing — tracking in
        1/1000 em, applied per glyph after shaping. <xref href="FluentGpu.Text.TextStyle.LineHeight" data-throw-if-not-resolved="false"></xref> (DIP; NaN/≤0 = font-natural) resolves per
        <xref href="FluentGpu.Text.TextStyle.Stacking" data-throw-if-not-resolved="false"></xref> (WinUI LineStackingStrategy), and <xref href="FluentGpu.Text.TextStyle.LineBounds" data-throw-if-not-resolved="false"></xref> (WinUI TextLineBounds) selects
        the reported line box (Full = ascent..descent, Tight = cap-height..baseline). Record equality over ALL fields is
        load-bearing: TextStyle is the TextMeasureCache key, so every layout-affecting input must live here.

        <p><xref href="FluentGpu.Text.TextStyle.SpanRunId" data-throw-if-not-resolved="false"></xref> (0 = plain single-style run) keys a <xref href="FluentGpu.Foundation.SpanRunTable.Shared" data-throw-if-not-resolved="false"></xref> run whose
        per-range <xref href="FluentGpu.Foundation.SpanStyle" data-throw-if-not-resolved="false"></xref> overlays (weight/size/family/color/decorations) apply over this base style — the
        rtb-01 inline-run model: the WHOLE text still shapes as ONE flow (one wrap pass), exactly like a WinUI paragraph's
        inline collection. Carried here (not as a separate seam argument) so every existing layout/measure/query path —
        and every cache keyed on TextStyle — is span-aware without signature churn; a span-content change mints a fresh
        id, so the measure cache and the shaped-run cache self-invalidate.</p>
