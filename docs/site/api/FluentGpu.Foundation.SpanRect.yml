  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    One laid-out rect artifact of a span run (paragraph-node-local DIP): the line-fragment geometry of a
        decorated/link span. <xref href="FluentGpu.Foundation.SpanRect.Kind" data-throw-if-not-resolved="false"></xref> is the single <xref href="FluentGpu.Foundation.SpanStyle" data-throw-if-not-resolved="false"></xref> flag bit it serves — Link rects are
        the FULL line-fragment band (hit-testing, Hand cursor); Underline/Strikethrough rects are the positioned BARS
        (the recorder fills them verbatim, no font-seam touch at record time).
