  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Text underline opt-in. Default FALSE = the WinUI 3 default (<code>HyperlinkUnderlineVisible</code> = False,
        Hyperlink_themeresources.xaml:20; underline otherwise only under HighContrast — HyperLinkButton_Partial.cpp:207-212).
        When true the label sets <code>TextEl.Underline</code> — the E9 production path: the recorder emits the face-metric
        underline bar (DWrite underline position/thickness cached at measure) in the label's eased foreground.
        The E8 HighContrast pass switches this on structurally.
