  summary: >-
    Image lifecycle notification for app observability (e.g. a retry toast, a broken-art fallback, telemetry).
        Raised on the UI thread during <xref href="FluentGpu.Scene.ImageCache.Pump" data-throw-if-not-resolved="false"></xref>. <code class="paramref">attempts</code> is the fetch attempt count
        (≥1; &gt;1 means transient retries happened).
