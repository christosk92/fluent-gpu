  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI SelectorBar: a segmented horizontal row of text (optionally icon+text) items. The selected item
        is marked by a SHORT CENTERED accent pill flush with the item bottom (not a full-width underline, not bold); text
        stays <xref href="FluentGpu.Dsl.Tok.TextPrimary" data-throw-if-not-resolved="false"></xref> at rest for every item and DIMS on hover/press — backgrounds are transparent
        in every state (SelectorBar_themeresources.xaml:21-25). Stateless — the caller owns <code>selected</code> and reacts to
        <code>onSelect</code>. Keyboard: ONE tab stop (the selected item — TabNavigation=Once, SelectorBar.xaml:13); Left/Right/
        Home/End move focus item-to-item and SELECTION FOLLOWS FOCUS (SelectorBarTests.cs:63-66); focus entering a bar
        without a selection auto-selects (SelectorBar.cpp:98-126). Per-part restyling goes through the optional
        <code>parts</code> (see <xref href="FluentGpu.Dsl.TemplateParts" data-throw-if-not-resolved="false"></xref> for the contract).
  example: []
  syntax:
