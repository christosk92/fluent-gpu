  assemblies:
  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    Push the titlebar's drag/caption-button regions (CLIENT DIP; see <xref href="FluentGpu.Pal.TitleBarRegion" data-throw-if-not-resolved="false"></xref>). The
        engine calls this only when the titlebar relayouts — push-on-change, never per frame (zero-alloc steady path).
        Anything not covered stays HTCLIENT (the bar's interactive content). An empty span clears all regions.
  example: []
