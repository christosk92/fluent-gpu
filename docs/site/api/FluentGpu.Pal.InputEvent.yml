  assemblies:
  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    POD input event drained from the host-owned ring once per frame (no C# events across the seam).

    <code class="paramref">ScrollDelta</code> (Wheel only) is in DIP, oriented so positive = scroll toward the content end

    (offset increases). The platform pump converts WM_MOUSEWHEEL notches → DIP and flips the sign there.

    <code class="paramref">Button</code>: 0 = left, 1 = right, 2 = middle. <code class="paramref">Mods</code> is the modifier chord at the

    time of the event (pump-captured); <code class="paramref">IsRepeat</code> = keyboard auto-repeat (lParam bit 30);

    <code class="paramref">TimestampMs</code> = the platform message time (drives double/triple-click detection in the dispatcher).
  example: []
  syntax:
    content: 'public readonly record struct InputEvent : IEquatable<InputEvent>'
    content.vb: Public Structure InputEvent Implements IEquatable(Of InputEvent)
