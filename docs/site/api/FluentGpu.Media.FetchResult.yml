  namespace: FluentGpu.Media
  summary: >-
    The outcome of a fetch attempt. On success it hands back a buffer RENTED FROM
        <xref href="System.Buffers.ArrayPool%601.Shared" data-throw-if-not-resolved="false"></xref> plus the valid length — the scheduler returns it to the pool
        after decode, so a fetch costs no net managed allocation. On failure it carries a classified
        <xref href="FluentGpu.Scene.ImageFailureKind" data-throw-if-not-resolved="false"></xref> the scheduler uses to pick transient-retry vs permanent-fail.
