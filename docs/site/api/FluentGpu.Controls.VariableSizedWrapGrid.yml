  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI <code>VariableSizedWrapGrid</code>: a grid that wraps tiles of varying sizes. This is a
        self-contained, non-virtualized demo — fixed-base <code class="paramref">cell</code> tiles where some span
        multiple cells. Tiles are greedily packed left-to-right into rows that hold <code class="paramref">columns</code>
        cells (by ColSpan sum); a tile that would overflow the current row starts a new one. Cells are
        contiguous (no inter-cell gap) — an N-span tile is exactly N*cell — matching the WinUI base panel,
        which is an unstyled layout host (no per-tile chrome). A faint fill is kept only for visibility.
  example: []
