    path: ../../src/FluentGpu.Controls/EditableText.cs
    startLine: 55
  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    The WinUI-parity text editor every text control composes (TextBox/PasswordBox/NumberBox/AutoSuggestBox/editable

    ComboBox/ColorPicker), built on <xref href="FluentGpu.Text.TextEditCore" data-throw-if-not-resolved="false"></xref> (document + caret/selection/undo) and the

    <xref href="FluentGpu.Text.IFontSystem" data-throw-if-not-resolved="false"></xref> editor queries (hit-test / caret metrics / range rects — the SAME layout pipeline the

    renderer draws with).


    <p><b>Document ↔ signal.</b> The caller-visible <xref href="FluentGpu.Signals.Signal%601" data-throw-if-not-resolved="false"></xref> stays the single source of truth: a user

    edit mutates the core document and then makes ONE <code>text.Value</code> write (TextBind updates just the text node — no

    component re-render per keystroke); an external/programmatic signal write is folded back into the document by the

    TextBind evaluation (<code>core.ResetText</code>, reason = <xref href="FluentGpu.Controls.TextChangeReason.ProgrammaticChange" data-throw-if-not-resolved="false"></xref>). An IME

    composition is the one sanctioned divergence: the PROVISIONAL text lives in the document (so it renders, with clause

    underlines) but the signal updates only on commit.</p>


    <p><b>Rendering.</b> Caret/selection/IME decorations are retained scene state (<xref href="FluentGpu.Scene.TextEditState" data-throw-if-not-resolved="false"></xref> + the

    pooled rect slab on the editor's TEXT node), replayed by the recorder — never composed elements. All geometry this

    control writes (caret X, selection/underline rects) is in RAW text-node-local (document-space) coordinates; the

    caret-follow <code>-ScrollX</code> is applied ONCE, as the text node's wrapper transform (a <code>TransformBind</code> reading a

    FloatSignal — the compositor-bypass idiom), so the recorder's world transform shifts glyphs and decorations together.

    <xref href="FluentGpu.Scene.TextEditState.ScrollX" data-throw-if-not-resolved="false"></xref> mirrors the applied offset for tests/IME math.</p>


    <p><b>Focus.</b> Focus state is engine-driven (<xref href="FluentGpu.Dsl.BoxEl.OnFocusChanged" data-throw-if-not-resolved="false"></xref> — WinUI GotFocus/LostFocus):

    gained → arm the caret blinker + IME (sink + editable) + capture the Escape-revert snapshot; keyboard (Tab) focus

    additionally selects all (pointer focus keeps the press-placed caret). Lost → disarm blinker/IME; the selection

    STATE is kept but its visuals hide (SelectionActive off). Enter fires <xref href="FluentGpu.Controls.EditableText.OnCommit" data-throw-if-not-resolved="false"></xref> and KEEPS focus

    (WinUI); Escape reverts to the focus-time snapshot, fires <xref href="FluentGpu.Controls.EditableText.OnCancel" data-throw-if-not-resolved="false"></xref>, and blurs (the established

    engine contract that NumberBox/ComboBox/ColorPicker rely on).</p>


    <p><b>Deviations (documented, not hidden):</b> <xref href="FluentGpu.Controls.EditableText.BeforeTextChanging" data-throw-if-not-resolved="false"></xref> gates INSERTIONS (typing, paste,

    IME commit, newline); deletions and undo/redo are not cancelable (WinUI fires it for every change). A

    <xref href="FluentGpu.Controls.EditableText.Sanitize" data-throw-if-not-resolved="false"></xref> that rewrites the value replaces the whole document as one undo step with the caret at the

    end. Drag after a double-click extends by character, not by word. IME clause underlines sit at the line bottom

    (face-metric underline placement arrives with the DirectWrite decoration work).</p>


    <p><b>Focused border.</b> WinUI's Focused state swaps BorderBrush to <code>TextControlElevationBorderFocusedBrush</code>

    (the accent-bottom-stop gradient) with BorderThickness 1,1,1,2 (TextBox_themeresources.xaml, the Focused

    VisualState ~lines 295–304 + the brush definition ~48–66). Visually that is a neutral 1px ring whose BOTTOM edge

    reads as a 2px accent bar. We keep the neutral <code>Tok.ControlElevationBorder</code> ring in every state and draw the

    separate 2px accent bottom bar while focused — the same pixels without double-drawing an accent gradient under an

    accent bar.</p>
