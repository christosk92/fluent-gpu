  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI AppBarToggleButton: like <xref href="FluentGpu.Controls.AppBarButton" data-throw-if-not-resolved="false"></xref> (a vertically-stacked 16px icon glyph
        over a 12px label) but a stateful toggle. When checked it becomes a SOLID accent pill
        (<xref href="FluentGpu.Dsl.Tok.AccentDefault" data-throw-if-not-resolved="false"></xref> fill, white <xref href="FluentGpu.Dsl.Tok.TextOnAccentPrimary" data-throw-if-not-resolved="false"></xref> icon/label, with
        <xref href="FluentGpu.Dsl.Tok.AccentSecondary" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Dsl.Tok.AccentTertiary" data-throw-if-not-resolved="false"></xref> hover/press) and gains the accent
        elevation-border (AppBarToggleButtonBorderBrushChecked); unchecked it is transparent with the standard subtle
        hover/press states. Press dims the foreground (TextSecondary unchecked, TextOnAccentSecondary checked) to match
        WinUI via the per-state foreground ramps. Used inside a CommandBar; the whole control is one click target that
        flips the checked state. <xref href="FluentGpu.Dsl.BoxEl.IsEnabled" data-throw-if-not-resolved="false"></xref> gates hit-test/focus/keyboard; the disabled resting
        surface/foreground stay control-chosen.
