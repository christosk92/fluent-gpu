  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    The variable-extent (measured) virtualization seam — E11-L0. Folds the Fenwick estimate-then-correct path behind

    the SAME pluggable seam as the fixed-geometry layouts, so CUSTOM layouts can be variable/sliver-like: unmeasured

    items report their estimate; at arrange time the layout engine measures each realized row and feeds the real

    extent back through <xref href="FluentGpu.Scene.IMeasuredVirtualLayout.SetMeasured(System.Int32%2cSystem.Single%2cSystem.Single)" data-throw-if-not-resolved="false"></xref> (O(log n) correction), then re-pins the scroll anchor via

    <xref href="FluentGpu.Scene.IMeasuredVirtualLayout.IndexAt(System.Single%2cSystem.Single)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Scene.IMeasuredVirtualLayout.OffsetOf(System.Int32%2cSystem.Single)" data-throw-if-not-resolved="false"></xref> so corrections above the viewport never jump the visible top

    (virtualization.md §6.2 — estimate-then-correct + anchoring are seam behavior now, not a special case).

    Built-ins: <xref href="FluentGpu.Scene.MeasuredStackVirtualLayout" data-throw-if-not-resolved="false"></xref> (the Fenwick variable list), <xref href="FluentGpu.Scene.GroupedListVirtualLayout" data-throw-if-not-resolved="false"></xref>

    (group headers = a measured item kind + sticky-header hook).
  example: []
  syntax:
    content: 'public interface IMeasuredVirtualLayout : IVirtualLayout'
    content.vb: Public Interface IMeasuredVirtualLayout Inherits IVirtualLayout
