  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    Text seam. DirectWrite implements it on Windows; <code>Text.Headless</code> provides a deterministic stub for tests.

    The shaper resolves BiDi/script/fallback and returns FINAL device-space glyph positions in visual order; the

    renderer treats glyph runs as opaque positioned quads. Beyond measurement, the seam answers the editor queries —

    hit-test, caret geometry, selection rects — from the SAME layout pipeline (identical wrapping, identical advances),

    so hit-testing matches rendering exactly. For all members <code>maxWidth</code> is the wrap width

    (<xref href="System.Single.PositiveInfinity" data-throw-if-not-resolved="false"></xref> = no wrap), interpreted exactly as <xref href="FluentGpu.Text.IFontSystem.Measure(FluentGpu.Foundation.StringId%2cFluentGpu.Text.TextStyle%40%2cSystem.Single)" data-throw-if-not-resolved="false"></xref> interprets it.
  example: []
  syntax:
    content: public interface IFontSystem
    content.vb: Public Interface IFontSystem
  derivedClasses:
  - FluentGpu.Text.DirectWrite.DirectWriteFontSystem
