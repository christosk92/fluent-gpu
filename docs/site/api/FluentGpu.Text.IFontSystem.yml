  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    One rect per line fragment covered by [<code class="paramref">start</code>, <code class="paramref">end</code>), x-from/x-to
        via cluster edges. Returns the count written (≤ <code class="paramref">rects</code>.Length; excess fragments are dropped —
        callers size generously). Zero-width ranges produce nothing. Editor-hosting backends must implement this; the
        default throws.
  example: []
  syntax:
    content: int GetRangeRects(ReadOnlySpan<char> text, in TextStyle style, float maxWidth, int start, int end, Span<RectF> rects)
    parameters:
    - id: text
      type: System.ReadOnlySpan{System.Char}
    - id: style
      type: FluentGpu.Text.TextStyle
    - id: maxWidth
      type: System.Single
    - id: start
      type: System.Int32
    - id: end
      type: System.Int32
    - id: rects
      type: System.Span{FluentGpu.Foundation.RectF}
    return:
      type: System.Int32
    content.vb: Function GetRangeRects(text As ReadOnlySpan(Of Char), style As TextStyle, maxWidth As Single, start As Integer, [end] As Integer, rects As Span(Of RectF)) As Integer
