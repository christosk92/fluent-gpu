  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    Caret geometry for a UTF-16 index: x + the line's top/height (single line: top = 0, height = the line
        height) + line index. Returns the LEADING position of <code class="paramref">charIndex</code>; at a soft-wrap boundary the
        leading position is the START of the continuation line — trailing affinity (pinning the caret to the END of the
        wrapped line) is the CALLER's job. <code class="paramref">charIndex</code> == text length → the trailing edge of the last
        line. An index inside a multi-char cluster snaps to the cluster's edges. Editor-hosting backends must implement
        this; the default throws.
  example: []
  syntax:
    content: void GetCaret(ReadOnlySpan<char> text, in TextStyle style, float maxWidth, int charIndex, out float x, out float lineTop, out float lineHeight, out int lineIndex)
    parameters:
    - id: text
      type: System.ReadOnlySpan{System.Char}
    - id: style
      type: FluentGpu.Text.TextStyle
    - id: maxWidth
      type: System.Single
    - id: charIndex
      type: System.Int32
    - id: x
      type: System.Single
    - id: lineTop
      type: System.Single
    - id: lineHeight
      type: System.Single
    - id: lineIndex
      type: System.Int32
    content.vb: Sub GetCaret(text As ReadOnlySpan(Of Char), style As TextStyle, maxWidth As Single, charIndex As Integer, x As Single, lineTop As Single, lineHeight As Single, lineIndex As Integer)
