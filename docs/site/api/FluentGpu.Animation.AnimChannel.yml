  fullName: FluentGpu.Animation.AnimChannel
  type: Enum
  source:
    remote:
      path: src/FluentGpu.Animation/AnimEngine.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: AnimChannel
    path: ../../src/FluentGpu.Animation/AnimEngine.cs
    startLine: 9
  assemblies:
  - FluentGpu.Animation
  namespace: FluentGpu.Animation
  summary: >-
    Animatable channels. Transform channels compose into LocalTransform (TransformDirty); Opacity + the presented
        SizeW/SizeH (the "Reveal" presented extent the recorder draws the fill + child-clip at) → PaintDirty. LayoutW/LayoutH
        are the one deliberate exception to "animation never relays out": a SizeMode.Reflow track writes the interpolated
        size into LayoutInput each tick and the host re-solves the nearest layout boundary, so neighbours reflow smoothly.
  example: []
  syntax:
    content: 'public enum AnimChannel : byte'
    content.vb: Public Enum AnimChannel As Byte
