  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Computed geometry for one ProgressRing (the audit's P3 TemplateSettings convention — mirrors WinUI's

    <code>ProgressRingTemplateSettings</code>, recomputed once from the control's size, never inside a per-frame bind).

    <code class="paramref">Sweep</code> is the determinate accent-arc sweep in degrees (value·360). For the indeterminate ring

    it is the fixed visible arc length the rotation loop spins.
