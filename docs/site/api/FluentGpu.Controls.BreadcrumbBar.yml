  namespace: FluentGpu.Controls
  summary: >-
    Each crumb's box — the SAME modifier runs for every crumb, the last/current one included. Owned:
        OnClick (navigate — re-asserted on the clickable, non-last crumbs only), Role, TabStop, OnKeyDown (arrow
        focus moves), OnRealized (focus-handle capture, chained).
