  summary: >-
    The right-chevron separator between crumbs (WinUI PART_ChevronTextBlock) — a <xref href="FluentGpu.Dsl.TextEl" data-throw-if-not-resolved="false"></xref>,
        so style it via the generic map: <code>parts.Set&lt;TextEl&gt;(BreadcrumbBar.PartSeparator, t =&gt; t with { … })</code>.
