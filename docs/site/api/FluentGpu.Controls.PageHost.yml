  summary: >-
    Renders the top route of a <xref href="FluentGpu.Controls.Navigator" data-throw-if-not-resolved="false"></xref> via a route→view factory, re-rendering on every navigation.

    Wraps the view in the <xref href="FluentGpu.Controls.Nav.Context" data-throw-if-not-resolved="false"></xref> provider, so any descendant can <code>UseContext(Nav.Context)</code> to

    push/pop. Pages keep their state by reconciler identity (same route name at the top ⇒ same node subtree).
