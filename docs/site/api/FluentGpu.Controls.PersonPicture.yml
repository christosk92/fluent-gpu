  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Port of <code>InitialsGenerator::InitialsFromDisplayName</code>: strip a trailing bracket group, split on
        spaces, take the first full character of the first (and, if more than one word, the last) word, uppercased.
        Returns "" for symbolic/glyph scripts (CJK, Arabic, Greek, etc.) so the caller falls back to the Contact glyph.
  example: []
  syntax:
