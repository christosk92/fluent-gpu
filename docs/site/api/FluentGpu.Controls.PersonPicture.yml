  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI <code>PersonPicture</code>: a circular avatar that shows — in WinUI's order of precedence — a circular-cropped photo

    (Create(string,float,string?,bool,int,string?,ColorF?) via <code class="paramref">imageSource</code>), otherwise

    the contact's initials, otherwise a generic Contact/People fallback glyph, all on the quaternary alt control fill

    (<code>ControlAltFillColorQuarternary</code>) ringed by a 1px card stroke. An optional accent badge (number / glyph) floats

    at the top-right. Default diameter 96; the initials font is 42% of the diameter (the WinUI design rule), the badge

    plate is 50% of the diameter, and the badge font is 60% of the badge plate.
  example: []
  syntax:
    content: public static class PersonPicture
    content.vb: Public Module PersonPicture
