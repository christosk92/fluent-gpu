  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  example: []
  syntax:
    content: public static BoxEl Create(string initials, float size = 96, string? displayName = null, bool isGroup = false, int badgeNumber = 0, string? badgeGlyph = null, string? imageSourcePath = null, ColorF? fill = null)
    parameters:
    - id: initials
      type: System.String
      description: >-
        Explicit initials (highest precedence). When empty, <code class="paramref">displayName</code> drives
            the initials via the WinUI InitialsGenerator rules; when both are empty, the Contact/People fallback glyph shows.
    - id: size
      type: System.Single
      description: Diameter (Width == Height); the control stays circular. Default 96.
    - id: displayName
      type: System.String
      description: >-
        Contact display name; initials are generated from it (strip-trailing-brackets, first
            letter of first + last word, uppercased) only when <code class="paramref">initials</code> is empty.
    - id: isGroup
      type: System.Boolean
      description: When true, the avatar shows the People (group) glyph regardless of initials.
    - id: badgeNumber
      type: System.Int32
      description: >-
        When &gt; 0, draws an accent number badge (top-right): ≤99 shows the number, &gt;99 shows
            "99+". A NEGATIVE value shows no badge at all (WinUI: a non-zero BadgeNumber owns the badge slot and ≤0 maps to
            NoBadge — the glyph never substitutes, PersonPicture.cpp:191-198).
    - id: badgeGlyph
      type: System.String
      description: >-
        When set (and <code class="paramref">badgeNumber</code> is 0), draws an accent glyph badge
            (top-right) in the symbol font.
    - id: imageSourcePath
      type: System.String
      description: >-
        When set, shows a circular-cropped photo (UniformToFill) instead of initials/glyph
            — WinUI ProfilePicture. Takes precedence over initials, but not over <code class="paramref">isGroup</code>.
    - id: fill
      type: System.Nullable{FluentGpu.Foundation.ColorF}
      description: Override the ellipse fill (default <code>ControlAltFillColorQuarternary</code>); also the photo placeholder tint.
    return:
      type: FluentGpu.Dsl.BoxEl
