  summary: >-
    Arbitrary per-item content (the WinUI FlipViewItem surface — FlipViewItem_themeresources.xaml:23-25).
        Each item fills its page cell (FlipViewItem Horizontal/VerticalContentAlignment = Stretch, :17-18).
        <code class="paramref">selectedIndex</code> is live-controlled: a changed value navigates the view (the Selector
        SelectedIndex DP, FlipView_Partial.cpp:1607-1613); internal navigation reports through
        <code class="paramref">onSelectionChanged</code> (SelectionChanged).
