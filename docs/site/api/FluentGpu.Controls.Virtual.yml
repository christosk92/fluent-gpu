  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Signals-first BOUND list (the recycler fast path): <code class="paramref">row</code> runs ONCE per visible slot
        with an index SIGNAL; scrolling rebinds a slot by writing its signal — zero element rebuild, zero reconcile,
        zero keys. Express anything that varies by index as a reactive bind (<code>TextBind</code>/<code>FillBind</code>/
        <code>SourceBind</code>/<code>PlaceholderBind</code>), never a captured value. The fastest path for huge uniform lists
        (the WaveeMusic 100k track list under a scrollbar thumb-drag).
