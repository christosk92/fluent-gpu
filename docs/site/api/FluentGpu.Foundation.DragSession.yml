  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    THE live drag session (E5-L2): ONE mutable instance owned by <code>Input.DragDropContext</code>, opened when an L1 drag

    promotes on a chain carrying a <xref href="FluentGpu.Foundation.DragSource" data-throw-if-not-resolved="false"></xref> (payload resolved once), updated per pointer move, handed

    to every <xref href="FluentGpu.Foundation.DropTargetSpec" data-throw-if-not-resolved="false"></xref> handler, and cleared (incl. the Payload GC edge) when the gesture ends.

    Handlers copy what they keep — never hold the reference across gestures.
  example: []
  syntax:
    content: public sealed class DragSession
    content.vb: Public NotInheritable Class DragSession
