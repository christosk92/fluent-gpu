  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    A circular-arc stroke (WinUI ProgressRing — a trimmed, round-capped ring). The arc is centred in the node's box with

    radius (min(W,H)-Thickness)/2, a <xref href="FluentGpu.Foundation.ArcSpec.Thickness" data-throw-if-not-resolved="false"></xref>-wide stroke, swept from <xref href="FluentGpu.Foundation.ArcSpec.StartDeg" data-throw-if-not-resolved="false"></xref> for

    <xref href="FluentGpu.Foundation.ArcSpec.SweepDeg" data-throw-if-not-resolved="false"></xref> degrees (0° = 12 o'clock, clockwise). The recorder emits a <code>DrawArc</code>; the GPU draws the SDF

    arc with round caps. A full ring is SweepDeg = 360.
  example: []
