  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI TimePicker: a single Button FACE split into Hour | Minute | AM/PM text columns (equal star widths,

    TimePicker_themeresources.xaml:234-239) separated by 1px vertical spacers, and on tap opens ONE

    <code>TimePickerFlyout</code> presenter via the <xref href="FluentGpu.Controls.Overlay" data-throw-if-not-resolved="false"></xref> service (the whole face is a single FlyoutButton,

    TimePicker_themeresources.xaml:232). The popup is placed so the centered 40px accent highlight band overlays the

    face (DateTimePickerFlyoutHelper.cpp:39-71) and is width-matched to the face's realized width

    (TimePickerFlyout_Partial.cpp:196-200). It hosts side-by-side LOOPING selector columns (item height 40) — the

    shared <xref href="FluentGpu.Controls.DateTimeLoopColumn" data-throw-if-not-resolved="false"></xref> — under the highlight band, with a 41px Accept(E8FB) / Dismiss(E711) bar.

    <xref href="FluentGpu.Controls.TimePicker.SelectedTime" data-throw-if-not-resolved="false"></xref> is nullable (null shows the hour/minute/AM placeholders, the WinUI HasNoTime state);

    <xref href="FluentGpu.Controls.TimePicker.ClockIdentifier" data-throw-if-not-resolved="false"></xref> selects the 12/24-hour clock and <xref href="FluentGpu.Controls.TimePicker.MinuteIncrement" data-throw-if-not-resolved="false"></xref> coarsens the minute

    column.
  example: []
  syntax:
    content: 'public sealed class TimePicker : Component'
    content.vb: Public NotInheritable Class TimePicker Inherits Component
