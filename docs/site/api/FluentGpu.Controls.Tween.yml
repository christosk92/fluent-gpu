  namespace: FluentGpu.Controls
  summary: >-
    The typed computed-"TemplateSettings" convention — the antidote to WinUI's stringly <code>TemplateSettings</code> bound into

    storyboards. A control declares a local <code>readonly record struct &lt;Control&gt;TemplateSettings(...)</code> of typed values

    (rotations, heights, clip rects, open/close animation positions), computes it ONCE per state change (a pure factory

    called in render, or a <code>UseMemo</code>/<code>OnRealized</code> effect that reads the control's own signals), and feeds the

    fields into the engine's existing channels: static props, <code>TransformBind</code>/<code>OpacityBind</code>/<code>WidthBind</code>/

    <code>HeightBind</code>, <code>AnimEngine</code> keyframe seeds, or the clip-rect channel (<code>AnimChannel.ClipL/T/R/B</code>). Never

    rebuild the record inside a hot bind/effect body — compute it in the memo/factory. <xref href="FluentGpu.Controls.ExpanderTemplateSettings" data-throw-if-not-resolved="false"></xref>

    is the reference; the same shape serves CommandBarFlyout, NavigationView, Progress*, TeachingTip, TabView, TreeView, …

    These small helpers are the shared interpolation math those records use.
  example: []
