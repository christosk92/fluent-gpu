  source:
    remote:
      path: src/FluentGpu.Scene/Columns.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: ScrollState
    path: ../../src/FluentGpu.Scene/Columns.cs
    startLine: 160
  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Scroll + virtualization state for a viewport node (marked <code>NodeFlags.Scrollable</code>). There are O(viewports)

    of these — not one per node — so the store keeps them in a sparse side-table keyed by node index, not a parallel

    column. Ownership (layout.md §6 / architecture-spec §5.5): <b>Input</b> owns <code>Offset*</code> (clamped to the

    published content); <b>Layout</b> publishes <code>Content*</code>/<code>Viewport*</code>; the <b>virtualizer</b> owns the

    <code>Item*</code> / realized-range / anchor fields. Scroll is layout-free: the <code>-ScrollOffset</code> translation is the

    <xref href="FluentGpu.Scene.ScrollState.ContentNode" data-throw-if-not-resolved="false"></xref>'s <code>LocalTransform</code>, never a relayout.
  example: []
  syntax:
    content: public struct ScrollState
    content.vb: Public Structure ScrollState
