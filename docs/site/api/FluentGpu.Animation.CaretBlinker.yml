  assemblies:
  - FluentGpu.Animation
  namespace: FluentGpu.Animation
  summary: >-
    Phase-7 tick: accumulate; on each elapsed half-period toggle the caret bit. A slow frame spanning
        several half-periods nets the parity (an even count is a visual no-op — no spurious repaint).
  example: []
  syntax:
    content: public void Tick(float dtMs)
    parameters:
    - id: dtMs
      type: System.Single
    content.vb: Public Sub Tick(dtMs As Single)
