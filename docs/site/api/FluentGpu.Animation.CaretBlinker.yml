  assemblies:
  - FluentGpu.Animation
  namespace: FluentGpu.Animation
  summary: >-
    Drives the focused editor's caret blink (the <xref href="FluentGpu.Animation.RepeatTicker" data-throw-if-not-resolved="false"></xref> phase-7 idiom): while an editable text node

    is focused, the <xref href="FluentGpu.Scene.TextEditState.CaretVisible" data-throw-if-not-resolved="false"></xref> bit toggles every half-period (Win32

    <code>GetCaretBlinkTime</code> semantics — the host passes the OS value; headless uses the fixed 500ms default) and the

    node is marked PaintDirty so the recorder re-emits. One focused editor at a time (focus is singular). The host

    includes <xref href="FluentGpu.Animation.CaretBlinker.HasActive" data-throw-if-not-resolved="false"></xref> in its work gate so the loop keeps ticking at blink granularity while an editor is

    focused — and goes fully idle the moment it blurs. Zero alloc per tick (writes a POD row + a flag bit).
  example: []
  syntax:
    content: public sealed class CaretBlinker
    content.vb: Public NotInheritable Class CaretBlinker
