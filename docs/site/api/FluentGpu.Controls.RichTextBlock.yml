    id: RichTextBlock
    path: ../../src/FluentGpu.Controls/RichTextBlock.cs
    startLine: 24
  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI <code>RichTextBlock</code> equivalent: read-only, multi-paragraph rich text laid out as a vertical column of

    paragraphs. Each paragraph is a <xref href="FluentGpu.Dsl.SpanTextEl" data-throw-if-not-resolved="false"></xref> — an array of typed inline runs (the WinUI

    Run/Bold/Hyperlink inline model, RichTextBlock.g.h:63 get_Blocks) that shapes as ONE wrapped flow (rtb-01).


    <p><b>Selection (rtb-02):</b> ON by default — IsTextSelectionEnabled=TRUE by default on CRichTextBlock

    (RichTextBlock.cpp:1730); mouse drag selects (word on double-click, all on triple), Ctrl+C copies through the

    clipboard seam (TextSelectionManager.cpp:30-41), the highlight reuses the editor's selection brushes

    (TextControlSelectionHighlightColor ≡ the system accent, TextSelectionManager.cpp:52-56) and the I-beam shows

    while selectable. <xref href="FluentGpu.Controls.RichTextBlock.Options.SelectionHighlightColor" data-throw-if-not-resolved="false"></xref> overrides the brush per control (api-04 —

    TextBlock.cpp:266/330 SelectionHighlightColor). Honest scope: selection is PER PARAGRAPH (the drag clamps to the

    paragraph it anchored in); WinUI's cross-paragraph selection arrives with the block-collection pass.</p>


    <p><b>Hyperlinks:</b> <xref href="FluentGpu.Controls.RichTextBlock.Hyperlink(System.String%2cSystem.Action)" data-throw-if-not-resolved="false"></xref> spans get the WinUI inline-Hyperlink treatment — accent

    foreground (HyperlinkForeground = AccentTextFillColorPrimary, generic.xaml:1120-1122), underline, the Hand cursor

    over the span's laid rects and OnClick on release (SetCursor(MouseCursorHand), RichTextBlock.cpp:2995).</p>
