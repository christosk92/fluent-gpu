  summary: >-
    Create a TextBox. The original 3-parameter shape is source-compatible; everything after
        <code class="paramref">header</code> is the grown WinUI surface (Description, two-way Text signal, MaxLength, IsReadOnly,
        AcceptsReturn + multi-line height, IsEnabled, and the EditableText change/selection/commit callbacks).
