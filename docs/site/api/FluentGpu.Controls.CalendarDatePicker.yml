  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI CalendarDatePicker: a single button showing the chosen date (or a "Pick a date" placeholder — WinUI's

    localized default, calendardatepicker_partial.cpp:45-48) with a trailing calendar glyph (E787). Clicking opens an

    interactive <xref href="FluentGpu.Controls.CalendarView" data-throw-if-not-resolved="false"></xref> in a light-dismissable flyout anchored below the button; the calendar's

    <code>SelectedDatesChanged</code> is wired back — picking a date sets <xref href="FluentGpu.Controls.CalendarDatePicker.Date" data-throw-if-not-resolved="false"></xref>, CLOSES the flyout and raises

    <xref href="FluentGpu.Controls.CalendarDatePicker.OnDateChanged" data-throw-if-not-resolved="false"></xref> (calendardatepicker_partial.cpp:201-204, :259-276; a deselect nulls the date but keeps

    the flyout open). The face text uses the culture's short-date pattern by default (the WinUI ShortDate formatter,

    calendardatepicker_partial.cpp:467-473), overridable via <xref href="FluentGpu.Controls.CalendarDatePicker.DateFormat" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
