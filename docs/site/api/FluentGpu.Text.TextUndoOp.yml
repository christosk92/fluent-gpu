  summary: >-
    One reversible edit against an <xref href="FluentGpu.Text.EditDocument" data-throw-if-not-resolved="false"></xref>: the op replaced <xref href="FluentGpu.Text.TextUndoOp.Removed" data-throw-if-not-resolved="false"></xref> with

    <xref href="FluentGpu.Text.TextUndoOp.Inserted" data-throw-if-not-resolved="false"></xref> at <xref href="FluentGpu.Text.TextUndoOp.Start" data-throw-if-not-resolved="false"></xref>. Undo = remove <code>Inserted.Length</code> at <code>Start</code>, re-insert

    <code>Removed</code>, restore <xref href="FluentGpu.Text.TextUndoOp.AnchorBefore" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.TextUndoOp.ActiveBefore" data-throw-if-not-resolved="false"></xref>; redo is the inverse with the

    After pair — so undo/redo restore the EXACT caret/selection the user saw, not a recomputed approximation.
