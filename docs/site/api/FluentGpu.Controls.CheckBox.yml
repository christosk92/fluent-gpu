  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI CheckBox: a 20px box + label. Two-state via the <xref href="System.Boolean" data-throw-if-not-resolved="false"></xref> overload; three-state (adds the mixed

    "indeterminate" glyph) via the <xref href="FluentGpu.Controls.CheckState" data-throw-if-not-resolved="false"></xref> overload, which cycles Unchecked → Checked → Indeterminate →

    Unchecked on click. Controlled — the caller owns the state.


    Visuals follow WinUI 1:1 but WITHOUT WinUI's 12-state matrix (Unchecked/Checked/Indeterminate × Normal/PointerOver/

    Pressed/Disabled, each restating 7 setters). Instead each property is a <xref href="FluentGpu.Controls.StateBrush" data-throw-if-not-resolved="false"></xref> ramp over the

    interaction axis, picked by the logical state; the engine eases Rest→Hover→Pressed using the element's interaction

    timing specs and the disabled leg is a flat swap. The glyph uses WinUI's AnimatedAccept draw-on timeline plus

    <code>PressScale</code> for the pressed "squish". So ramps + one authored stroke-trim timeline express all reachable

    states — see <xref href="FluentGpu.Controls.ControlMotion" data-throw-if-not-resolved="false"></xref>.
  example: []
