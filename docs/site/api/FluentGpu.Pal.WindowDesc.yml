  assemblies:
  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    <code class="paramref">Composited</code> = the window is composited with per-pixel alpha (WS_EX_NOREDIRECTIONBITMAP) so a
        DirectComposition swapchain can show the DWM Mica backdrop through transparent pixels. <code class="paramref">CustomFrame</code> =
        the engine draws the ENTIRE titlebar (WinUI ExtendsContentIntoTitleBar): the platform strips the OS caption
        (WM_NCCALCSIZE) but keeps the resize frame/shadow, answers WM_NCHITTEST from the engine-reported
        <xref href="FluentGpu.Pal.TitleBarRegion" data-throw-if-not-resolved="false"></xref>s, and synthesizes pointer input for the engine-drawn caption buttons.
  example: []
