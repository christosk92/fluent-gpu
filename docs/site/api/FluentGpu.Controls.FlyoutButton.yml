  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI <code>Flyout</code>: a button that opens an anchored, light-dismissable flyout holding arbitrary content
        (not a menu). Opens through the shared overlay service (<xref href="FluentGpu.Controls.OverlayHost" data-throw-if-not-resolved="false"></xref>) exactly like
        <xref href="FluentGpu.Controls.DropDownButton" data-throw-if-not-resolved="false"></xref>; the host wraps the body in the acrylic <code>FlyoutSurface</code> (the
        FlyoutPresenterBackground acrylic + 1px FlyoutBorderThemeBrush stroke + elevation shadow + OverlayCornerRadius corners +
        the MenuPopupThemeTransition reveal), and captures/restores focus on open/close. The body returned by the content thunk
        is the WinUI <code>FlyoutPresenter</code> card: <code>FlyoutContentPadding</code> 16,15,16,17 with the Flyout*Theme min/max
        constraints. Toggling re-click closes it (WinUI Flyout toggle semantics). Light dismiss + Escape are host-provided.
  example: []
  syntax:
    content: 'public sealed class FlyoutButton : Component'
    content.vb: Public NotInheritable Class FlyoutButton Inherits Component
