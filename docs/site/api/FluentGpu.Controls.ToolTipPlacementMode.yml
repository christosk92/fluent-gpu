  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    How the tooltip bubble is positioned — WinUI <code>PlacementMode</code> (the two modes ToolTipService actually
        drives): <xref href="FluentGpu.Controls.ToolTipPlacementMode.Top" data-throw-if-not-resolved="false"></xref> = centered above the TARGET, flipping on a collision (the WinUI default,
        ToolTip_Partial.cpp:1119-1122 "Fall back to the default - PlacementMode_Top"), the target rect inflated by the
        input-mode offset — 20px mouse / 12px keyboard (<xref href="FluentGpu.Controls.ToolTip.MousePlacementOffset" data-throw-if-not-resolved="false"></xref>); <xref href="FluentGpu.Controls.ToolTipPlacementMode.Mouse" data-throw-if-not-resolved="false"></xref> =
        at the last POINTER position, offset 11px below the cursor (ToolTip_Partial.h:56
        <code>m_mousePlacementVerticalOffset = 11</code>; ToolTip_Partial.cpp:976-984 "align ToolTip with the bottom left corner
        of mouse bounding rectangle").
  example: []
  syntax:
    content: 'public enum ToolTipPlacementMode : byte'
    content.vb: Public Enum ToolTipPlacementMode As Byte
