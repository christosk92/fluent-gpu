  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    The POD shaping overlay for one span of a span run: the UTF-16 char range [<xref href="FluentGpu.Foundation.SpanStyle.Start" data-throw-if-not-resolved="false"></xref>, <xref href="FluentGpu.Foundation.SpanStyle.End" data-throw-if-not-resolved="false"></xref>)

    of the CONCATENATED paragraph text plus the style deltas the text seam applies over the base

    <code>TextStyle</code>. Weight 0 / SizeDip 0 / FontFamily empty / Color A==0 = inherit the base. Built by the

    reconciler from <xref href="FluentGpu.Foundation.TextSpan" data-throw-if-not-resolved="false"></xref>s; resolved by both text backends and the glyph renderer through

    <xref href="FluentGpu.Foundation.SpanRunTable.Shared" data-throw-if-not-resolved="false"></xref>, so measure ≡ hit-test ≡ render for span runs too.
  example: []
