  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI-flavoured Expander: a clickable header row with a trailing chevron over a collapsible content panel. The

    header toggles local <xref href="FluentGpu.Hooks.Component" data-throw-if-not-resolved="false"></xref> state (or a controlled <xref href="FluentGpu.Controls.Expander.IsExpanded" data-throw-if-not-resolved="false"></xref> signal); the single

    chevron glyph is ROTATED by the computed <xref href="FluentGpu.Controls.ExpanderTemplateSettings" data-throw-if-not-resolved="false"></xref> (down collapsed → up expanded).


    MOTION — a DELIBERATE divergence from WinUI: the card height EASES (WinUI's ExpandDown/CollapseUp storyboards SNAP

    the layout space and only translate the content, Expander.xaml:39-90), because FluentGpu's design goal is smooth

    transitions of content, not discrete layout repositions. The storyboard TIMINGS and EASINGS stay WinUI-exact:

    expand 333ms KeySpline(0,0,0,1), collapse 167ms KeySpline(1,1,0,1). The whole open/close is one declarative

    engine transition — <xref href="FluentGpu.Foundation.SizeMode.Reflow" data-throw-if-not-resolved="false"></xref> on the content clip wrapper (the interpolated height runs

    through real layout each tick, so neighbouring content reflows smoothly and RIGIDLY), with

    <xref href="FluentGpu.Foundation.SizeAnchor.Trailing" data-throw-if-not-resolved="false"></xref> riding the content's bottom edge on the reveal edge (the WinUI

    slide-out-from-under-the-header look, rounded bottom corners visible mid-motion). No control-local ticker, no

    per-frame re-render: the engine owns the motion.


    CUSTOMIZATION goes through <xref href="FluentGpu.Controls.Expander.Parts" data-throw-if-not-resolved="false"></xref> (the one generic door — no per-feature knobs): every named template

    part accepts arbitrary element props, e.g. a sticky pinned header

    (<code>[PartHeader] = b =&gt; b with { StickyTop = 8f, OnPinned = …, Fill = stuck.Value ? … : b.Fill }</code>) or an

    edge-to-edge content panel (<code>[PartContent] = c =&gt; c with { Padding = Edges4.All(0) }</code>). Mechanics-critical

    props are re-asserted after the modifier, so customization can restyle everything but break nothing.
  example: []
