  assemblies:
  - FluentGpu.Text.DirectWrite
  namespace: FluentGpu.Text.DirectWrite
  summary: >-
    Lay out <code class="paramref">text</code>; fills <xref href="FluentGpu.Text.DirectWrite.TextLayoutEngine.Glyphs" data-throw-if-not-resolved="false"></xref> + metrics. <code class="paramref">wrap</code>/<code class="paramref">trim</code>
        are the TextWrap/TextTrim enum ints; <code class="paramref">size</code> is DIP. <code class="paramref">weight</code> is the NUMERIC
        font weight — the int IS the DWRITE_FONT_WEIGHT (clamped 1..999; ≤0 → 400). <code class="paramref">charSpacing</code> is
        WinUI CharacterSpacing in 1/1000 em; <code class="paramref">lineHeight</code> (DIP; NaN/≤0 = font-natural) resolves per
        <code class="paramref">stacking</code> (LineStacking enum int) and <code class="paramref">lineBounds</code> (TextLineBounds enum int).

        <p><code class="paramref">spans</code> (rtb-01 inline runs): per-char-range style overlays applied over the base style —
        the text still shapes as ONE flow (one itemize + one wrap pass, like a WinUI paragraph's inline collection);
        each span resolves its own face/weight/size for its range. <code class="paramref">names</code> resolves span family ids
        (null ⇒ span families fall back to the base family). Line box: the MAX ascent/descent across base + spans —
        one uniform line height per paragraph (the per-line LineStackingStrategy=MaxHeight refinement for mixed-size
        lines is future work; uniform-size spans, the overwhelming case, are exact).</p>
  example: []
