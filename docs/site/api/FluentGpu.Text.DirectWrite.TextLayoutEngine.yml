  namespace: FluentGpu.Text.DirectWrite
  summary: >-
    Point → UTF-16 insertion index. The index is SNAPPED to the nearest edge of the hit glyph cluster — its
        leading edge when the point falls in the left half, its trailing edge (= the next cluster's start, or the line
        end) in the right half — and <code class="paramref">trailing</code> reports which. Out-of-bounds points clamp: above → first
        line, below → last line, left → line start, right → line end; a hard-broken line clamps to the position BEFORE
        its terminator cluster, so a click past the text never jumps the caret to the next line. Multi-glyph clusters
        (base + marks) are walked as one box; an index is never produced inside a cluster.
  example: []
  syntax:
    content: public int HitTest(Point2 point, out bool trailing)
    parameters:
    - id: point
      type: FluentGpu.Foundation.Point2
    - id: trailing
      type: System.Boolean
    return:
      type: System.Int32
    content.vb: Public Function HitTest(point As Point2, trailing As Boolean) As Integer
