  summary: >-
    Caret geometry for a UTF-16 index. Returns the LEADING position of <code class="paramref">charIndex</code>: at a
        soft-wrap boundary that is the START of the continuation line — trailing affinity (pinning the caret to the END
        of the wrapped line) is the caller's job; <code class="paramref">charIndex</code> == text length → the trailing edge of the
        last line. An index inside a multi-char cluster (ligature/surrogate pair) snaps forward to the cluster's
        trailing edge. Out-of-range indices clamp.
