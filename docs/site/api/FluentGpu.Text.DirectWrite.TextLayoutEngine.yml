  assemblies:
  - FluentGpu.Text.DirectWrite
  namespace: FluentGpu.Text.DirectWrite
  summary: >-
    The DirectWrite layout engine (text.md §8): itemize → shape (per run) → wrap (UAX #14 break opportunities) → position,

    with BiDi L2 reordering per line. Drives BOTH measurement (metrics) and rendering (positioned glyphs) so they layout

    identically — and the editor queries (<xref href="FluentGpu.Text.DirectWrite.TextLayoutEngine.HitTest(FluentGpu.Foundation.Point2%2cSystem.Boolean%40)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.DirectWrite.TextLayoutEngine.CaretAt(System.Int32%2cSystem.Single%40%2cSystem.Single%40%2cSystem.Single%40%2cSystem.Int32%40)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.DirectWrite.TextLayoutEngine.RangeRects(System.Int32%2cSystem.Int32%2cSystem.Span%7bFluentGpu.Foundation.RectF%7d)" data-throw-if-not-resolved="false"></xref>) read the

    retained per-glyph cluster + per-line tables of the SAME layout, so hit-testing matches rendering exactly. Owns its

    itemizer + shaper + face cache; reusable, single-thread-confined. Results live in reused grow-only buffers

    (valid until the next <xref href="FluentGpu.Text.DirectWrite.TextLayoutEngine.Layout(System.ReadOnlySpan%7bSystem.Char%7d%2cSystem.String%2cSystem.Int32%2cSystem.Single%2cSystem.Single%2cSystem.Int32%2cSystem.Int32%2cSystem.Int32%2cSystem.Single%2cSystem.Single%2cSystem.Int32%2cSystem.Int32%2cSystem.ReadOnlySpan%7bFluentGpu.Foundation.SpanStyle%7d%2cFluentGpu.Foundation.StringTable)" data-throw-if-not-resolved="false"></xref>; queries fire per keystroke/pointer-move with 0 steady-state allocation).

    v1: design-advance shaping with kerning/ligatures/complex-script; font fallback + color glyphs are layered on in

    later phases; query edge mapping is leading=left (LTR — BiDi-correct edges arrive with the RTL workstream, but the

    scan is already cluster-correct and walks the visual order).
