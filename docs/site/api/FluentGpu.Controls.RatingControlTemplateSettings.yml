  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Computed template settings for the <xref href="FluentGpu.Controls.RatingControl" data-throw-if-not-resolved="false"></xref> (the typed-record convention -- see

    <xref href="FluentGpu.Controls.PersonPicture.PersonPictureTemplateSettings" data-throw-if-not-resolved="false"></xref> / Expander.ExpanderTemplateSettings):

    the resolved <em>display value</em> (the rating shown right now -- pointer-over preview, else committed value, else

    placeholder), the foreground/background brushes for the current visual state, and the partial-star clip width baked

    for the foreground "Set" layer. Mirrors the geometry WinUI's <code>RatingControl::UpdateRatingItemsAppearance</code> derives

    each pass and binds into its two clipped stack panels. Pure factory: no signals are read here -- the caller passes the

    already-resolved inputs, so this struct is cheap to build per render and never allocates in a hot bind.


    <p>The star foreground recolor is INSTANT, never eased: WinUI drives every star visual state with

    <code>VisualStateManager::GoToState(useTransitions:false)</code> (see <code>UpdateRatingItemsAppearance</code>), so the brush

    steps the instant the pointer-over preview resolves. We honor that by computing the resting <xref href="FluentGpu.Controls.RatingControlTemplateSettings.Foreground" data-throw-if-not-resolved="false"></xref>

    directly from the sweep and leaving the glyph's <code>HoverColor</code> at <code>default</code> (A==0 ⇒ the recorder leaves the

    color untouched and runs no hover ramp) -- a granular re-render swaps the resting color in one step, no cross-fade.</p>
  example: []
  syntax:
    content: 'public readonly record struct RatingControlTemplateSettings : IEquatable<RatingControlTemplateSettings>'
    content.vb: Public Structure RatingControlTemplateSettings Implements IEquatable(Of RatingControlTemplateSettings)
