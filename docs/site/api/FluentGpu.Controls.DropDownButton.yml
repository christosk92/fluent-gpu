  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI <code>DropDownButton</code>: a standard <xref href="FluentGpu.Controls.Button" data-throw-if-not-resolved="false"></xref> with a trailing chevron that opens a

    <xref href="FluentGpu.Controls.MenuFlyout" data-throw-if-not-resolved="false"></xref> of choices below it on click. WinUI's DropDownButton derives from Button, so it IS the Button

    template (RootGrid background/border/corner + an 83ms BrushTransition) plus a 2-column grid — content (<code>*</code>) and a

    12×12 chevron AnimatedIcon (<code>Auto</code>, <code>Margin 8,0,0,0</code>). The chevron foreground is

    <code>DropDownButtonForegroundSecondary</code> (TextFillColorSecondaryBrush; Tertiary on hover/press, the disabled foreground

    when disabled); its FontIcon fallback is glyph <code></code> at FontSize 8.


    <p>

    Open/close goes through the overlay popup service (<xref href="FluentGpu.Controls.Overlay.Service" data-throw-if-not-resolved="false"></xref>): re-click toggles, Escape / click-outside

    light-dismiss, and focus is captured on open + restored on close (host-wired). Keyboard: Enter/Space (the engine's focused-

    clickable activation) and Down open the flyout. The overlay raises the WinUI ExpandCollapse semantics (Collapsed↔Expanded);

    <xref href="FluentGpu.Controls.DropDownButton.IsEnabled" data-throw-if-not-resolved="false"></xref> gates all interaction via the engine and swaps the resting fill/border/foreground to the disabled

    tokens. The chevron itself does NOT rotate on open — matching WinUI's AnimatedChevronDownSmall, whose only states are

    Normal/PointerOver/Pressed (no Expanded state). See the deferral note in the control's design comments.

    </p>
