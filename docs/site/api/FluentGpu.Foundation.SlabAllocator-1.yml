  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    Stable, generation-versioned slab over <code class="typeparamref">T</code>. Index 0 is reserved as the null slot,

    so <code>default(Handle)</code> is null. Generation is bumped on Free (ABA defense). O(1) alloc/free via an

    intrusive int free-list. Pointer-bearing T uses a side <code>_next</code> array (we always do, here).
