  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  example: []
  syntax:
    content: public static Element Create(InfoBarSeverity severity, string title, string message, Action? onClose = null, bool isOpen = true, bool isClosable = true, bool isIconVisible = true, Element? actionButton = null, Action<InfoBarClosingEventArgs>? onClosing = null, Action<InfoBarClosedEventArgs>? onClosed = null, Element? content = null, string? iconGlyph = null, TemplateParts? parts = null)
    parameters:
    - id: severity
      type: FluentGpu.Controls.InfoBarSeverity
      description: Selects the status glyph + severity colors via <xref href="FluentGpu.Controls.InfoBar.InfoBarTemplateSettings" data-throw-if-not-resolved="false"></xref>.
    - id: title
      type: System.String
      description: SemiBold title line (WinUI InfoBarTitleFontWeight). Empty =&gt; omitted.
    - id: message
      type: System.String
      description: Regular message body. Empty =&gt; omitted.
    - id: onClose
      type: System.Action
      description: >-
        Invoked when the X is clicked (WinUI sets reason=CloseButton then IsOpen=false). Pair with
            <code class="paramref">onClosing</code>/<code class="paramref">onClosed</code> for the full lifecycle.
    - id: isOpen
      type: System.Boolean
      description: >-
        Whether the bar is shown. WinUI's IsOpen defaults to <code>false</code>; this stateless factory
            defaults to <code>true</code> so a constructed bar renders (callers gate visibility with their own signal/state).
    - id: isClosable
      type: System.Boolean
      description: When true (the WinUI default) the trailing 38x38 close button is shown.
    - id: isIconVisible
      type: System.Boolean
      description: When true (the WinUI default) the standard severity icon is shown.
    - id: actionButton
      type: FluentGpu.Dsl.Element
      description: >-
        Optional trailing action slot (WinUI ActionButton) - laid out inline after the
            message when it fits, else below it. Pass e.g. <code>Button.Create(...)</code> or <code>HyperlinkButton.Create(...)</code>.
    - id: onClosing
      type: System.Action{FluentGpu.Controls.InfoBarClosingEventArgs}
      description: >-
        Closing hook (WinUI Closing). Set <code>e.Cancel = true</code> to veto: the close is aborted and
            <code class="paramref">onClose</code>/<code class="paramref">onClosed</code> do not run (the caller keeps the bar open).
    - id: onClosed
      type: System.Action{FluentGpu.Controls.InfoBarClosedEventArgs}
      description: Closed hook (WinUI Closed), fired after a non-canceled close.
    - id: content
      type: FluentGpu.Dsl.Element
      description: >-
        Optional expanded content (WinUI <code>Content</code>/<code>ContentTemplate</code>, InfoBar.idl:94-95):
            rendered in the second row of the content column, below the title/message/action panel (ContentArea,
            InfoBar.xaml:126). When title, message AND action are all absent it becomes the sole content of the column
            (the NoBannerContent state, InfoBar.xaml:86-90 / InfoBar.cpp:282-286).
    - id: iconGlyph
      type: System.String
      description: >-
        Optional custom icon glyph (WinUI <code>IconSource</code>, InfoBar.idl:77). When set (and
            <code class="paramref">isIconVisible</code>) it replaces the standard severity circle+status stack — the UserIconVisible
            state (InfoBar.cpp:261-264) — capped at 16x16 with the standard icon margin (UserIconBox, InfoBar.xaml:111).
    - id: parts
      type: FluentGpu.Dsl.TemplateParts
      description: >-
        Lightweight per-part styling (CSS ::part): modifiers keyed by the <code>PartXxx</code> consts —
            see <xref href="FluentGpu.Dsl.TemplateParts" data-throw-if-not-resolved="false"></xref> for the contract. Title/Message are TextEl parts
            (<code>parts.Set&lt;TextEl&gt;(InfoBar.PartTitle, …)</code>).
    return:
      type: FluentGpu.Dsl.Element
    content.vb: Public Shared Function Create(severity As InfoBarSeverity, title As String, message As String, onClose As Action = Nothing, isOpen As Boolean = True, isClosable As Boolean = True, isIconVisible As Boolean = True, actionButton As Element = Nothing, onClosing As Action(Of InfoBarClosingEventArgs) = Nothing, onClosed As Action(Of InfoBarClosedEventArgs) = Nothing, content As Element = Nothing, iconGlyph As String = Nothing, parts As TemplateParts = Nothing) As Element
