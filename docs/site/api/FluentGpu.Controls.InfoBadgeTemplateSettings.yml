- uid: FluentGpu.Controls.InfoBadgeTemplateSettings.IconGlyphSizePadded
  commentId: F:FluentGpu.Controls.InfoBadgeTemplateSettings.IconGlyphSizePadded
  id: IconGlyphSizePadded
  parent: FluentGpu.Controls.InfoBadgeTemplateSettings
  langs:
  - csharp
  - vb
  name: IconGlyphSizePadded
  nameWithType: InfoBadgeTemplateSettings.IconGlyphSizePadded
  fullName: FluentGpu.Controls.InfoBadgeTemplateSettings.IconGlyphSizePadded
  type: Field
  source:
    remote:
      path: src/FluentGpu.Controls/InfoBadge.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: IconGlyphSizePadded
    path: ../../src/FluentGpu.Controls/InfoBadge.cs
    startLine: 37
  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI renders the icon inside a <code>Viewbox</code> (IconPresenter, VerticalAlignment=Stretch) that fills
        the RootGrid content box, so the glyph is scaled to the box HEIGHT, not a fixed font size. The box height is
        16 minus the RootGrid Padding AND the IconPresenter margin: the FontIcon state margin is 4,0,4,2
        (IconInfoBadgeFontIconMargin, InfoBadge_themeresources.xaml:14, applied at :71) — the Attention/Informational
        Icon STYLES additionally pad the root <code>0,4,0,2</code> (:96/:108) → 16 − (4+2) − (0+2) = 8 tall, while an unpadded
        FontIcon keeps 16 − (0+2) = 14; the non-font 'Icon' state (SymbolIconSource) margin is 4,4,4,4
        (IconInfoBadgeIconMargin, :16, applied at :65) → 16 − (4+4) = 8. We reproduce that by driving the glyph
        <code>Size</code> off these per-state target heights.
  example: []
  syntax:
    content: public const float IconGlyphSizePadded = 8
    return:
      type: System.Single
    content.vb: Public Const IconGlyphSizePadded As Single = 8
