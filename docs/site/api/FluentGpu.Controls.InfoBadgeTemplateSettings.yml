  example: []
  syntax:
    content: public InfoBadgeTemplateSettings(byte Kind, float Height, float MinWidth, float CornerRadius, Edges4 ContentMargin)
    parameters:
    - id: Kind
      type: System.Byte
      description: 0 = Dot, 1 = Value (text), 2 = Icon (font/glyph).
    - id: Height
      type: System.Single
      description: 'Resolved badge height: 4 for a Dot, otherwise clamped to MaxHeight = 16.'
    - id: MinWidth
      type: System.Single
      description: 'Resolved minimum width: 4 for a Dot, otherwise 16 (MeasureOverride squares a too-narrow badge).'
    - id: CornerRadius
      type: System.Single
      description: InfoBadgeCornerRadius = Height / 2 — a full pill (2 for a Dot, 8 for a 16-tall badge).
    - id: ContentMargin
      type: FluentGpu.Foundation.Edges4
      description: >-
        Per-kind inner margin: Value/FontIcon = 4,0,4,2; a non-font IconElement = 4,4,4,4
            (IconInfoBadgeIconMargin, InfoBadge_themeresources.xaml:16).
