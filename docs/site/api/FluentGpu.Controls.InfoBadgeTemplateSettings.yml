  summary: >-
    Computed template settings for the <xref href="FluentGpu.Controls.InfoBadge" data-throw-if-not-resolved="false"></xref> — the typed-record convention modelled on

    <xref href="FluentGpu.Controls.ExpanderTemplateSettings" data-throw-if-not-resolved="false"></xref>. Mirrors WinUI's generated <code>InfoBadgeTemplateSettings</code>: the display kind

    (Dot vs Value vs Icon, derived from Value/Icon exactly like <code>OnDisplayKindPropertiesChanged</code>), the resolved badge

