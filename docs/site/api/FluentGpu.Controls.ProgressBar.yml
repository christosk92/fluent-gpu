  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI ProgressBar (1:1). A 3px-min band (<code>ProgressBarMinHeight</code>) holding a 1px track

    (<code>ProgressBarTrackHeight</code>, <code>ControlStrongStrokeColorDefault</code>) under an accent indicator

    (<code>AccentFillColorDefaultBrush</code>) with a 1.5px corner. <xref href="FluentGpu.Controls.ProgressBar.Determinate(System.Single%2cSystem.Single%2cFluentGpu.Controls.ProgressBarState%2cFluentGpu.Dsl.TemplateParts)" data-throw-if-not-resolved="false"></xref> fills the indicator to a 0..1

    value; <xref href="FluentGpu.Controls.ProgressBar.Indeterminate(System.Single%2cFluentGpu.Controls.ProgressBarState%2cFluentGpu.Dsl.TemplateParts)" data-throw-if-not-resolved="false"></xref> sweeps the two clipped accent indicators across the track on the looping

    translate keyframes WinUI binds from <code>ProgressBarTemplateSettings</code> (Container/Container2 positions). Paused/Error

    stop the sweep and settle a full-width bar at <code>ContainerAnimationMidPosition</code>, recolored to

    <code>SystemFillColorCaution</code> / <code>SystemFillColorCritical</code> (instant recolor — no fill-color anim channel).
