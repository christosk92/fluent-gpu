  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Indeterminate progress: the two clipped accent indicators sweeping across the track on the WinUI
        ProgressBarTemplateSettings translate keyframes. In Paused/Error, the track hides and only indicator2 shows,
        recolored to caution/critical (matching WinUI's IndeterminatePaused / IndeterminateError visual states).
        <code class="paramref">parts</code> = per-part styling keyed by <xref href="FluentGpu.Controls.ProgressBar.PartTrack" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.ProgressBar.PartFill" data-throw-if-not-resolved="false"></xref> (the
        PartFill modifier runs on BOTH sweeping indicators).
  example: []
  syntax:
    content: public static Element Indeterminate(float width = 240, ProgressBarState state = ProgressBarState.Normal, TemplateParts? parts = null)
    parameters:
    - id: width
      type: System.Single
    - id: state
      type: FluentGpu.Controls.ProgressBarState
    - id: parts
      type: FluentGpu.Dsl.TemplateParts
    return:
      type: FluentGpu.Dsl.Element
