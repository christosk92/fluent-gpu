  summary: >-
    Determinate progress; <code class="paramref">value</code> is clamped to 0..1, indicator width = value * width.
        <code class="paramref">state</code> selects the indicator color (Normal accent / Paused caution / Error critical).
        <code class="paramref">parts</code> = per-part styling keyed by <xref href="FluentGpu.Controls.ProgressBar.PartTrack" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Controls.ProgressBar.PartFill" data-throw-if-not-resolved="false"></xref>.
