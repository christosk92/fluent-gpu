  namespace: FluentGpu.Dsl
  summary: >-
    Back-compat facade over the semantic token table (<xref href="FluentGpu.Dsl.Tok" data-throw-if-not-resolved="false"></xref>). The flat names here mirror what existing call

    sites use; each forwards to the active <xref href="FluentGpu.Dsl.TokenSet" data-throw-if-not-resolved="false"></xref>, so a theme swap (<xref href="FluentGpu.Dsl.Tok.Use(FluentGpu.Dsl.ThemeKind)" data-throw-if-not-resolved="false"></xref>) re-themes them

    too. New code should prefer <xref href="FluentGpu.Dsl.Tok" data-throw-if-not-resolved="false"></xref> / <xref href="System.Type" data-throw-if-not-resolved="false"></xref> directly. The host still injects the OS accent +

    Mica background through the <xref href="FluentGpu.Dsl.Theme.Accent" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Dsl.Theme.WindowBackground" data-throw-if-not-resolved="false"></xref> setters.
