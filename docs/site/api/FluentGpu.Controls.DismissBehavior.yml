  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Opens anchored, light-dismissable flyouts (menus, ComboBox/DropDownButton/SplitButton dropdowns, ColorPicker). A

    control captures its own node via <xref href="FluentGpu.Dsl.BoxEl.OnRealized" data-throw-if-not-resolved="false"></xref> and passes a thunk for it as the anchor; the host

    positions the popup relative to the anchor's on-screen rect (flip/nudge into the viewport) and animates it open/closed

    with the WinUI MenuPopupThemeTransition. Resolve via <code>UseContext(Overlay.Service)</code> inside an <xref href="FluentGpu.Controls.OverlayHost" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: 'public enum DismissBehavior : byte'
    content.vb: Public Enum DismissBehavior As Byte
