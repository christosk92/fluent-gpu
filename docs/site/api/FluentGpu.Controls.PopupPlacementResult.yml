  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Result of placing an anchored popup: the absolute top-left, which side it opened on (so the open animation
        can reveal from the correct edge), the width/height that actually fit (after a full collision resize), the EFFECTIVE
        placement after fallback (WinUI <code>PerformPlacementWithFallback</code> reports the placement that won), and the
        corner-join against the anchor.
