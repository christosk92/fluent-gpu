  namespace: FluentGpu.Media
  summary: >-
    HTTP(S) + local-file fetcher, configured per the cross-ecosystem consensus (Flutter cache_manager, iOS URLSession,

    OkHttp/Coil, browsers):


    <ul><li>ONE pooled <xref href="System.Net.Http.SocketsHttpHandler" data-throw-if-not-resolved="false"></xref> — never <code>new HttpClient()</code> per request (socket exhaustion).</li><li><xref href="System.Net.Http.SocketsHttpHandler.PooledConnectionLifetime" data-throw-if-not-resolved="false"></xref> recycles connections so DNS is re-resolved (stale-DNS
      / CDN-edge rotation fix) without IHttpClientFactory.</li><li>HTTP/2 with multiple connections — CDN request multiplexing; bounded <code>MaxConnectionsPerServer</code>.</li><li>Automatic decompression; per-request deadline via the token (NOT the global <code>HttpClient.Timeout</code>).</li><li>Disk-first: a persistent <xref href="FluentGpu.Media.DiskImageCache" data-throw-if-not-resolved="false"></xref> serves instant, offline, restart-surviving hits.</li><li>Streams the body into an <code>ArrayPool</code> buffer — no per-fetch <code>byte[]</code>.</li></ul>

    Reuse ONE instance app-wide. Maps transport/HTTP-status to <xref href="FluentGpu.Scene.ImageFailureKind" data-throw-if-not-resolved="false"></xref> for transient-vs-permanent.
