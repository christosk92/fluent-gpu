  namespace: FluentGpu.Foundation
  summary: >-
    Decode <code class="paramref">hash</code> into <code class="paramref">bgraPremul</code> (PREMULTIPLIED BGRA8, opaque, stride
        = width*4; at least width*height*4 bytes). Returns false on a malformed hash. <code class="paramref">width</code>×
        <code class="paramref">height</code> ≈ 32×32 is plenty (BlurHash is low-frequency; the GPU's linear sampler does the rest).
  example: []
