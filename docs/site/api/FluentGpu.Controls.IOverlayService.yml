  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Open anchored to an arbitrary window-DIP RECT instead of a scene node — pointer-relative placement
        (ToolTip PlacementMode.Mouse, context menus at the right-tap point). <code class="paramref">owner</code> (optional) is the
        logical owner node, used only to resolve the nested-overlay parent chain for cascade close.
  example: []
  syntax:
    content: OverlayHandle OpenAt(Func<RectF> anchorRect, Func<Element> content, FlyoutPlacement placement, PopupOptions options = default, Func<NodeHandle>? owner = null)
    parameters:
    - id: anchorRect
      type: System.Func{FluentGpu.Foundation.RectF}
    - id: content
      type: System.Func{FluentGpu.Dsl.Element}
    - id: placement
      type: FluentGpu.Controls.FlyoutPlacement
    - id: options
      type: FluentGpu.Controls.PopupOptions
    - id: owner
      type: System.Func{FluentGpu.Foundation.NodeHandle}
    return:
      type: FluentGpu.Controls.OverlayHandle
    content.vb: Function OpenAt(anchorRect As Func(Of RectF), content As Func(Of Element), placement As FlyoutPlacement, options As PopupOptions = Nothing, owner As Func(Of NodeHandle) = Nothing) As OverlayHandle
