  assemblies:
  - FluentGpu.Pal.Windows
  namespace: FluentGpu.Pal.Windows
  summary: >-
    A borderless, non-activating, owned top-level popup HWND — the Win32 backing of <xref href="FluentGpu.Pal.IPlatformPopupWindow" data-throw-if-not-resolved="false"></xref>

    and the engine analogue of WinUI's windowed <code>CPopup</code> (microsoft-ui-xaml Popup_Partial.cpp:1019

    <code>SetIsWindowed()</code> creates an HWND via PopupSiteBridge so flyouts/menus can render OUTSIDE the XAML window;

    Popup_Partial.cpp:951-970 <code>IsConstrainedToRootBounds == false</code> for windowed popups).


    <ul><li><code>WS_POPUP</code> + owner: borderless, z-ordered above the owner, hidden when the owner minimizes.</li><li><code>WS_EX_NOACTIVATE</code> + <code>MA_NOACTIVATE</code>: the popup NEVER takes activation — keyboard focus stays on the
      owner window exactly like WinUI's popup site (the dispatcher keeps routing keys to the main window).</li><li><code>WS_EX_TOOLWINDOW</code>: no taskbar button / Alt-Tab entry.</li><li><code>WS_EX_NOREDIRECTIONBITMAP</code>: no GDI redirection surface — the host presents into it with its own
      composition swapchain (same composited-surface model as the main window).</li><li>Mouse input over the popup is FORWARDED to the owner <xref href="FluentGpu.Pal.Windows.Win32Window" data-throw-if-not-resolved="false"></xref>, translated popup-client →
      screen → owner-client → owner DIP, so the one InputDispatcher hit-tests the popup subtree at its scene
      coordinates (the subtree stays in the single SceneStore; out-of-bounds coords hit-test fine).</li></ul>
  example: []
  syntax:
    content: 'public sealed class Win32PopupWindow : IPlatformPopupWindow, IDisposable'
    content.vb: Public NotInheritable Class Win32PopupWindow Implements IPlatformPopupWindow, IDisposable
