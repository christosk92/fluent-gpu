    path: ../../src/FluentGpu.Controls/ToggleButton.cs
    startLine: 40
  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI ContentPresenter.BackgroundTransition = BrushTransition 83ms (lines 199-201): a logical state
        flip (checked↔unchecked↔indeterminate) cross-fades the resting fill via the E3 sparse BrushAnim row instead
        of snapping. WinUI scopes the transition to Background only; the engine also ramps the border diff —
        a documented sub-100ms over-coverage. NaN = snap.
  example: []
