  assemblies:
  - FluentGpu.Media
  namespace: FluentGpu.Media
  summary: >-
    Off-thread, parallel, non-blocking, PRIORITIZED image decoder (media-pipeline.md §3). Implements the portable

    <xref href="FluentGpu.Scene.IImageDecoder" data-throw-if-not-resolved="false"></xref> seam the <xref href="FluentGpu.Scene.ImageCache" data-throw-if-not-resolved="false"></xref> drives: <xref href="FluentGpu.Media.DecodeScheduler.Begin(System.Int32%2cSystem.String%2cSystem.Int32%2cSystem.Int32%2cFluentGpu.Scene.ImagePriority)" data-throw-if-not-resolved="false"></xref> enqueues into one of three

    priority lanes (Visible &gt; Overscan &gt; Prefetch) — a non-blocking write on the UI thread; a pool of N worker tasks

    drain the highest non-empty lane and fetch+decode CONCURRENTLY; and <xref href="FluentGpu.Media.DecodeScheduler.Pump(FluentGpu.Scene.ImageCompleteHandler%2cFluentGpu.Scene.ImageReadyHandler)" data-throw-if-not-resolved="false"></xref> drains finished results on the

    UI thread and never waits on a decode. <xref href="FluentGpu.Media.DecodeScheduler.Prioritize(System.Int32%2cFluentGpu.Scene.ImagePriority)" data-throw-if-not-resolved="false"></xref> promotes a queued prefetch that just scrolled into

    view; <xref href="FluentGpu.Media.DecodeScheduler.Cancel(System.Int32)" data-throw-if-not-resolved="false"></xref> drops a queued/in-flight decode whose row recycled. Robustness: per-attempt timeout,

    transient retry with exponential backoff, permanent fail-fast (see <xref href="FluentGpu.Scene.ImageFailureKind" data-throw-if-not-resolved="false"></xref>). Under backpressure

    the lowest off-screen lane is dropped — never Visible. Diagnostics post to the <code>media</code> counter group.
