  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A data-driven items panel (WinUI's ItemsRepeater): <code class="paramref">count</code> items × a <code class="paramref">template</code>

    over a pluggable <code class="paramref">layout</code>. Virtualizing layouts (Stack/Grid/Custom/Measured/LinedFlow/SpanGrid)

    realize only the window and recycle over the slab free-list — 0-alloc steady scroll; non-virtual layouts

    (Wrap/Inline) build the full child list (use for small collections). No built-in selection/focus — compose that

    above it (ItemsView is exactly that composition). E11-L2 surface:

    <code class="paramref">elementPrepared</code>/<code class="paramref">elementClearing</code>/<code class="paramref">elementIndexChanged</code> are

    WinUI's ItemsRepeater lifecycle events (ItemsRepeater.idl:186-188 ElementPrepared/ElementClearing/

    ElementIndexChanged), fired with item indices at realize time; <code class="paramref">visibleRange</code> is the prefetch

    hook (first,last); <code class="paramref">transition</code> maps ItemCollectionTransition onto the FLIP/Animate pipeline.
  example: []
  syntax:
