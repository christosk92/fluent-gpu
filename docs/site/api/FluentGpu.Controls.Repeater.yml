  summary: >-
    TYPED data binding (E11-L2): the WinUI <code>ItemsSource</code> + <code>ItemTemplate</code> pair as a generic overload —

    the template receives <code>(index, item)</code> with no cast and no per-item boxing. Count and item identity come

    from <code class="paramref">items</code>; re-render with a new list (or wrap in a signal read) to update.
