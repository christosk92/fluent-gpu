  namespace: FluentGpu.Text.DirectWrite
  summary: >-
    One laid-out glyph: post-shaping glyph id, the DWrite face it belongs to (as <code>nint</code>), and its pen
        position in DIP — X within the paragraph (line-relative origin folded in), Y = its line baseline from the top.
        <xref href="FluentGpu.Text.DirectWrite.LaidGlyph.Size" data-throw-if-not-resolved="false"></xref> is the DIP em size the glyph was shaped at (spans may override the base size) and
        <xref href="FluentGpu.Text.DirectWrite.LaidGlyph.Span" data-throw-if-not-resolved="false"></xref> the index of the <xref href="FluentGpu.Foundation.SpanStyle" data-throw-if-not-resolved="false"></xref> it belongs to (−1 = the base style) — the renderer
        rasterizes at <xref href="FluentGpu.Text.DirectWrite.LaidGlyph.Size" data-throw-if-not-resolved="false"></xref> and tints per span (rtb-01 inline runs).
  example: []
