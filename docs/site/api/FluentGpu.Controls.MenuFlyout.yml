  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Builds the popup body for a dropdown menu — a vertical list of command rows (each <code>Role = MenuItem</code>).
        Selecting a row runs its command and closes the overlay. Used by DropDownButton / SplitButton / ToggleSplitButton /
        MenuBar / TimePicker. The host's <code>FlyoutSurface</code> already supplies the acrylic backdrop, 1px flyout stroke,
        OverlayCornerRadius, elevation shadow and the (0,2,0,2) presenter padding — this returns INNER content only.
  example: []
  syntax:
    content: public static class MenuFlyout
    content.vb: Public Module MenuFlyout
