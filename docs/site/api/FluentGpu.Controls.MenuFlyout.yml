  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Sub-menu hover-open AND delay-close interval — WinUI CascadingMenuHelper reads the user's
        HKCU MenuShowDelay, defaulting to <code>DefaultMenuShowDelay = 400</code>ms (MenuFlyout_Partial.h:13;
        CascadingMenuHelper.cpp:93-95 fallback, :439/:508 open/close timer intervals). The platform pump writes the
        live registry value into <xref href="FluentGpu.Pal.SystemParams" data-throw-if-not-resolved="false"></xref> at startup; headless stays 400.
  example: []
  syntax:
    content: public static float SubMenuShowDelayMs { get; }
    parameters: []
    return:
      type: System.Single
    content.vb: Public Shared ReadOnly Property SubMenuShowDelayMs As Single
