  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Drain finished decodes. <code class="paramref">onPixels</code> gets the bucket pixels (transient span);
        <code class="paramref">onComplete</code> gets the final state transition incl. <xref href="FluentGpu.Scene.ImageFailureKind" data-throw-if-not-resolved="false"></xref> + attempt count
        (after any transient retries the decoder performed internally).
  example: []
  syntax:
