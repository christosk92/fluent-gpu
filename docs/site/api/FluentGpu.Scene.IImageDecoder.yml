    id: IImageDecoder
    path: ../../src/FluentGpu.Scene/ImageCache.cs
    startLine: 54
  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    The decode seam: the portable cache asks a leaf to decode a source to a target size, off the UI thread.
        The Windows leaf is WIC→GPU (needs-pixels); the headless leaf is deterministic. <xref href="FluentGpu.Scene.IImageDecoder.Pump(FluentGpu.Scene.ImageCompleteHandler%2cFluentGpu.Scene.ImageReadyHandler)" data-throw-if-not-resolved="false"></xref> drains completions
        onto the UI thread (the +1-frame latency contract: a request is never ready the same frame), invoking
        <code class="paramref">onPixels</code> with the bucket pixels then <code class="paramref">onComplete</code> with the state transition.
  example: []
  syntax:
    content: public interface IImageDecoder
    content.vb: Public Interface IImageDecoder
  derivedClasses:
  - FluentGpu.Media.DecodeScheduler
  - FluentGpu.Scene.FakeImageDecoder
