  assemblies:
  - FluentGpu.Dsl
  namespace: FluentGpu.Dsl
  summary: >-
    A clipping, scrolling viewport over a single (possibly oversized) content child. Scroll is layout-free

    (layout.md §6): layout arranges the content at the content-box origin and publishes <code>ContentSize</code>; the

    <code>-ScrollOffset</code> translation is the content's <code>LocalTransform</code>, written by Input on wheel/drag.
  example: []
  syntax:
    content: 'public sealed record ScrollEl : Element, IEquatable<Element>, IEquatable<ScrollEl>'
