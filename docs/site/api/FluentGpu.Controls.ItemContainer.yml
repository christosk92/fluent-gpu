  summary: >-
    The full container. <code class="paramref">onInteraction</code> receives the WinUI interaction trigger + the live modifier

    chord — a composing control (ItemsView) routes it through its selector. The returned tree is plain (recyclable);

    realize-time closures are the only managed cost. <code class="paramref">isTabStop</code> is the roving-tab-stop seam:

    ItemsView keeps it true on the keyboard-current container ONLY (TabNavigation="Once", ItemsView.xaml:7).
