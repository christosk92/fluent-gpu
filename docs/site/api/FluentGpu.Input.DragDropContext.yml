  namespace: FluentGpu.Input
  summary: >-
    L2 of the drag-drop stack (plan E5; user ruling 2026-06-10: deliberately NOT WinUI's OLE

    <code>DataPackage</code>/<code>DoDragDrop</code> modal loop — the Flutter Draggable/DragTarget + react-beautiful-dnd context +

    SwiftUI draggable/dropDestination model instead; the frame loop STAYS LIVE for the whole gesture). Layered on the

    L1 <xref href="FluentGpu.Input.DragController" data-throw-if-not-resolved="false"></xref> gesture:


    • A <code>BoxEl.Draggable</code> (<xref href="FluentGpu.Foundation.DragSource" data-throw-if-not-resolved="false"></xref>: a string <code>Kind</code> discriminator + a payload factory) marks
      a node a typed drag source. When the L1 press promotes past the drag box, the dispatcher calls
      <xref href="FluentGpu.Input.DragDropContext.TryBegin(FluentGpu.Foundation.NodeHandle%2cFluentGpu.Foundation.Point2%2cFluentGpu.Foundation.KeyModifiers%2cFluentGpu.Foundation.PointerKind)" data-throw-if-not-resolved="false"></xref> — the nearest enabled DragSource up the chain opens THE session and its
      <xref href="FluentGpu.Foundation.DragSource.PayloadFactory" data-throw-if-not-resolved="false"></xref> resolves ONCE (cold gesture edge; never per-move).
    • A <code>BoxEl.DropTarget</code> (<xref href="FluentGpu.Foundation.DropTargetSpec" data-throw-if-not-resolved="false"></xref>) makes ANY surface a candidate receiver. Per pointer move
      the dispatcher hands <xref href="FluentGpu.Input.DragDropContext.Move(FluentGpu.Foundation.NodeHandle%2cFluentGpu.Foundation.Point2%2cSystem.Single%2cSystem.Single%2cFluentGpu.Foundation.KeyModifiers)" data-throw-if-not-resolved="false"></xref> the hit-test chain under the pointer; the nearest enabled target whose
      <code>AcceptKinds</code> contains the session's Kind becomes <xref href="FluentGpu.Input.DragDropContext.OverTarget" data-throw-if-not-resolved="false"></xref> (a non-accepting target never
      blocks an accepting ancestor — the Flutter DragTarget pass-through). The dragged subtree can never self-target:
      L1 already cleared its <code>HitTestVisible</code>, so hit-testing sees THROUGH the moving visual.
    • Enter/Leave fire on target transitions, Over on every move while inside, Drop on release over an accepting
      target (<xref href="FluentGpu.Input.DragDropContext.TryDrop(FluentGpu.Foundation.Point2%2cFluentGpu.Foundation.KeyModifiers%2cSystem.Boolean%40)" data-throw-if-not-resolved="false"></xref> — fired BEFORE the L1 completion so the target reads the live session). The ONE
      mutable <xref href="FluentGpu.Foundation.DragSession" data-throw-if-not-resolved="false"></xref> instance is reused for the whole gesture (0 steady-state alloc per move);
      handlers copy what they keep.

    Edge auto-scroll (the rbd/WinUI "drag near the viewport edge keeps scrolling" behavior) is engine-level here so

    every drag gets it: while a session is live, the pointer entering the hot zone of the nearest OVERFLOWING

    scrollable ancestor arms a proportional scroll velocity the host drives via <xref href="FluentGpu.Input.DragDropContext.Tick(System.Single)" data-throw-if-not-resolved="false"></xref>. Constants and

    behavior are WinUI's (microsoft-ui-xaml dxaml\xcp\dxaml\lib\ListViewBase_Partial_Reorder.cpp): a 100px edge band

    (:39 LISTVIEWBASE_EDGE_SCROLL_EDGE_WIDTH_PX), speed varying LINEARLY from 1500 px/s at the edge to 150 px/s at the

    band's inner rim (:42-47), a 50ms delay-start with instant velocity updates once running (:40, :1749-1753), the

    start-edge tried before the end-edge (:1660-1707), and scrolling suppressed when already pinned to that boundary

    (:1686-1690, :1718-1722).
