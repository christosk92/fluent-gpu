  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Reorder geometry for a one-axis item strip (the WinUI live-reorder model — ListViewBase_Partial_Reorder.cpp):

    given the items' resting main-axis extents and the dragged item's accumulated drag delta

    (<code>DragEventArgs.TotalDy</code> for a vertical list / <code>TotalDx</code> for a horizontal strip), it computes


    <ul><li>the PENDING insertion slot under the pointer (midpoint rule: the dragged item's centre crossing a sibling's

    midpoint claims its slot — the engine analogue of <code>IItemLookupPanel.GetClosestElementInfo</code> +

    <code>LiveReorderHelper::MovedItems::GetDragOverIndex</code>, ListViewBase_Partial_Reorder.cpp:984-1063),</li><li>the dwell-committed TARGET slot — WinUI moves displaced items only after the drag-over index has been stable

    for the live-reorder timer (200ms list / 300ms grid — LISTVIEW_LIVEREORDER_TIMER / GRIDVIEW_LIVEREORDER_TIMER,

    ListViewBase_Partial_Reorder.cpp:50-51), and</li><li>per-sibling displacement hints (<xref href="FluentGpu.Controls.ReorderList.OffsetFor(System.Int32)" data-throw-if-not-resolved="false"></xref>): items between the dragged slot and the target shift

    by one full dragged-extent (+spacing), the live-reorder "items part to make room" motion

    (LiveReorderTimerTickHandler → MoveItemsForLiveReorder, ListViewBase_Partial_Reorder.cpp:2125-2158).</li></ul>


    Consumers (ListView/GridView/TabView/TreeView item hosts) wire it to the drag lifecycle: <code>Begin</code> in

    <code>OnDragStarted</code>, <code>Update(e.TotalDy)</code> in <code>OnDragDelta</code>, <code>Advance(dtMs)</code> from the frame clock;

    when <code>Advance</code> commits a new target, re-render with the children ORDER projected to it

    (<xref href="FluentGpu.Controls.ReorderList.ProjectOrder(System.Span%7bSystem.Int32%7d)" data-throw-if-not-resolved="false"></xref> — stable keys keep node identity) and a <code>LayoutTransition</code> (<code>Animate</code>) on

    every item: displaced siblings genuinely change slots, so the engine's FLIP pipeline animates the

    part-to-make-room motion, and <code>Input.DragController</code> re-anchors the pointer-held visual to its moved slot (no

    jump). <xref href="FluentGpu.Controls.ReorderList.OffsetFor(System.Int32)" data-throw-if-not-resolved="false"></xref> remains for offset-hint consumers — but an authored <code>OffsetX/Y</code> hint must NOT

    be combined with <code>Animate</code> on the same node: FLIP position tracks own the whole translate channel

    (<code>CompositeOp.Replace</code> — AnimEngine.ReframePosition) and would stomp the hint at seed and settle.

    <code>Complete()</code> in <code>OnDragCompleted</code> fires <xref href="FluentGpu.Controls.ReorderList.OnCommit" data-throw-if-not-resolved="false"></xref> with the collection move;

    <code>Cancel()</code> in <code>OnDragCanceled</code> drops every hint. All state is grow-only — steady-state reorder

    (drag at pointer rate) allocates nothing.


    <p>TWO-DIMENSIONAL MODE (<xref href="FluentGpu.Controls.ReorderList.Begin2D(System.Int32%2cSystem.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref> / <xref href="FluentGpu.Controls.ReorderList.Update2D(System.Single%2cSystem.Single%2cSystem.Single%2cSystem.Single)" data-throw-if-not-resolved="false"></xref> / <xref href="FluentGpu.Controls.ReorderList.OffsetFor2D(System.Int32%2cSystem.Single%2cSystem.Single%2cSystem.Single%40%2cSystem.Single%40)" data-throw-if-not-resolved="false"></xref>) absorbs the

    GridView live-reorder geometry: the pending slot comes from the dragged tile's accumulated (dx,dy) against the grid

    (row from the vertical stride, column from the realized column width), with the 300ms grid dwell

    (GRIDVIEW_LIVEREORDER_TIMER = 300ms — ListViewBase_Partial_Reorder.cpp:51) re-armed on every drag-over change. A

    one-slot grid shift can WRAP A ROW (the trailing tile of a row dropping to the head of the next), so the 2-D

    displacement hint carries BOTH axes. The dwell ticker (<xref href="FluentGpu.Controls.ReorderList.Advance(System.Single)" data-throw-if-not-resolved="false"></xref>), the moved-items projection

    (<xref href="FluentGpu.Controls.ReorderList.ProjectOrder(System.Span%7bSystem.Int32%7d)" data-throw-if-not-resolved="false"></xref> — row-major, identical to 1-D), <xref href="FluentGpu.Controls.ReorderList.Complete" data-throw-if-not-resolved="false"></xref> and <xref href="FluentGpu.Controls.ReorderList.Cancel" data-throw-if-not-resolved="false"></xref> are

    shared with the 1-D path unchanged. <xref href="FluentGpu.Controls.ReorderList.Columns" data-throw-if-not-resolved="false"></xref> = 0 selects the 1-D path; <xref href="FluentGpu.Controls.ReorderList.Begin2D(System.Int32%2cSystem.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref> sets it.</p>
