  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Pure placement math for an anchored flyout — a faithful port of WinUI's <code>FlyoutBase::CalculatePlacementPrivate</code>

    (FlyoutBase_Partial.cpp:2503-2659): try the requested major side, walk the per-side fallback order

    (Top:[T,B,L,R] / Bottom:[B,T,L,R] / Left:[L,R,T,B] / Right:[R,L,T,B], cpp:2559-2593), justify on the secondary axis

    and clamp both axes into the container (<code>TryPlacement</code>, cpp:415-483); when NOTHING fits, keep the first choice

    and resize along the major axis to the side with more space (<code>ResizeToFit</code>/<code>SelectSideWithMoreSpace</code>,

    cpp:2605-2614, 581-635); finally shift by <xref href="FluentGpu.Controls.FlyoutPositioner.FlyoutMargin" data-throw-if-not-resolved="false"></xref> away from the anchor (cpp:2622-2646) and, for

    non-windowed popups only, clamp the min edge to the container origin (cpp:2648-2653 — windowed popups may go

    negative, i.e. above/left of the window).
  example: []
  syntax:
    content: public static class FlyoutPositioner
    content.vb: Public Module FlyoutPositioner
