  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Container-rect placement. <code class="paramref">container</code> is the collision box in the SAME coordinate space as

    <code class="paramref">anchor</code> — the viewport rect for constrained popups, the monitor WORK AREA (translated into

    window space) for windowed out-of-bounds popups (FlyoutBase_Partial.cpp:3382-3392 <code>useMonitorBounds</code>).

    <code class="paramref">isWindowed</code> skips the final min-edge clamp (cpp:2648-2653) so a windowed popup may extend

    above/left of the window.
  example: []
  syntax:
    content: public static PopupPlacementResult Place(in RectF anchor, in Size2 popup, in RectF container, FlyoutPlacement placement, bool isWindowed)
    parameters:
    - id: anchor
      type: FluentGpu.Foundation.RectF
    - id: popup
      type: FluentGpu.Foundation.Size2
    - id: container
      type: FluentGpu.Foundation.RectF
    - id: placement
      type: FluentGpu.Controls.FlyoutPlacement
    - id: isWindowed
      type: System.Boolean
    return:
      type: FluentGpu.Controls.PopupPlacementResult
    content.vb: Public Shared Function Place(anchor As RectF, popup As Size2, container As RectF, placement As FlyoutPlacement, isWindowed As Boolean) As PopupPlacementResult
