  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI DatePicker: a single Button FACE that shows Day / Month / Year text columns (ordered per locale from

    <xref href="System.Globalization.CultureInfo.CurrentCulture" data-throw-if-not-resolved="false"></xref>'s ShortDatePattern, month names FULL — WinUI formats the face/flyout with

    "day month.full year", DatePicker_Partial.cpp:1811) separated by 1px vertical spacers, and on tap opens a

    <code>DatePickerFlyout</code> popup via the <xref href="FluentGpu.Controls.Overlay" data-throw-if-not-resolved="false"></xref> service. The popup is placed so the centered 40px

    accent highlight band overlays the face (DateTimePickerFlyoutHelper.cpp:39-71) and is width-matched to the face's

    realized width (DatePickerFlyout_Partial.cpp:202-206). It hosts three side-by-side LOOPING selector columns

    (item height 40) following the WinUI LoopingSelector RepeatButton model — caret step buttons (EDDB/EDDC) revealed

    on column hover plus click-to-select — under the highlight band, with a 41px Accept(E8FB) / Dismiss(E711) bar.

    <xref href="FluentGpu.Controls.DatePicker.SelectedDate" data-throw-if-not-resolved="false"></xref> is nullable (a null value shows the day/month/year placeholders). Day/Month/Year columns

    can each be hidden; the year range defaults to today ±100 years.
  remarks: >-
    FIDELITY NOTE: WinUI's LoopingSelector also supports a touch-fling momentum scroll-snap. The engine's

    <code>ScrollEl</code> is layout-free with no programmatic scroll-offset signal and no snap-points seam, so this control

    uses WinUI's RepeatButton + click-to-select fallback (which WinUI ships for the keyboard/mouse path) rather than

    adding a new engine seam. The visual result — a fixed window with a centered selection and up/down repeat buttons —

    is faithful; true touch-fling snapping is a deferred engine seam.
