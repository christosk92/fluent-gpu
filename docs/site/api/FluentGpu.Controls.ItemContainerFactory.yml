- uid: FluentGpu.Controls.ItemContainerFactory
  commentId: T:FluentGpu.Controls.ItemContainerFactory
  id: ItemContainerFactory
  parent: FluentGpu.Controls
  children: []
  langs:
  - csharp
  - vb
  name: ItemContainerFactory
  nameWithType: ItemContainerFactory
  fullName: FluentGpu.Controls.ItemContainerFactory
  type: Delegate
  source:
    remote:
      path: src/FluentGpu.Controls/ItemsView.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: ItemContainerFactory
    path: ../../src/FluentGpu.Controls/ItemsView.cs
    startLine: 52
  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Custom item-container factory — the E11-L4 SKIN seam: the List/Grid presets + TreeView supply their WinUI item

    chrome (ListViewItemPresenter / GridView dual-border / TreeViewItem row) around the engine's ONE selection + keyboard

    substrate. The returned BoxEl must wire <code class="paramref">onInteraction</code> (press/Enter/Space → the selector) and

    <code class="paramref">onFocusChanged</code> (keyboard-current tracking), and should be <code>Focusable</code> so the engine focus

    ring lands on items. Null ⇒ the default WinUI <xref href="FluentGpu.Controls.ItemContainer" data-throw-if-not-resolved="false"></xref> chrome.
  example: []
  syntax:
    content: public delegate BoxEl ItemContainerFactory(int index, Element content, ItemChromeState state, Action<ItemContainerTrigger, KeyModifiers> onInteraction, Action<bool> onFocusChanged)
    parameters:
    - id: index
      type: System.Int32
    - id: content
      type: FluentGpu.Dsl.Element
    - id: state
      type: FluentGpu.Controls.ItemChromeState
    - id: onInteraction
      type: System.Action{FluentGpu.Controls.ItemContainerTrigger,FluentGpu.Foundation.KeyModifiers}
    - id: onFocusChanged
      type: System.Action{System.Boolean}
    return:
      type: FluentGpu.Dsl.BoxEl
    content.vb: Public Delegate Function ItemContainerFactory(index As Integer, content As Element, state As ItemChromeState, onInteraction As Action(Of ItemContainerTrigger, KeyModifiers), onFocusChanged As Action(Of Boolean)) As BoxEl
