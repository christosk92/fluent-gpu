  assemblies:
  - FluentGpu.Hooks
  namespace: FluentGpu.Hooks
  summary: >-
    A signals-native component: <xref href="FluentGpu.Hooks.ReactiveComponent.Setup" data-throw-if-not-resolved="false"></xref> runs ONCE at mount (the SolidJS model) — create signals, wire

    bindings (<code>TransformBind</code>/<code>For</code>/<code>Show</code>) and return the tree. The component never re-renders;

    fine-grained bindings update exactly the nodes that read a changed signal. Use this for the highest-performance UI;

    use plain <xref href="FluentGpu.Hooks.Component" data-throw-if-not-resolved="false"></xref> when you prefer the re-render model (still granular).
  example: []
  syntax:
    content: 'public abstract class ReactiveComponent : Component'
    content.vb: Public MustInherit Class ReactiveComponent Inherits Component
