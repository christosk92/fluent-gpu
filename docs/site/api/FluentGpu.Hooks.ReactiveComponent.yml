  fullName: FluentGpu.Hooks.ReactiveComponent.RunsOnce
  type: Property
  source:
    remote:
      path: src/FluentGpu.Hooks/Component.cs
      branch: feat/prop-unification
      repo: https://github.com/christosk92/fluent-gpu.git
    id: RunsOnce
    path: ../../src/FluentGpu.Hooks/Component.cs
    startLine: 69
  assemblies:
  - FluentGpu.Hooks
  namespace: FluentGpu.Hooks
  summary: >-
    True for run-once (signals-native) components: the reconciler runs their body untracked, so the render-effect

    never re-subscribes and never re-renders — reactivity comes purely from the bindings/For/Show inside. False for

    classic <xref href="FluentGpu.Hooks.Component" data-throw-if-not-resolved="false"></xref>s, whose render-effect re-runs on their own state/context changes (granular).
  example: []
  syntax:
    content: public override sealed bool RunsOnce { get; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public NotOverridable Overrides ReadOnly Property RunsOnce As Boolean
