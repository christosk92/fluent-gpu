  summary: >-
    Resolve a virtual-key + modifier chord. <code class="paramref">multiLine</code> mirrors WinUI's
        <code>AcceptsReturn</code>-driven splits: Enter inserts a newline only there (Ctrl+Enter still commits), and
        vertical navigation exists only there.
