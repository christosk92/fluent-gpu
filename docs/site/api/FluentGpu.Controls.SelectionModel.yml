  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    Index/RANGE-based selection state (E11-L3) — WinUI's <code>SelectionModel</code> flattened to one level (our items

    controls are flat projections; TreeView flattens before selecting). DECOUPLED FROM REALIZATION: selection is a

    sorted list of disjoint inclusive index ranges, so <xref href="FluentGpu.Controls.SelectionModel.SelectAll" data-throw-if-not-resolved="false"></xref> over 50k rows stores ONE range and

    realizes nothing — realized items read their state on prepare via <xref href="FluentGpu.Controls.SelectionModel.IsSelected(System.Int32)" data-throw-if-not-resolved="false"></xref> (O(log ranges)).


    Signals-first: every mutation bumps <xref href="FluentGpu.Controls.SelectionModel.Version" data-throw-if-not-resolved="false"></xref>; a composing control reads <code>Version.Value</code> in its

    render so a selection change re-renders exactly that control (which re-skins only its realized window).

    <xref href="FluentGpu.Controls.SelectionModel.SelectionChanged" data-throw-if-not-resolved="false"></xref> fires once per mutating call that actually changed state (WinUI SelectionChanged).


    Pointer/keyboard semantics are the verified WinUI selector trio (controls\dev\ItemsView):

    <xref href="FluentGpu.Controls.SelectionModel.OnInteractedAction(System.Int32%2cSystem.Boolean%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> / <xref href="FluentGpu.Controls.SelectionModel.OnFocusedAction(System.Int32%2cSystem.Boolean%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> implement SingleSelector.cpp:25-57,

    MultipleSelector.cpp:18-92 and ExtendedSelector.cpp:18-83 — anchor+shift ranges, ctrl toggles, focus-follow.
