  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    The placeholder→image reveal transition (the cross-fade) — spec'd with the engine's shared motion vocabulary (a

    duration in ms + an <xref href="FluentGpu.Foundation.ImageTransition.Easing" data-throw-if-not-resolved="false"></xref> curve) so image reveals animate exactly like every other control. Override

    per-image via <code>ImageEl.Transition</code>, or change the app-wide <xref href="FluentGpu.Foundation.ImageTransition.Default" data-throw-if-not-resolved="false"></xref> once at startup. Set

    <xref href="FluentGpu.Foundation.ImageTransition.DurationMs" data-throw-if-not-resolved="false"></xref> = 0 (or use <xref href="FluentGpu.Foundation.ImageTransition.None" data-throw-if-not-resolved="false"></xref>) to DISABLE the fade — the image then appears instantly.
