  summary: >-
    Warm the cache for a source the UI is ABOUT to need (the next scroll page) at <xref href="FluentGpu.Scene.ImagePriority.Prefetch" data-throw-if-not-resolved="false"></xref>
        — decoded ahead, never pinned, so it's instantly Resident when a row scrolls in (Nuke/Coil prefetch). Evictable
        until a real node pins it. No-op if already requested.
