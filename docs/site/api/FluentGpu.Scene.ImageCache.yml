    id: ImageCache
    path: ../../src/FluentGpu.Scene/ImageCache.cs
    startLine: 77
  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Portable image residency: source→handle dedup, a Pending/Ready/Failed state machine, **liveness ref-counting**

    (a pinned/on-screen image is never evicted — the single biggest real-world cache bug, per the research), and an

    LRU byte budget over decoded images. Decode happens off-thread behind <xref href="FluentGpu.Scene.IImageDecoder" data-throw-if-not-resolved="false"></xref>; <xref href="FluentGpu.Scene.ImageCache.Pump" data-throw-if-not-resolved="false"></xref>

    applies completions (+1-frame latency). The GPU texture upload is a needs-pixels leaf concern; this owns the logic.
