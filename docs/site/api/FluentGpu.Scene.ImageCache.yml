    id: Request
    path: ../../src/FluentGpu.Scene/ImageCache.cs
    startLine: 153
  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Request (or dedup) a decode of <code class="paramref">source</code> at a target size; returns a stable handle. On
        a cache MISS, an optional <code class="paramref">blurHash</code> is decoded ONCE into a tiny LQIP texture (uploaded under
        this id) so a blurred preview shows instantly until the full-res art lands. A cache HIT returns before any of
        this — so re-renders of the same image do no work.
  example: []
  syntax:
    content: public ImageHandle Request(string source, int targetW, int targetH, ImagePriority priority = ImagePriority.Visible, string? blurHash = null, ImageTransition? transition = null)
    parameters:
    - id: source
      type: System.String
    - id: targetW
      type: System.Int32
    - id: targetH
      type: System.Int32
    - id: priority
      type: FluentGpu.Scene.ImagePriority
    - id: blurHash
      type: System.String
    - id: transition
      type: System.Nullable{FluentGpu.Foundation.ImageTransition}
    return:
      type: FluentGpu.Scene.ImageHandle
    content.vb: Public Function Request(source As String, targetW As Integer, targetH As Integer, priority As ImagePriority = ImagePriority.Visible, blurHash As String = Nothing, transition As ImageTransition? = Nothing) As ImageHandle
