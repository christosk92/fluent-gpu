  summary: >-
    A WinUI <code>ToggleSplitButton</code> (SplitButton + checked state). Like <xref href="FluentGpu.Controls.SplitButton" data-throw-if-not-resolved="false"></xref> it is one joined chrome

    with two independently-clickable halves — a primary half on the left and a dropdown half on the right separated by a

    1px divider — but the primary half <em>toggles</em> on/off instead of running a one-shot action: clicking it (or

    Enter/Space activation) flips <xref href="FluentGpu.Controls.ToggleSplitButton.IsChecked" data-throw-if-not-resolved="false"></xref> and raises <xref href="FluentGpu.Controls.ToggleSplitButton.OnToggle" data-throw-if-not-resolved="false"></xref>; the dropdown half opens a

    <xref href="FluentGpu.Controls.MenuFlyout" data-throw-if-not-resolved="false"></xref>. WinUI derives ToggleSplitButton from SplitButton and they share one ControlTemplate; the

    checked visual-states are driven by <code>InternalIsChecked()</code> (SplitButton.cpp UpdateVisualStates) — so this control

    is the SplitButton chrome with the accent <code>Checked*</code> token ramps folded in.


    <p>

    When checked, both halves fill accent (SplitButtonBackgroundChecked = AccentFillColorDefault), the foreground is

    TextOnAccent, the outer border is AccentControlElevationBorder, and the inner divider switches to the on-accent

    divider stroke. Open/close goes through the overlay popup service (<xref href="FluentGpu.Controls.Overlay.Service" data-throw-if-not-resolved="false"></xref>): re-click toggles,

    Escape / click-outside light-dismiss, focus captured on open + restored on close (host-wired), FocusTrap roves the

    menu, and ExpandCollapse Collapsed↔Expanded is raised by the overlay lifecycle. Keyboard: Enter/Space toggle the

    primary (the engine's focused-clickable activation), Down opens the flyout. <xref href="FluentGpu.Controls.ToggleSplitButton.IsEnabled" data-throw-if-not-resolved="false"></xref> gates all

    interaction via the engine and folds the chrome to the disabled tokens. The checked state is a caller

    <xref href="FluentGpu.Signals.Signal%601" data-throw-if-not-resolved="false"></xref> so a page can read/display it; pass <xref href="FluentGpu.Controls.ToggleSplitButton.OnToggle" data-throw-if-not-resolved="false"></xref> to observe flips.

    </p>
