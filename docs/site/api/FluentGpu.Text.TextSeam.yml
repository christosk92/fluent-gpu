  summary: >-
    Process-default <xref href="FluentGpu.Text.IFontSystem" data-throw-if-not-resolved="false"></xref> for engine layers that have no host seam to receive an instance
        through — concretely the input dispatcher's read-only text-selection/hyperlink gestures (rtb-02), which need the
        editor queries but are constructed by hosts (AppHost) that predate them. Set by each backend's constructor;
        last-constructed wins (the established <code>InputHooks.Current</code> channel-default convention). Consumers prefer an
        explicitly-wired instance and fall back here.
