    path: ../../src/FluentGpu.Render/SceneRecorder.cs
    startLine: 116
  assemblies:
  - FluentGpu.Render
  namespace: FluentGpu.Render
  summary: >-
    Record ONE subtree into its own DrawList, re-origined so the subtree's on-screen top-left lands at the

    DrawList's (0,0) — the root-override path for E4 out-of-bounds popup windows (the popup subtree stays in the

    single SceneStore; the host presents this list on the popup window's own swapchain). <code class="paramref">originDip</code>

    is the subtree's window-DIP top-left (= the popup's placed position): the walk starts at the subtree root with

    a parent-world translation of (parentAbs − origin), so every node's own bounds/transform chain composes exactly

    as in the main pass, shifted into popup-window space. No orphan pass — exit orphans belong to the main window.
  example: []
  syntax:
    content: public static SceneRecordStats RecordSubtree(SceneStore scene, DrawList dl, ImageCache? images, in FocusVisualStyle focus, ColorF scrollThumb, ColorF scrollTrack, in TextEditStyle textEdit, NodeHandle root, Point2 originDip)
    parameters:
    - id: scene
      type: FluentGpu.Scene.SceneStore
    - id: dl
      type: FluentGpu.Render.DrawList
    - id: images
      type: FluentGpu.Scene.ImageCache
    - id: focus
      type: FluentGpu.Render.FocusVisualStyle
    - id: scrollThumb
      type: FluentGpu.Foundation.ColorF
    - id: scrollTrack
      type: FluentGpu.Foundation.ColorF
    - id: textEdit
      type: FluentGpu.Render.TextEditStyle
    - id: root
      type: FluentGpu.Foundation.NodeHandle
    - id: originDip
      type: FluentGpu.Foundation.Point2
    return:
      type: FluentGpu.Render.SceneRecordStats
