  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    Process-wide registry of span runs — the interner-style side channel that lets the multi-run style overlay ride an

    <code>int</code> through the POD pipeline (<code>TextStyle.SpanRunId</code> → DrawList <code>DrawGlyphRunCmd.SpanRunId</code>) the way

    strings ride <xref href="FluentGpu.Foundation.StringId" data-throw-if-not-resolved="false"></xref> through <xref href="FluentGpu.Foundation.StringTable" data-throw-if-not-resolved="false"></xref>.


    <p><b>Seam-safe (threading-render-seam.md §9, the StringTable discipline):</b> chunked backing store — chunks are

    allocated once and never moved; a release-store of the count publishes each new slot, the reader acquire-loads the

    count before indexing. The UI thread is the single writer (reconciler, at element-change time — never in frame

    phases 6–13); the render-side glyph path resolves the previous frame's ids concurrently.</p>


    <p><b>Static <xref href="FluentGpu.Foundation.SpanRunTable.Shared" data-throw-if-not-resolved="false"></xref> (deliberate):</b> unlike <xref href="FluentGpu.Foundation.StringTable" data-throw-if-not-resolved="false"></xref> (host-instanced and threaded

    through every constructor), the render-side consumer reaches a span run only through the POD id baked in the draw

    stream — there is no host seam to hand an instance through. One process = one UI thread = one writer, ids burn

    monotonically and are never reused, so a process-global table is safe by the same argument that makes the ids safe.</p>


    <p><b>Reclamation:</b> owners (the scene's span-text side-table) pair <xref href="FluentGpu.Foundation.SpanRunTable.AddRef(System.Int32)" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Foundation.SpanRunTable.Release(System.Int32)" data-throw-if-not-resolved="false"></xref>;

    a run whose count hits 0 has its slot cleared after a creation-distance quarantine (≥ <xref href="FluentGpu.Foundation.SpanRunTable.QuarantineDistance" data-throw-if-not-resolved="false"></xref>

    newer runs registered — far beyond the in-flight frame depth at any realistic churn), so a draw list recorded just

    before the release still resolves. A cleared id resolves null → consumers fall back to the base style. Ids are

    never reused.</p>
