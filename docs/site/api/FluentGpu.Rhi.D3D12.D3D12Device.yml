  summary: >-
    The reference Windows RHI backend (design/subsystems/pal-rhi.md, gpu-renderer.md). Real D3D12: hardware device,

    DIRECT command queue + fence, a DXGI flip-model swapchain on the HWND, an RTV heap, and per-frame

