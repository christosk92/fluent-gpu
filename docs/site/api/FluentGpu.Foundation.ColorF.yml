  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    Perceptually-correct interpolation in LINEAR light, ALPHA-WEIGHTED (true premultiplied — the engine's
        linear-blend/premultiplied color contract) — used for every surface/text cross-fade (hover/press ramps, implicit
        BrushTransitions, gradient morphs). The weighting matters when the endpoints' alphas differ: a translucent
        white-tinted card fill (#0DFFFFFF) cross-fading to an opaque dark solid must stay DARK mid-flight — a straight
        per-channel lerp passes through bright half-transparent grey (the "white flash"). For SAME-alpha endpoints the
        result is identical to the straight linear lerp. Alloc-free (static local helpers, no captures).
  example: []
  syntax:
    content: public static ColorF LerpLinear(ColorF a, ColorF b, float t)
    parameters:
    - id: a
      type: FluentGpu.Foundation.ColorF
    - id: b
      type: FluentGpu.Foundation.ColorF
    - id: t
      type: System.Single
    return:
      type: FluentGpu.Foundation.ColorF
    content.vb: Public Shared Function LerpLinear(a As ColorF, b As ColorF, t As Single) As ColorF
  overload: FluentGpu.Foundation.ColorF.LerpLinear*
  nameWithType.vb: ColorF.LerpLinear(ColorF, ColorF, Single)
  fullName.vb: FluentGpu.Foundation.ColorF.LerpLinear(FluentGpu.Foundation.ColorF, FluentGpu.Foundation.ColorF, Single)
  name.vb: LerpLinear(ColorF, ColorF, Single)
