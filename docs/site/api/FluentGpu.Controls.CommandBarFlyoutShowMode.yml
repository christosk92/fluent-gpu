  summary: >-
    WinUI FlyoutShowMode subset for <xref href="FluentGpu.Controls.CommandBarFlyout" data-throw-if-not-resolved="false"></xref> (CommandBarFlyout.cpp:162-201):
        <xref href="FluentGpu.Controls.CommandBarFlyoutShowMode.Standard" data-throw-if-not-resolved="false"></xref> opens with the overflow ALREADY expanded — transitions suppressed while opening
        (m_commandBarFlyoutIsOpening → UpdateUI(false), CommandBarFlyoutCommandBar.cpp:25/:121/:189-197) — and focuses the
        first command (cpp:29-71). <xref href="FluentGpu.Controls.CommandBarFlyoutShowMode.Transient" data-throw-if-not-resolved="false"></xref> (the default) opens collapsed and never steals focus.
        AlwaysExpanded forces Standard (CommandBarFlyout.cpp:173-177).
