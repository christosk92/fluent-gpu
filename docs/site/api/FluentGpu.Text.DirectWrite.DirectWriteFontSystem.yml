  summary: >-
    Point → UTF-16 index. Returns the SNAPPED insertion index — the leading or trailing edge of the hit
        glyph cluster — and <code class="paramref">trailing</code> reports which half of the cluster was hit. Points outside the
        laid-out bounds clamp to the nearest valid index (above → first line, below → last line, left → line start,
        right → line end), so drag-selection keeps tracking past the box. Editor-hosting backends must implement this;
        the default throws (the experimental GDI path cannot host editable text).
  example: []
  syntax:
    content: public int HitTestText(ReadOnlySpan<char> text, in TextStyle style, float maxWidth, Point2 point, out bool trailing)
