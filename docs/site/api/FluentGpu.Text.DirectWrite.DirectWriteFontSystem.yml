    - id: maxWidth
      type: System.Single
    - id: point
      type: FluentGpu.Foundation.Point2
    - id: trailing
      type: System.Boolean
    return:
      type: System.Int32
    content.vb: Public Function HitTestText(text As ReadOnlySpan(Of Char), style As TextStyle, maxWidth As Single, point As Point2, trailing As Boolean) As Integer
