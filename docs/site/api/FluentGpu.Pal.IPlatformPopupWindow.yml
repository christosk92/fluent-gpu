  assemblies:
  - FluentGpu.Pal
  namespace: FluentGpu.Pal
  summary: >-
    A borderless, non-activating top-level popup surface (the PAL seam for WinUI windowed popups / E4 out-of-bounds

    flyouts; later the substrate for E10 tear-out windows). The host owns rendering into it (its own swapchain on

    <xref href="FluentGpu.Pal.IPlatformPopupWindow.Handle" data-throw-if-not-resolved="false"></xref>); the popup never owns engine state. All bounds are physical virtual-screen px.
  example: []
  syntax:
    content: 'public interface IPlatformPopupWindow : IDisposable'
    content.vb: Public Interface IPlatformPopupWindow Inherits IDisposable
  derivedClasses:
  - FluentGpu.Pal.Windows.Win32PopupWindow
  inheritedMembers:
  - System.IDisposable.Dispose
