  namespace: FluentGpu.Scene
  summary: >-
    Forwards decoded PREMULTIPLIED BGRA8 pixels to the GPU backend. The span is valid only for the duration of
        the synchronous call (it is never stored — the backend copies it into its upload heap), so the cache need not own
        pixel memory: it flows decoder → cache.Pump → host sink → IGpuDevice.UploadImage in one stack.
  example: []
