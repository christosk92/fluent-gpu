  summary: >-
    Which edge of a <xref href="FluentGpu.Foundation.SizeMode.Reflow" data-throw-if-not-resolved="false"></xref> node its CONTENT is anchored to while the size animates.
        <xref href="FluentGpu.Foundation.SizeAnchor.Leading" data-throw-if-not-resolved="false"></xref> = content stays put, the far edge sweeps (a wipe). <xref href="FluentGpu.Foundation.SizeAnchor.Trailing" data-throw-if-not-resolved="false"></xref> = the content's
        end edge rides the animated edge (the WinUI Expander "slide out from under the header": at reveal 0 the content
        sits fully behind the leading edge; its trailing rounded corners stay visible mid-motion). Applied by the recorder
        as a child-group offset — compositor-composed, no per-child knowledge.
  example: []
  syntax:
    content: 'public enum SizeAnchor : byte'
    content.vb: Public Enum SizeAnchor As Byte
