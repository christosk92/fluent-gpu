  - FluentGpu.Media
  namespace: FluentGpu.Media
  summary: >-
    Portable fetch seam (media-pipeline.md §3 "Fetch"): turn a source URI into encoded bytes off the UI thread. Maps

    transport/HTTP-status errors to <xref href="FluentGpu.Scene.ImageFailureKind" data-throw-if-not-resolved="false"></xref> so the scheduler can distinguish transient (network,

    timeout, 5xx → retried) from permanent (404, other 4xx → not retried). Honors the cancellation token (per-attempt

    timeout + shutdown). HTTP(S) + local file by default (<xref href="FluentGpu.Media.DefaultImageFetcher" data-throw-if-not-resolved="false"></xref>).
  example: []
