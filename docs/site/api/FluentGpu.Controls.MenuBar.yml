  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI MenuBar: a horizontal bar of top-level menu titles (File, Edit, View, …). Clicking a title opens its
        <xref href="FluentGpu.Controls.MenuFlyout" data-throw-if-not-resolved="false"></xref> below the title; re-clicking the open title closes it. 1:1 behavior with
        <code>controls/dev/MenuBar</code>:

        <ul><li>Alt access keys — each title carries an Alt+letter mnemonic (<xref href="FluentGpu.Controls.MenuBarItem.AccessKey" data-throw-if-not-resolved="false"></xref>, default the
        first title letter) that opens its menu (MenuBarItem.xaml:12 ExitDisplayModeOnAccessKeyInvoked=False;
        MenuBarItem.cpp:249-253).</li><li>Hover-switch — while ANY menu in the bar is open, pointer-enter on another title opens that one
        (MenuBarItem.cpp:130-138 OnMenuBarItemPointerEntered → IsFlyoutOpen → ShowMenuFlyout).</li><li>Keyboard — a focused title opens on Down/Enter/Space (cpp:158-165); Left/Right move focus between titles
        (cpp:166-191); while a menu is OPEN, Left/Right open the ADJACENT menu (cpp:205-228 OnPresenterKeyDown →
        OpenFlyoutFrom), cycling. Escape closes (the overlay's light-dismiss preview).</li><li>Style — bar MinHeight 40 (MenuBarHeight, MenuBar_themeresources.xaml:44), item button padding 10,4,10,4
        (MenuBarItemButtonPadding :45), item margin 4 (MenuBarItemMargin :46), ControlCornerRadius 4, fills rest/hover/
        pressed/selected = SubtleFill Transparent/Secondary/Tertiary/Tertiary (:7-10), FocusVisualMargin −3
        (MenuBarItem.xaml:14).</li></ul>
