  assemblies:
  - FluentGpu.Dsl
  namespace: FluentGpu.Dsl
  summary: >-
    A CSS-Grid container: column tracks (Pixel/Star/Auto) + gaps; children auto-flow row-major into cells. Rows take

    <xref href="FluentGpu.Dsl.GridEl.RowHeight" data-throw-if-not-resolved="false"></xref> (or the tallest cell when NaN). True tracks — every cell in a column shares its width

    (unlike nested-flex faking). Width-aware: resolves inside a ScrollView. (layout.md §7.)
  example: []
  syntax:
    content: 'public sealed record GridEl : Element, IEquatable<Element>, IEquatable<GridEl>'
