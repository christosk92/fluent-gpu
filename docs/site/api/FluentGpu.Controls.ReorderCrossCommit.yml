  namespace: FluentGpu.Controls
  summary: >-
    The ONE cross-list commit callback (plan E5-L3): the app removes the item from <code class="paramref">from</code>
        at <code class="paramref">fromIndex</code> and inserts <code class="paramref">payload</code> into <code class="paramref">to</code> at
        <code class="paramref">toIndex</code> — one atomic model mutation, both lists re-render from it (signals-first).
        <code class="paramref">from</code> is null (and <code class="paramref">fromIndex</code> −1) when the drag came from a plain
        <code>BoxEl.Draggable</code> of the shared kind rather than another <xref href="FluentGpu.Controls.Reorderable" data-throw-if-not-resolved="false"></xref> (a deposit-style insert).
  example: []
  syntax:
    content: public delegate void ReorderCrossCommit(object? payload, int fromIndex, Reorderable? from, Reorderable to, int toIndex)
    parameters:
    - id: payload
      type: System.Object
    - id: fromIndex
      type: System.Int32
    - id: from
      type: FluentGpu.Controls.Reorderable
    - id: to
      type: FluentGpu.Controls.Reorderable
    - id: toIndex
      type: System.Int32
    content.vb: Public Delegate Sub ReorderCrossCommit(payload As Object, fromIndex As Integer, from As Reorderable, [to] As Reorderable, toIndex As Integer)
