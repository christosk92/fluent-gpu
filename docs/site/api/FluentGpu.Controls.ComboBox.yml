  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI ComboBox: a closed field showing the selected item + a chevron that opens a dropdown list (an anchored,

    light-dismiss overlay whose width matches the field). In <xref href="FluentGpu.Controls.ComboBox.Editable" data-throw-if-not-resolved="false"></xref> mode ONE chrome-owning box (the

    template's single Background border spanning BOTH grid columns, ComboBox_themeresources.xaml:571

    <code>Grid.ColumnSpan="2"</code>) hosts a chromeless <xref href="FluentGpu.Controls.EditableText" data-throw-if-not-resolved="false"></xref> spanning the full width (:580

    <code>ColumnSpan="2"</code>, <code>BorderBrush="Transparent"</code>, padding ComboBoxEditableTextPadding 11,5,38,6 :342) with

    the 30-wide DropDownOverlay button (:581) and the 12×12 chevron glyph (:582–587) overlaid at the right — never a

    second bordered box. Selection is a caller <xref href="FluentGpu.Signals.Signal%601" data-throw-if-not-resolved="false"></xref> so a page can read it.


    <p>

    1:1 with <code>ComboBox_themeresources(_perf2026).xaml</code> + <code>ComboBoxHelper.cpp</code>. Exact tokens/sizes:

    field MinHeight=32 (<code>ComboBoxMinHeight</code>), padding 12,5,0,7 (<code>ComboBoxPadding</code>), CornerRadius=4

    (<code>ControlCornerRadius</code>), BorderThickness=1, MinWidth=64 (<code>ComboBoxThemeMinWidth</code>); the border is the

    <b>ControlElevationBorder</b> gradient (<code>ComboBoxBorderBrush</code>), pressed flattens to a flat stroke

    (<code>ComboBoxBorderBrushPressed=ControlStrokeColorDefault</code>). Field fills rest/hover/pressed/disabled =

    ControlFillColor Default/Secondary/Tertiary/Disabled; foreground ramps Primary→(pressed)Secondary→(disabled)Disabled;

    placeholder Secondary→(pressed)Tertiary. Chevron column width 38, glyph <code></code> 12px, foreground

    <code>TextFillColorSecondary</code>, right-inset 14 (<code>Margin 0,0,14,0</code>).

    </p>

    <p>

    Items (<code>ComboBoxItem</code>): padding 11,5,11,7 (<code>ComboBoxItemThemePadding</code>), margin 5,2,5,2, CornerRadius=3

    (<code>ComboBoxItemCornerRadius</code>); the 3×16 left accent pill (<code>ComboBoxItemPill</code>, corner 1.5, fill

    <code>AccentFillColorDefault</code>, flush left — no margin in the ITEM template) shows only on the selected row. Item

    state matrix mirrors the XAML:

    rest=SubtleTransparent, PointerOver=SubtleSecondary, Pressed=SubtleTertiary; Selected=SubtleSecondary,

    SelectedPointerOver=SubtleTertiary, SelectedPressed=SubtleSecondary; foreground Primary, pressed→Secondary.

    Popup: AcrylicInApp background + <code>SurfaceStrokeColorFlyout</code> 1px + <code>OverlayCornerRadius</code>(8) +

    presenter margin 0,4 (<code>ComboBoxDropdownContentMargin</code>) + <code>MaxDropDownHeight</code>=504 with internal scroll —

    all supplied by the overlay host's <code>FlyoutSurface</code>; here we return only the rows.

    </p>

    <p>

    Open/close = the overlay host's WinUI MenuPopupThemeTransition (250ms cubic-bezier(0,0,0,1) clip-reveal + opacity;

    83ms close fade) — identical to <code>OverlayOpeningAnimation</code>/<code>OverlayClosingAnimation</code> (ControlNormal/Fast

    AnimationDuration). Focus is captured on open and restored on close by the host; the popup is opened with

    <code>PopupOptions(FocusTrap:true)</code> so Tab/arrow roving stays inside the list. Keyboard: when CLOSED, Up/Down/Home/End

    step the selection in place and Space/Enter/F4/Alt+Down open; when OPEN, Up/Down/Home/End move a highlighted row,

    Enter/Space commits it, Escape closes (restoring selection). Type-ahead jumps to the next item whose label starts with

    the typed prefix (WinUI ComboBox text-search), CLOSED or OPEN.

    </p>

    <p>Corner-join (<code>ComboBoxHelper.UpdateCornerRadius</code>): while open-DOWN the field squares its BOTTOM corners so

    the dropdown reads as one piece with the field (the popup squares the abutting TOP corners host-side via the placement

    result's <xref href="FluentGpu.Controls.CornerJoin" data-throw-if-not-resolved="false"></xref>). The non-editable field overlaps the popup by design, so the join is applied while open.</p>
