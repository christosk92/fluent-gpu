  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    Bounded undo/redo for the text editor (cap 512 ops, oldest dropped — a hard memory ceiling per field, like

    RichEdit). Coalescing makes one undo step out of a typing burst: a new op merges into the open top op when the

    kinds match AND the positions are contiguous (typing extends forward from the previous insert's end; backspace

    walks backward, forward-delete stays in place) AND no selection was replaced AND the caller did not seal.

    Paste, IME commit, selection-replacing edits, and any caret relocation seal the run (<xref href="FluentGpu.Text.TextUndoStack.SealRun" data-throw-if-not-resolved="false"></xref> or

    <code>sealRun: true</code> on <xref href="FluentGpu.Text.TextUndoStack.Push(FluentGpu.Text.TextUndoOp%40%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>) so they become their own undo steps — the WinUI/RichEdit feel:

    "abc" undoes in one step, a paste in its own step.
  example: []
  syntax:
    content: public sealed class TextUndoStack
    content.vb: Public NotInheritable Class TextUndoStack
