  assemblies:
  - FluentGpu.Dsl
  namespace: FluentGpu.Dsl
  summary: >-
    A responsive image: no fixed extent — it fills the width its layout gives it and (with
        <code class="paramref">aspect</code> set) derives its height (CSS <code>aspect-ratio</code>), then maps its pixels into that box
        per <code class="paramref">fit</code> (default <xref href="FluentGpu.Foundation.ImageFit.Cover" data-throw-if-not-resolved="false"></xref> — aspect-preserving crop). The album/thumbnail
        grid shape. <code class="paramref">decodePx</code> is the decode-size hint (the real box size isn't known at request time).
  example: []
  syntax:
    content: public static ImageEl Image(string source, ImageFit fit, float aspect = NaN, float decodePx = NaN, float corners = 0, ColorF? placeholder = null, string? blurHash = null, ImageTransition? transition = null)
    parameters:
    - id: source
      type: System.String
    - id: fit
      type: FluentGpu.Foundation.ImageFit
    - id: aspect
      type: System.Single
    - id: decodePx
      type: System.Single
    - id: corners
      type: System.Single
    - id: placeholder
      type: System.Nullable{FluentGpu.Foundation.ColorF}
    - id: blurHash
      type: System.String
    - id: transition
      type: System.Nullable{FluentGpu.Foundation.ImageTransition}
