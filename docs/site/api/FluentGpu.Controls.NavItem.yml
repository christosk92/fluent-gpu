  namespace: FluentGpu.Controls
  summary: >-
    A NavigationView pane entry: a stable key, an icon glyph, and a label. A parent group sets <xref href="FluentGpu.Controls.NavItem.Children" data-throw-if-not-resolved="false"></xref>

    (rendered as an expand/collapse subtree with a chevron + indent); <xref href="FluentGpu.Controls.NavItem.InitiallyExpanded" data-throw-if-not-resolved="false"></xref> seeds it open.

    <xref href="FluentGpu.Controls.NavItem.IsSeparator" data-throw-if-not-resolved="false"></xref> renders the WinUI <code>NavigationViewItemSeparator</code> (1px DividerStroke rule —

    NavigationView_themeresources.xaml:223 height / :46 foreground / :247 margin 0,3,0,4); <xref href="FluentGpu.Controls.NavItem.InfoBadge" data-throw-if-not-resolved="false"></xref> is

    the per-item InfoBadgePresenter slot (right-aligned in the row; overlaid on the icon in the compact rail).

    The positional header is unchanged, so flat <code>new NavItem(key, glyph, label)</code> / <code>IsHeader</code> call sites keep working.
