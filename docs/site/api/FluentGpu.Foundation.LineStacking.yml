  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    How an explicit LineHeight interacts with the font-natural line box (mirrors WinUI LineStackingStrategy;
        BaselineToBaseline is not modeled). MaxHeight — the WinUI BaseTextBlockStyle default
        (TextBlock_themeresources.xaml:16) — makes the line advance max(font-natural, LineHeight); BlockLineHeight makes
        the line advance exactly LineHeight (lines may visually overlap when smaller than natural).
  example: []
