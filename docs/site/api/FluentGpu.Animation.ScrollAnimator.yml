  assemblies:
  - FluentGpu.Animation
  namespace: FluentGpu.Animation
  summary: >-
    Smooth scrolling (phase 7): eases each armed viewport's live offset toward its target (the WinUI inertial wheel feel),

    applies the content's -offset transform, re-realizes the virtual window at guard-band edges, and drives the

    auto-hiding scrollbar's WinUI "conscious" state machine. Only viewports actively scrolling/transitioning are ticked;

    zero work / zero alloc once everything settles (<xref href="FluentGpu.Animation.ScrollAnimator.HasActive" data-throw-if-not-resolved="false"></xref> == false).


    Conscious-scrollbar timing — verified against microsoft-ui-xaml

    controls\dev\CommonStyles\ScrollBar_themeresources.xaml:


    <ul><li>Expand: pointer dwells over the scrollbar lane for ScrollBarExpandBeginTime = 400ms (:188), then the thumb

    grows / track+buttons fade in over ScrollBarExpandDuration = 167ms (:173) with KeySpline 0,0,0,1 (:587) —

    <xref href="FluentGpu.Foundation.Easing.FluentPopOpen" data-throw-if-not-resolved="false"></xref>.</li><li>Contract (lane left, pointer still inside the viewport): begins after ScrollBarContractBeginTime = 500ms

    (:189), plays over ScrollBarContractDuration = 167ms (:176), same spline (:543).</li><li>Indicator fades over ScrollBarOpacityChangeDuration = 83ms (:174), linear (the storyboards' plain

    DoubleAnimation).</li><li>Idle auto-hide after a SCROLL: ScrollBarContractDelay = 2s (:178; ScrollViewer's SeparatorContractDelay is

    the same 2s — ScrollViewer_themeresources.xaml) then the 83ms fade.</li><li>ENGINE-DELIBERATE (documented deviation): when the pointer leaves the whole viewport and the bar was revealed

    by hover alone (no scroll since it appeared), it contracts immediately and retires after

    ContractBeginTime + ContractDuration (≈667ms) + the 83ms fade — WinUI would hold the expanded bar 500ms and the

    thin indicator the full 2s; an untouched hover-flash retiring early reads cleaner and keeps the frame loop idle.

    Scroll-revealed bars keep the WinUI 2s ContractDelay.</li><li>While the pointer rests inside the viewport the thin indicator stays visible (the WinUI MouseIndicator

    hold); it never idle-hides under the pointer.</li></ul>
  example: []
