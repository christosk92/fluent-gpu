    id: RatingControl
    path: ../../src/FluentGpu.Controls/RatingControl.cs
    startLine: 126
  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI <code>RatingControl</code>: a row of stars set by click or press-and-sweep, with an optional caption. The control

    is a two-layer star row -- an always-present unset/background layer (outline glyph E734) and a clipped Set layer

    (filled glyph E735) revealed to the current rating. Faithful port of <code>RatingControl.cpp</code>:


    <ul><li><b>State model</b> -- <xref href="FluentGpu.Controls.RatingControl.Value" data-throw-if-not-resolved="false"></xref> (caller <xref href="FluentGpu.Signals.FloatSignal" data-throw-if-not-resolved="false"></xref>; <code>-1</code> == unset), an unset

    <xref href="FluentGpu.Controls.RatingControl.PlaceholderValue" data-throw-if-not-resolved="false"></xref> shown until a real value is set, and an optional <xref href="FluentGpu.Controls.RatingControl.Caption" data-throw-if-not-resolved="false"></xref>.</li><li><b>Pointer preview</b> -- press-and-sweep fills the stars to the pointer (with a partial tail) and lifts the

    foreground to the pointer-over visual-state color; release commits. <xref href="FluentGpu.Controls.RatingControl.IsClearEnabled" data-throw-if-not-resolved="false"></xref> clears the rating

    when you click the star equal to the current value. Implicit capture keeps the sweep alive OFF the strip while

    pressed, so dragging past the LEFT edge and releasing clears to <xref href="FluentGpu.Controls.RatingControl.NoValueSet" data-throw-if-not-resolved="false"></xref>

    (<code>RatingControl.cpp:799-805, 856-863, 888-906</code>). A TOUCH press lifts the hover-scale scalar to

    <code>c_touchOverScale</code> = 1.0 (vs mouse 0.8) so the focal star grows to full size under the finger.</li><li><b>Keyboard</b> -- Left/Down -1, Right/Up +1, Home clears, End sets <xref href="FluentGpu.Controls.RatingControl.MaxRating" data-throw-if-not-resolved="false"></xref>

    (<code>RatingControl::OnKeyDown</code>).</li><li><b>Read-only / disabled</b> -- <xref href="FluentGpu.Controls.RatingControl.ReadOnly" data-throw-if-not-resolved="false"></xref> renders a fixed rating with no interaction;

    <xref href="FluentGpu.Controls.RatingControl.IsEnabled" data-throw-if-not-resolved="false"></xref>=false dims the foreground to the disabled brush and gates all input.</li></ul>


    Custom font/image item-info (<code>RatingItemFontInfo</code>/<code>RatingItemImageInfo</code> per-state glyphs/images) is deferred.
