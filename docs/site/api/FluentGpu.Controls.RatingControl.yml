  namespace: FluentGpu.Controls
  summary: >-
    Programmatic value coercion (RatingControl::CoerceValueBetweenMinAndMax): a negative value snaps to the
        <xref href="FluentGpu.Controls.RatingControl.NoValueSet" data-throw-if-not-resolved="false"></xref> (-1) "unset" sentinel; a value in (0,1] snaps up to 1 (a single star); a value above
        <code class="paramref">max</code> clamps down to max. Fractional values in (1,max] keep their tail (the partial-star fill).
        Applied to both <xref href="FluentGpu.Controls.RatingControl.Value" data-throw-if-not-resolved="false"></xref> and <xref href="FluentGpu.Controls.RatingControl.PlaceholderValue" data-throw-if-not-resolved="false"></xref> at render time.
  example: []
