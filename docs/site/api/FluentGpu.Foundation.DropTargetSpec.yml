  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    Keep the L1 drop-settle glide after OnDrop (reorder targets — the commit's FLIP retarget turns it
        into the glide-into-the-new-slot motion). False (default) = the drop suppresses the spring-back and the
        source visual snaps home: the "deposited" feel of a foreign-surface drop.
