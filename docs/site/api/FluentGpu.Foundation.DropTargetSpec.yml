  assemblies:
  - FluentGpu.Foundation
  namespace: FluentGpu.Foundation
  summary: >-
    E5-L2 drop TARGET spec (<code>BoxEl.DropTarget</code> — Flutter DragTarget / SwiftUI dropDestination): receives sessions

    whose Kind is in <xref href="FluentGpu.Foundation.DropTargetSpec.AcceptKinds" data-throw-if-not-resolved="false"></xref>. Discovery is hit-test-chain based — per pointer move the engine picks

    the NEAREST enabled accepting target under the pointer (a non-accepting target never blocks an accepting

    ancestor). OnEnter/OnLeave fire on hover transitions, OnOver every move while inside, OnDrop on release over it

    (BEFORE the L1 completion). The <xref href="FluentGpu.Foundation.DragSession" data-throw-if-not-resolved="false"></xref> argument is THE one live reused instance — copy what

    you keep.
