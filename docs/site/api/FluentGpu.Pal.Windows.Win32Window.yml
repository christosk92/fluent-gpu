    id: PaintRequested
    path: ../../src/FluentGpu.Pal.Windows/Win32Platform.cs
    startLine: 239
  assemblies:
  - FluentGpu.Pal.Windows
  namespace: FluentGpu.Pal.Windows
  summary: >-
    Invoked by the platform when the OS demands an immediate repaint *outside* the app's frame loop —

    notably during the modal move/size loop (WM_SIZE/WM_PAINT), which otherwise blocks rendering until mouse-up.

    The host wires this to a pump-free paint so the window stays live during a live resize.
  example: []
  syntax:
    content: public Action? PaintRequested { get; set; }
    parameters: []
    return:
      type: System.Action
    content.vb: Public Property PaintRequested As Action
  overload: FluentGpu.Pal.Windows.Win32Window.PaintRequested*
  implements:
  - FluentGpu.Pal.IPlatformWindow.PaintRequested
