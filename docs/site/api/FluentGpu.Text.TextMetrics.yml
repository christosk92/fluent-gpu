  assemblies:
  - FluentGpu.Text
  namespace: FluentGpu.Text
  summary: >-
    Result of measuring a run: the box the shaped glyphs occupy + the baseline offset from the top, plus the
        face's decoration metrics — all vertical values measured DOWN from the line top, the same frame as
        <xref href="FluentGpu.Text.TextMetrics.Baseline" data-throw-if-not-resolved="false"></xref>. <xref href="FluentGpu.Text.TextMetrics.UnderlineY" data-throw-if-not-resolved="false"></xref>/<xref href="FluentGpu.Text.TextMetrics.UnderlineThickness" data-throw-if-not-resolved="false"></xref> place the underline bar and
        <xref href="FluentGpu.Text.TextMetrics.StrikeY" data-throw-if-not-resolved="false"></xref> the strikethrough bar (it reuses the underline thickness). These feed text decorations;
        backends without face metrics (the experimental GDI path) leave them 0.
  example: []
