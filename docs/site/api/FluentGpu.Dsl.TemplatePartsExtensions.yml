  summary: >-
    Null-safe, type-stable apply: a no-op (no allocation) when <code class="paramref">parts</code> is null or the
        part has no modifier; keeps the ORIGINAL element if a modifier changed the record type (parts style, slots
        restructure). The control re-asserts its mechanics-critical props on the result.
