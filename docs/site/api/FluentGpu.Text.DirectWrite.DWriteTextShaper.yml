  assemblies:
  - FluentGpu.Text.DirectWrite
  namespace: FluentGpu.Text.DirectWrite
  summary: >-
    DirectWrite glyph shaper (text.md §4.4): turns one itemized run (single face + script + direction) into positioned

    glyphs via <code>IDWriteTextAnalyzer.GetGlyphs</code> + <code>GetGlyphPlacements</code> — real cluster/ligature/kerning/RTL

    shaping, not per-char design advances. Advances come out in DIP (GetGlyphPlacements is given the DIP em size).

    Scratch buffers are grown and reused; <xref href="FluentGpu.Text.DirectWrite.DWriteTextShaper.Shape(System.Char*%2cSystem.Int32%2cSystem.Int32%2cTerraFX.Interop.DirectX.IDWriteFontFace*%2cSystem.Single%2cSystem.UInt16%2cSystem.Byte%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> returns a span into the reused output buffer (valid until

    the next call). COM via TerraFX raw pointers.
  example: []
  syntax:
    content: 'public sealed class DWriteTextShaper : IDisposable'
    content.vb: Public NotInheritable Class DWriteTextShaper Implements IDisposable
