  assemblies:
  - FluentGpu.Dsl
  namespace: FluentGpu.Dsl
  summary: >-
    Lightweight template-part styling — the FluentGpu equivalent of CSS <code>::part</code> / WinUI lightweight styling,

    signals-native. A control names its internal template parts (<code>public const string PartHeader = "Header";</code> …)

    and routes each built part element through <xref href="FluentGpu.Dsl.TemplatePartsExtensions.Apply%60%601(FluentGpu.Dsl.TemplateParts%2cSystem.String%2c%60%600)" data-throw-if-not-resolved="false"></xref>; app code layers ANY

    element props onto any part with a <code>with</code> expression:


    <pre><code class="lang-csharp">Parts = new()

    {
        [Expander.PartHeader] = b =&gt; b with
        {
            StickyTop = 8f,                                    // CSS position:sticky, top: 8px
            OnPinned  = p =&gt; stuck.Value = p,                  // the :stuck observable
            Fill = stuck.Value ? Tok.FillSolidBase : b.Fill,   // restyle ANYTHING off the signal
            BrushTransitionMs = Motion.ControlFast,            // …and the swap cross-fades
        },
    }</code></pre>


    Contract (apply order): control defaults → part modifier → the control RE-ASSERTS its mechanics-critical props

    (click handlers, reflow specs, ref captures — chained via <xref href="FluentGpu.Dsl.TemplateParts.Chain%60%601(System.Action%7b%60%600%7d%2cSystem.Action%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref>, never clobbered), so a modifier

    can restyle everything but break nothing. Modifier rules: a PURE <code>with</code>-copy of its input; reading a signal

    inside one subscribes the OWNING CONTROL (modifiers run inside its Render — that's the granular :stuck restyle

    loop); never WRITE a signal in a modifier; no per-frame-hot reads (use <code>FillBind</code>/<code>TransformBind</code> for

    those); type-preserving (a modifier that changes the record type is ignored — parts style, content SLOTS like

    <code>Content</code>/<code>HeaderContent</code> restructure); avoid reshaping <code>Children</code> (structural reconcile).


    List-UNIFORM (content-independent) item-chrome modifiers are cached apply-once via the parts epoch

    (<xref href="FluentGpu.Dsl.TemplateParts.TryApplyCached(System.String%2cFluentGpu.Dsl.Element%2cFluentGpu.Dsl.Element%40)" data-throw-if-not-resolved="false"></xref>); per-item CONTENT differences use the PartDelta value seam (SelectorVisuals.cs),

    never a per-item modifier in a recycled scroll path.
