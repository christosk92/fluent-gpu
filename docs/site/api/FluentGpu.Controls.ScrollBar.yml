  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    The full WinUI mouse-scrollbar anatomy (see the class doc for cites). <code class="paramref">fraction</code> =

    viewport/content (thumb proportion); <code class="paramref">position</code> = offset/(content−viewport) in 0..1, read

    through a signal so writes move the thumb compositor-instantly (no re-render); <code class="paramref">onScroll</code>

    receives the new position for every interaction: thumb drag (absolute), track-click paging (one VIEWPORT

    per page — LargeDecrement→IScrollInfo::PageUp = SetVerticalOffset(offset − viewport),

    ScrollViewer_Partial.cpp:3146-3150 / ScrollContentPresenter_Partial.cpp:543-547 — auto-repeating at the

    template's Interval=50 after the 500ms RepeatButton delay, stopping when the thumb reaches the pointer),

    and arrow small-change (one 16px LINE per step — ScrollViewerLineDelta, ScrollViewer_Partial.h:27).

    <code class="paramref">horizontal</code> mirrors the anatomy on the X axis (HorizontalRoot, :672-693).

    <code class="paramref">largeChange01</code>/<code class="paramref">smallChange01</code> override the page/line amounts in 0..1

    position units (NaN = the WinUI-derived defaults above; pass 16/scrollableExtentPx for the exact line when

    the real content extent is known). <code class="paramref">parts</code> = per-part styling keyed by the <code>PartXxx</code>

    consts (see <xref href="FluentGpu.Dsl.TemplateParts" data-throw-if-not-resolved="false"></xref> for the contract).
