  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    WinUI <code>StartBringItemIntoView(index, BringIntoViewOptions)</code> (idl:52): realizes the target by
        scrolling the virtualized viewport. <code class="paramref">alignmentRatio</code> NaN = minimal scroll (the default
        BringIntoViewOptions); 0 = align item start to viewport start, 1 = end to end (the Home/End ratios,
        ItemsViewInteractions.cpp:1013-1016).
  example: []
  syntax:
    content: public void StartBringItemIntoView(int index, float alignmentRatio = NaN)
