  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    A pluggable virtualizing layout: PURE, ALLOCATION-FREE arithmetic mapping (itemCount, viewport, scrollOffset) to

    the realize window + per-item content-space rects. The engine calls it ONLY on realize/arrange frames (a steady

    in-window scroll is transform-only and never touches it), and the methods return structs / via out-params — so a

    custom layout costs zero per-frame managed allocation, honoring the engine's core contract. Implement this to make

    any virtualized layout (lists, card grids, staggered walls, …). Built-ins: <xref href="FluentGpu.Scene.StackVirtualLayout" data-throw-if-not-resolved="false"></xref>,

    <xref href="FluentGpu.Scene.GridVirtualLayout" data-throw-if-not-resolved="false"></xref>, <xref href="FluentGpu.Scene.HorizontalGridVirtualLayout" data-throw-if-not-resolved="false"></xref>, <xref href="FluentGpu.Scene.LinedFlowLayout" data-throw-if-not-resolved="false"></xref>,

    <xref href="FluentGpu.Scene.SpanningGridVirtualLayout" data-throw-if-not-resolved="false"></xref>. Variable-extent (measured) layouts implement the widened seam

    <xref href="FluentGpu.Scene.IMeasuredVirtualLayout" data-throw-if-not-resolved="false"></xref> — same contract plus estimate-then-correct feedback.
  example: []
  syntax:
    content: public interface IVirtualLayout
    content.vb: Public Interface IVirtualLayout
