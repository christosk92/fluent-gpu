  assemblies:
  - FluentGpu.Dsl
  namespace: FluentGpu.Dsl
  summary: >-
    Fluent elevation presets — the engine's ANALYTIC drop shadows standing in for WinUI's ThemeShadow Z-depth model

    (we own every pixel; documented visual-equivalent to the DComp shadow). WinUI elevates popups by Z translation —

    base depth 32 + 8 per nested tier (ElevationHelper.cpp:19-21 s_elevationBaseDepth/s_elevationIterativeDepth) — and

    the design maps the popup bands to three depth CLASSES: ToolTip (lightest, depth-16 class) &lt; Flyout/Menu

    (depth-32 class) &lt; Dialog (depth-128 class). The preset blur/offset/alpha values keep the engine's existing

    visual scale; the CLASS a control uses is the contract: ToolTip → <xref href="FluentGpu.Dsl.Elevation.Tooltip" data-throw-if-not-resolved="false"></xref>;

    Flyout/MenuFlyout/CommandBarFlyout/TeachingTip → <xref href="FluentGpu.Dsl.Elevation.Flyout" data-throw-if-not-resolved="false"></xref>; ContentDialog → <xref href="FluentGpu.Dsl.Elevation.Dialog" data-throw-if-not-resolved="false"></xref>.

    Use via <code>.Elevate(Elevation.Card)</code> (Modifiers) or <code>Ui.Card(...)</code> which carries <xref href="FluentGpu.Dsl.Elevation.Card" data-throw-if-not-resolved="false"></xref> by default.
