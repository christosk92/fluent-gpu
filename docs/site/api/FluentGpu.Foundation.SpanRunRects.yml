  namespace: FluentGpu.Foundation
  summary: >-
    An immutable snapshot of a span run's laid-out rect artifacts at one wrap width. Published whole by the
        text seam on a measure-cache miss (content/width change) and read lock-free by the recorder (decoration bars) and
        the input dispatcher (hyperlink cursor/click) — steady frames never re-touch the font seam.
