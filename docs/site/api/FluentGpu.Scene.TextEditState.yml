  assemblies:
  - FluentGpu.Scene
  namespace: FluentGpu.Scene
  summary: >-
    Sparse text-edit state for an editor's TEXT node (side-table, O(editors)): caret geometry + caret-follow scroll +

    in-flight IME composition span + focus/blink flags. Written by the editing control (UI thread, edit/drag time) and

    the <code>CaretBlinker</code> phase-7 ticker; the recorder only READS it (plus the pooled decoration rects on

    <xref href="FluentGpu.Scene.SceneStore.SetTextEditRects(FluentGpu.Foundation.NodeHandle%2cSystem.ReadOnlySpan%7bFluentGpu.Foundation.RectF%7d%2cSystem.ReadOnlySpan%7bFluentGpu.Foundation.RectF%7d)" data-throw-if-not-resolved="false"></xref>) to emit selection highlight / selected-text recolor / IME underlines /

    the caret bar — retained scene state, never composed elements (0 alloc in phases 6–13).
  example: []
  syntax:
    content: public struct TextEditState
    content.vb: Public Structure TextEditState
