  assemblies:
  - FluentGpu.Controls
  namespace: FluentGpu.Controls
  summary: >-
    A WinUI 3 <code>SplitButton</code>: a primary action button joined to a secondary dropdown half, sharing one rounded

    chrome with a 1px divider between them. The two halves are <b>independently</b> interactive — the primary half runs

    <xref href="FluentGpu.Controls.SplitButton.OnInvoke" data-throw-if-not-resolved="false"></xref> (the <code>Click</code> event / <code>OnClickPrimary</code>), the secondary half opens a

    <xref href="FluentGpu.Controls.MenuFlyout" data-throw-if-not-resolved="false"></xref> anchored below the whole control (<code>OnClickSecondary → OpenFlyout</code>). Each half carries

    its own hover/press fill + foreground ramp; the inner corner where each half meets the divider is squared so the

    pair reads as one control (WinUI PrimaryButtonBorder <code>4,0,0,4</code> / SecondaryButtonBorder <code>0,4,4,0</code>).


    Source of truth: <code>microsoft-ui-xaml/controls/dev/SplitButton/SplitButton.xaml</code> (+ <code>_themeresources.xaml</code>,

    <code>SplitButton.cpp</code>). Tokens, sizes, padding, corners and the state matrix are 1:1 with that template.
  example: []
