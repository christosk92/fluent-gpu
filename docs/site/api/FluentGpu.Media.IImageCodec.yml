  assemblies:
  - FluentGpu.Media
  namespace: FluentGpu.Media
  summary: >-
    Portable decode seam (media-pipeline.md §3): turn encoded bytes (JPEG/PNG/WebP/…) into PREMULTIPLIED BGRA8 at a

    target size, constrained so a huge source never materializes full-res in CPU memory (WIC <code>IWICBitmapScaler</code> on

    Windows, <code>CGImageSource</code> on macOS). Implemented entirely on a worker thread; the leaf's COM/objc objects never

    cross the scheduler seam — only POD pixels do.
  example: []
