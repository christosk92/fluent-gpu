  fullName: FluentGpu.Media.IImageCodec.DecodeConstrained(System.ReadOnlySpan<byte>, int, int, System.Span<byte>, out int, out int)
  type: Method
  source:
    remote:
      path: src/FluentGpu.Media/IImageCodec.cs
