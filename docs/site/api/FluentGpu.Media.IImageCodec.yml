    - id: encoded
      type: System.ReadOnlySpan{System.Byte}
    - id: targetW
      type: System.Int32
    - id: targetH
      type: System.Int32
    - id: dstBgra8
      type: System.Span{System.Byte}
    - id: w
      type: System.Int32
    - id: h
      type: System.Int32
    return:
      type: System.Boolean
    content.vb: Function DecodeConstrained(encoded As ReadOnlySpan(Of Byte), targetW As Integer, targetH As Integer, dstBgra8 As Span(Of Byte), w As Integer, h As Integer) As Boolean
