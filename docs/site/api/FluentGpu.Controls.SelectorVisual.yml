  namespace: FluentGpu.Controls
  summary: >-
    The selector-VISUAL presets — the user-pickable item-chrome skins the premiere <xref href="FluentGpu.Controls.ItemsView" data-throw-if-not-resolved="false"></xref> exposes

    (the WinUI "ListView's accent bar" the user likes, GridView's corner check, ItemContainer's accent ring, …) as a

    single DATA enum so any layout × any selection mode can wear any selector (no WinUI-style capability cliffs):


    <ul><li><xref href="FluentGpu.Controls.SelectorVisual.AccentPill" data-throw-if-not-resolved="false"></xref> — the WinUI <code>ListViewItem</code> SelectionIndicator (the 3×16 accent bar at the row's

    left edge over a subtle backplate); the ListView preset's default.</li><li><xref href="FluentGpu.Controls.SelectorVisual.Check" data-throw-if-not-resolved="false"></xref> — the WinUI <code>GridViewItem</code> dual-border + top-right corner check; the GridView preset's default.</li><li><xref href="FluentGpu.Controls.SelectorVisual.FullRow" data-throw-if-not-resolved="false"></xref> — a documented SUPERSET (no exact WinUI analogue): the AccentPill row plate WITHOUT the

    left pill, so the whole row fills with the accent-subtle selected highlight (full-bleed selected backplate).</li><li><xref href="FluentGpu.Controls.SelectorVisual.Border" data-throw-if-not-resolved="false"></xref> — the WinUI <code>ItemContainer</code> chrome (3px accent ring + 1px inner stroke + checkbox).</li><li><xref href="FluentGpu.Controls.SelectorVisual.None" data-throw-if-not-resolved="false"></xref> — no selection chrome at all (a bare recyclable container) for app-drawn selection.</li></ul>
  example: []
  syntax:
    content: 'public enum SelectorVisual : byte'
    content.vb: Public Enum SelectorVisual As Byte
