  assemblies:
  - FluentGpu.Animation
  namespace: FluentGpu.Animation
  summary: >-
    Eases per-node hover/press progress (phase 7), so the recorder can cross-fade Fill/Border/Opacity and scale template

    parts from WinUI-style visual-state targets instead of instant flag switches. State lives in the sparse

    <xref href="FluentGpu.Scene.InteractionAnim" data-throw-if-not-resolved="false"></xref> side-table; only nodes currently transitioning are ticked. Zero work / zero alloc on a

    steady frame (<xref href="FluentGpu.Animation.InteractionAnimator.HasActive" data-throw-if-not-resolved="false"></xref> == false).
