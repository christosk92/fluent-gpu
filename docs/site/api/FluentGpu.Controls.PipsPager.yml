  namespace: FluentGpu.Controls
  summary: >-
    One 12x24 pip button — the modifier runs PER DOT (a small static count, not virtualized). The
        selected/normal glyph sizing is stock per-render styling a modifier may override. Owned: OnClick (select),
        Role, OnKeyDown (arrow roving focus), OnRealized (focus-handle capture).
