# Pack and publish the single `FluentGpu` NuGet package (managed libraries bundled into one package).
#
#   * one package: FluentGpu.Engine/Controls/Windows/WindowsApi DLLs in lib/net10.0 + the source generator in
#     analyzers/dotnet/cs, with TerraFX.Interop.Windows as the lone declared dependency (see FluentGpu.Package.csproj)
#   * version comes from the git tag (vX.Y.Z → X.Y.Z; preserves a -preview suffix)
#   * publishing uses nuget.org TRUSTED PUBLISHING (OIDC): the job exchanges a short-lived GitHub OIDC token for a
#     1-hour nuget.org API key — no long-lived NUGET_API_KEY secret stored anywhere. The push runs only on a `v*` tag.
#
# One-time setup on nuget.org (Account → Trusted Publishing → add policy):
#     Repository Owner: christosk92   Repository: fluent-gpu   Workflow File: nuget.yml   (Environment: leave empty)
# and add a repo secret NUGET_USER = your nuget.org username (profile name, NOT your email).
#
# Trigger: push a tag `v*` (release), or run manually (workflow_dispatch — packs only, never pushes).
# A `v*` tag fires this AND msix.yml.
name: nuget

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer (e.g. 0.1.0 or 0.2.0-preview.1). Defaults to 0.1.0.'
        required: false
        default: '0.1.0'

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  pack-publish:
    runs-on: windows-latest    # packs managed libraries only (no AOT / RID) — arch-agnostic
    permissions:
      contents: read
      id-token: write          # required: GitHub issues the OIDC token that nuget.org exchanges for a temp key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'   # repo targets net10.0 but builds on the 11.x preview SDK (matches msix.yml)
          dotnet-quality: preview
      - name: Resolve version
        id: v
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then SEMVER="${GITHUB_REF#refs/tags/v}"; else SEMVER="${{ github.event.inputs.version }}"; fi
          SEMVER="${SEMVER:-0.1.0}"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
      - name: Pack
        shell: pwsh
        run: dotnet pack src/FluentGpu.Package/FluentGpu.Package.csproj -c Release -p:Version=${{ steps.v.outputs.semver }} -p:ContinuousIntegrationBuild=true -o artifacts/nuget
      - uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: artifacts/nuget/*.nupkg
          retention-days: 14

      # ── Publish (tag only): Trusted Publishing — OIDC token → short-lived nuget.org API key, no stored secret. ──
      - name: NuGet login (OIDC → short-lived key)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org username (profile name), NOT your email address
      - name: NuGet push
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: dotnet nuget push artifacts/nuget/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
