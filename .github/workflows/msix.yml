# Build, sign, and publish the FluentGpu Gallery MSIX (NativeAOT, packaged Win32 full-trust).
#
# Improves on WaveeMusic's WinUI/MSBuild pipeline:
#   * NativeAOT  -> a ~7 MB signed .msix per arch (no bundled .NET runtime; Wavee ships ~200 MB self-contained JIT)
#   * arm64 + x64, each built natively on a matching runner (AOT can't cross-compile)
#   * one packaging script (build/pack-msix.ps1) shared by local dev and CI - no drift
#   * signing is OPTIONAL: with Azure Trusted Signing secrets it signs; without, it ships unsigned + the dev-cert flow
#   * an .appinstaller per arch for one-click sideload auto-update
#
# Trigger: push a tag `v*` (release), or run manually (workflow_dispatch).
name: msix

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer (e.g. 0.1.0). 4th part is the CI run number.'
        required: false
        default: '0.1.0'

permissions:
  contents: write   # create the GitHub release

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}      # 4-part MSIX version, e.g. 0.1.0.42
      semver:  ${{ steps.v.outputs.semver }}       # 0.1.0
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then SEMVER="${GITHUB_REF#refs/tags/v}"; else SEMVER="${{ github.event.inputs.version }}"; fi
          SEMVER="${SEMVER:-0.1.0}"
          echo "semver=$SEMVER"            >> "$GITHUB_OUTPUT"
          echo "version=$SEMVER.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"   # X.Y.Z.<run> - monotonic for .appinstaller

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest      # AOT must build on a matching-arch runner
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'       # repo targets net10.0 but builds on the 11.x preview SDK
          dotnet-quality: preview
      # Build the signed-with-dev-cert-free MSIX. CI leaves it UNSIGNED (-NoSign); the sign job re-signs if secrets exist.
      - name: Pack MSIX (NativeAOT)
        shell: pwsh
        # -Publisher must match the signing cert subject (Trusted Signing) - set repo variable RELEASE_PUBLISHER.
        run: ./build/pack-msix.ps1 -Arch ${{ matrix.arch }} -Version ${{ needs.version.outputs.version }} -NoSign -Publisher "${{ vars.RELEASE_PUBLISHER || 'CN=MarTeco Dev, O=MarTeco, C=NL' }}"
      - uses: actions/upload-artifact@v4
        with:
          name: msix-${{ matrix.arch }}
          path: artifacts/*.msix
          retention-days: 14

  # Optional: sign with Azure Trusted Signing IF the secrets are configured; otherwise this job is skipped and the
  # release ships the unsigned packages (install with a local dev cert via build/pack-msix.ps1 -Install).
  sign:
    needs: [version, build]
    runs-on: windows-latest
    if: ${{ vars.TRUSTED_SIGNING_ACCOUNT != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: 'msix-*', path: artifacts, merge-multiple: true }
      - name: Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: artifacts
          files-folder-filter: msix
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - uses: actions/upload-artifact@v4
        with: { name: msix-signed, path: artifacts/*.msix }

  release:
    needs: [version, build, sign]
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { pattern: 'msix-*', path: artifacts, merge-multiple: true }
      - name: Generate .appinstaller (per arch)
        shell: bash
        run: |
          REPO="${{ github.server_url }}/${{ github.repository }}"
          PUBLISHER="${{ vars.RELEASE_PUBLISHER || 'CN=MarTeco Dev, O=MarTeco, C=NL' }}"
          for ARCH in x64 arm64; do
            sed -e "s#__VERSION__#${{ needs.version.outputs.version }}#g" \
                -e "s#__ARCH__#${ARCH}#g" \
                -e "s#__PUBLISHER__#${PUBLISHER}#g" \
                -e "s#__APPINSTALLER_URI__#${REPO}/releases/latest/download/FluentGpu.${ARCH}.appinstaller#g" \
                -e "s#__MSIX_URI__#${REPO}/releases/download/v${{ needs.version.outputs.semver }}/FluentGpu.WindowsApp_${{ needs.version.outputs.version }}_${ARCH}.msix#g" \
                build/AppInstaller.template.xml > "artifacts/FluentGpu.${ARCH}.appinstaller"
          done
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semver }}
          files: |
            artifacts/*.msix
            artifacts/*.appinstaller
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.version.outputs.semver, '-') }}
