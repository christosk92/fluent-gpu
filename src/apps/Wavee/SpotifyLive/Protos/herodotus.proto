syntax = "proto3";

package spotify.resumption.v1;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Wavee.Protocol.Resumption";
option optimize_for = CODE_SIZE;

message ListCurrentStatesRequest {
  int32 limit = 2;
  string filter = 4;
}

message ListCurrentStatesResponse {
  repeated CurrentStateEntry states = 1;
}

message CreateResumePointRevisionRequest {
  string entity_uri = 2;
  CurrentStateRevision revision = 4;
}

message CreateResumePointRevisionResponse {
  CurrentStateRevision revision = 1;
}

message BatchCreateResumePointRevisionsRequest {
  repeated CreateResumePointRevisionRequest requests = 2;
}

message BatchCreateResumePointRevisionsResponse {
  repeated CurrentStateRevision revisions = 1;
}

message ListResumePointRevisionsRequest {
  string entity_uri = 2;
  int32 limit = 3;
}

message ListResumePointRevisionsResponse {
  repeated CurrentStateRevision revisions = 1;
}

message CurrentStateEntry {
  string entity_uri = 1;
  CurrentStateRevision revision = 2;
}

message CurrentStateRevision {
  string revision_id = 1;
  CurrentStateValue value = 2;
  google.protobuf.Timestamp create_time = 3;
  google.protobuf.Timestamp update_time = 4;
}

message CurrentStateValue {
  string entity_uri = 1;
  ResumePoint resume_point = 2;
  string item_uri = 6;
}

message ResumePoint {
  int64 position = 2;
}
