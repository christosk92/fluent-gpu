syntax = "proto2";

// A LEAN view of spotify.metadata Track/Album/Artist — only the fields the projection uses, with the SAME field numbers as
// metadata.proto (wire format is field-number-based, so these parse the real Track/Album/Artist bytes). Parsed with
// DiscardUnknownFields, so the many unused repeated fields (file[], restriction[], availability[], alternative[], …) are
// SKIPPED without allocating their messages. This is the "custom field-skipping reader" — done as a schema, not hand-rolled.
package wavee.lean;
option csharp_namespace = "Wavee.Protocol.Lean";

message LeanImage {
    optional bytes file_id = 1;
    optional int32 size = 2;     // Image.Size enum value read as int (0 = DEFAULT)
    optional sint32 width = 3;
    optional sint32 height = 4;
}

message LeanImageGroup {
    repeated LeanImage image = 1;
}

message LeanDate {
    optional sint32 year = 1;
    optional sint32 month = 2;
    optional sint32 day = 3;
}

message LeanArtistRef {          // an embedded artist: just gid + name
    optional bytes gid = 1;
    optional string name = 2;
}

message LeanAlbumRef {           // a track's embedded album: gid + name + cover
    optional bytes gid = 1;
    optional string name = 2;
    optional LeanImageGroup cover_group = 17;
}

message LeanCountStub { }        // empty — retained for any count-only repeated fields

message LeanDisc {
    repeated LeanTrack track = 3;   // the album's tracklist (parsed: gid/name/artist/duration via LeanTrack's field numbers)
}

message LeanExternalId {            // Track.external_id (field 10): type="isrc"/"upc"/… + the id value
    optional string type = 1;
    optional string id = 2;
}

message LeanTrack {
    optional bytes gid = 1;
    optional string name = 2;
    optional LeanAlbumRef album = 3;
    repeated LeanArtistRef artist = 4;
    optional sint32 duration = 7;
    optional bool explicit = 9;
    repeated LeanExternalId external_id = 10;   // field 10 == metadata.proto Track.external_id (carries the ISRC)
}

message LeanAlbum {
    optional bytes gid = 1;
    optional string name = 2;
    repeated LeanArtistRef artist = 3;
    optional int32 type = 4;                 // Album.Type: 1=ALBUM 2=SINGLE 3=COMPILATION 4=EP 5=AUDIOBOOK 6=PODCAST (read as int)
    optional LeanDate date = 6;
    repeated LeanDisc disc = 11;
    optional LeanImageGroup cover_group = 17;
}

// The discography lean view: an ArtistV4 payload carries the WHOLE discography as release-groups. Each group is one
// release with its version gids (album[0] is the representative release); we parse the group heads as gid-only stubs
// (name/cover usually absent on the wire) and let AlbumV4 hydration + assembly upgrade them. top_track carries the
// popular-list gid refs (resolved to named tracks at assembly time). SAME field numbers as metadata.proto Artist.
message LeanTrackRef { optional bytes gid = 1; }                          // top_track[].track[] — a gid-only track ref
message LeanTopTracks { optional string country = 1; repeated LeanTrackRef track = 2; }
message LeanAlbumGroup { repeated LeanAlbumRef album = 1; }               // reuse LeanAlbumRef (gid+name+cover parse when present)
message LeanBiography { optional string text = 1; }

message LeanArtist {
    optional bytes gid = 1;
    optional string name = 2;
    repeated LeanTopTracks top_track = 4;
    repeated LeanAlbumGroup album_group = 5;
    repeated LeanAlbumGroup single_group = 6;
    repeated LeanAlbumGroup compilation_group = 7;
    repeated LeanAlbumGroup appears_on_group = 8;
    repeated LeanBiography biography = 12;
    optional LeanImageGroup portrait_group = 17;
}

message LeanShowRef {            // an episode's embedded show: gid + name (for ShowName)
    optional bytes gid = 1;
    optional string name = 2;
}

message LeanShow {
    optional bytes gid = 1;
    optional string name = 2;
    optional string description = 64;
    optional string publisher = 66;
    optional LeanImageGroup cover_image = 69;
}

message LeanEpisode {
    optional bytes gid = 1;
    optional string name = 2;
    optional sint32 duration = 7;          // milliseconds
    optional string description = 64;
    optional LeanDate publish_time = 66;
    optional LeanImageGroup cover_image = 68;
    optional LeanShowRef show = 71;
}
